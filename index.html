/* ── Pick an existing activity onto a day (mobile-friendly counterpart to drag & drop) ── */
function modalPickActivity(tripId,date){
  const d=TD[tripId]||{};
  const unscheduled=(d.events||[]).filter(e=>!e.date);
  const scheduled=(d.events||[]).filter(e=>e.date&&e.date!==date);
  const head=txt=>`<div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin:12px 0 8px">${txt}</div>`;
  const item=ev=>{
    const cat=CATS[ev.category]||CATS.other;
    return`<button class="mob-menu-item" style="border:1px solid var(--border);margin-bottom:8px;padding:12px" onclick="assignEventToDay('${tripId}','${ev.id}','${date}')">
      <span style="font-size:18px">${cat.icon}</span>
      <span style="flex:1"><b>${esc(ev.title)}</b>
        <span style="display:block;font-size:12px;color:var(--muted)">${[ev.location?'📍 '+esc(ev.location):'',ev.date?'currently '+fmtDay(ev.date):'unscheduled'].filter(Boolean).join(' · ')}</span>
      </span>
      <span style="color:var(--gold)">＋</span>
    </button>`;
  };
  modal(`🗂 Add to ${fmtDay(date)}`,`
    ${!unscheduled.length&&!scheduled.length?`<p style="font-size:13px;color:var(--muted)">No other activities yet.</p>`:''}
    ${unscheduled.length?head('Unscheduled')+unscheduled.map(item).join(''):''}
    ${scheduled.length?head('Move from another day')+scheduled.map(item).join(''):''}
    <div class="modal-footer" style="margin:16px -22px -22px;border-radius:0 0 20px 20px">
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="closeModal();modalEvent('${tripId}','${date}')">＋ New Activity</button>
    </div>`);
}
async function assignEventToDay(tripId,evId,date){
  // Optimistic: move it on screen immediately, revert if the server refuses
  const ev=(TD[tripId]?.events||[]).find(x=>x.id===evId);
  const oldDate=ev?.date;
  if(ev){ev.date=date;}
  closeModal();renderTab();
  const {error}=await DB.from('wtn_events').update({date}).eq('id',evId);
  if(error){
    if(ev){ev.date=oldDate;renderTab();}
    toast('Could not move activity');
    return;
  }
  toast(`Added to ${fmtDay(date)} ✓`);
}

/* ── Drag & drop: move activities between itinerary days (desktop) ── */
let DRAG_EV=null;
function dragEv(e,id){
  DRAG_EV=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',id);
}
function dragOverDay(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over');}
function dragLeaveDay(e){e.currentTarget.classList.remove('drag-over');}
async function dropOnDay(e,tripId,date){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const id=e.dataTransfer.getData('text/plain')||DRAG_EV;
  DRAG_EV=null;
  if(!id)return;
  const ev=(TD[tripId]?.events||[]).find(x=>x.id===id);
  if(!ev||ev.date===date)return;
  await assignEventToDay(tripId,id,date);
}

function togglePack(tripId,id){
  // Toggle from the data (not a stale onclick arg), flip the row in place —
  // no full re-render, so rapid taps can't fight each other or jump scroll
  const i=TD[tripId]?.packItems.find(x=>x.id===id);
  if(!i)return;
  const packed=!i.packed;
  i.packed=packed;
  applyPackRow(id,packed);
  refreshPackStats(tripId);
  DB.from('wtn_pack_items').update({packed}).eq('id',id).then(({error})=>{
    if(error){
      i.packed=!packed;
      applyPackRow(id,!packed);
      refreshPackStats(tripId);
      toast('Could not save — try again');
    }
  });
}
function applyPackRow(id,packed){
  const row=document.querySelector(`.pack-item[data-id="${id}"]`);
  if(!row)return;
  row.classList.toggle('packed',packed);
  const check=row.querySelector('.pack-check');
  if(check)check.textContent=packed?'✓':'';
}
function refreshPackStats(tripId){
  const items=TD[tripId]?.packItems||[];
  const packed=items.filter(i=>i.packed).length;
  const pc=document.getElementById('packCount');
  if(pc)pc.textContent=`${packed}/${items.length} packed`;
  const pf=document.getElementById('packBarFill');
  if(pf)pf.style.width=(items.length?Math.round(packed/items.length*100):0)+'%';
  document.querySelectorAll('.pack-section[data-packcat]').forEach(sec=>{
    const ci=items.filter(i=>i.category===sec.dataset.packcat);
    const cp=ci.filter(i=>i.packed).length;
    const lbl=sec.querySelector('.pack-cat-count');
    if(lbl)lbl.textContent=`(${cp}/${ci.length})`;
    const fill=sec.querySelector('.pack-progress-fill');
    if(fill)fill.style.width=(ci.length?Math.round(cp/ci.length*100):0)+'%';
  });
}

async function packQuickKey(e,el){
  if(e.key==='Escape'){el.value='';el.closest('.pack-quick-add').classList.add('hidden');return;}
  if(e.key!=='Enter')return;
  const name=el.value.trim();if(!name)return;
  el.value='';
  const tripId=el.dataset.trip,cat=el.dataset.cat;
  // Optimistic add with a client-side id — no waiting, no full reload
  const row={id:crypto.randomUUID(),trip_id:tripId,name,category:cat,qty:1,packed:false,created_at:new Date().toISOString()};
  TD[tripId]?.packItems.push(row);
  renderTab();
  // Keep the quick-add open + focused so several items can be typed in a row
  const qid=`qa_${cat.replace(/[^a-z0-9]/gi,'_').toLowerCase()}`;
  const box=document.getElementById(qid);
  if(box){box.classList.remove('hidden');box.querySelector('input')?.focus();}
  DB.from('wtn_pack_items').insert(row).then(({error})=>{
    if(error){
      const arr=TD[tripId]?.packItems||[];
      const idx=arr.findIndex(x=>x.id===row.id);
      if(idx>=0){arr.splice(idx,1);renderTab();}
      toast('Could not add — try again');
    }
  });
}

async function uploadTripDoc(tripId,input){
  const file=input.files&&input.files[0];
  input.value='';
  if(!file)return;
  if(file.size>10*1048576){toast('Max file size is 10 MB');return;}
  toast('Uploading…');
  const safe=(file.name||'file').replace(/[^\w.\- ()]+/g,'').slice(-80)||'file';
  const path=`${tripId}/${crypto.randomUUID()}-${safe}`;
  const {error:upErr}=await DB.storage.from('wtn-docs').upload(path,file,{contentType:file.type||'application/octet-stream'});
  if(upErr){toast('Upload failed: '+(upErr.message||'storage error'));return;}
  const {error:dbErr}=await DB.from('wtn_trip_docs').insert({trip_id:tripId,name:file.name,path,mime:file.type||null,size:file.size,uploaded_by:ME?.id});
  if(dbErr){await DB.storage.from('wtn-docs').remove([path]);toast('Upload failed');return;}
  toast('📎 Uploaded ✓');
  await loadTripDetail(tripId);renderTab();
}
async function openTripDoc(path){
  const {data}=await DB.storage.from('wtn-docs').createSignedUrl(path,3600);
  if(data?.signedUrl)window.open(data.signedUrl,'_blank');
  else toast('Could not open file');
}
async function deleteTripDoc(tripId,id,path){

  toast('Document deleted');
  await loadTripDetail(tripId);renderTab();
}

function renderTravelers(t,d){
  const travelers=d.travelers||[];
  const write=canWrite(t);
  function completeness(tv){
    const fields=[tv.passport_number,tv.passport_expiry,tv.passport_country,tv.nationality,tv.date_of_birth,tv.emergency_contact_name,tv.emergency_contact_phone];
    const filled=fields.filter(Boolean).length;
    if(filled===fields.length)return{label:'Complete',cls:'complete'};
    if(filled>0)return{label:'Partial',cls:'partial'};
    return{label:'No docs',cls:'empty'};
  }
  function expiryWarn(dateStr){
    if(!dateStr)return null;
    const d=new Date(dateStr+'T12:00:00'),now=new Date();
    const months=(d-now)/(1000*60*60*24*30);
    if(months<0)return'warn';
    if(months<6)return'warn';
    return'ok';
  }
  // T12:00:00 avoids the UTC-midnight parse that shifts dates back a day in
  // timezones behind UTC (Aug 4 → Aug 3)

        `:''}

        <div class="traveler-field"><span class="traveler-field-icon">🏳️</span><div class="traveler-field-body"><div class="traveler-field-label">Issuing Country</div><div class="traveler-field-val">${esc(tv.passport_country||'—')}</div></div></div>
        <div class="traveler-field"><span class="traveler-field-icon">📅</span><div class="traveler-field-body"><div class="traveler-field-label">Expiry Date</div><div class="traveler-field-val${pExp?' '+pExp:''}">${fmtDate(tv.passport_expiry)}${pExp==='warn'?' ⚠️':pExp==='ok'?' ✓':''}</div></div></div>

async function castVote(kind,id,v){
  const tripId=CUR.tripId;
  const votes=TD[tripId].votes=TD[tripId].votes||[];
  const i=votes.findIndex(x=>x.target_kind===kind&&x.target_id===id&&x.user_id===ME.id);
  const had=i>=0?votes[i].vote:0;
  if(had===v){
    votes.splice(i,1); // tap again to remove your vote
    DB.from('wtn_votes').delete().match({target_kind:kind,target_id:id,user_id:ME.id}).then(()=>{});
  }else{
    if(i>=0)votes[i].vote=v;
    else votes.push({trip_id:tripId,target_kind:kind,target_id:id,user_id:ME.id,vote:v});
    DB.from('wtn_votes').upsert({trip_id:tripId,target_kind:kind,target_id:id,user_id:ME.id,vote:v},{onConflict:'target_kind,target_id,user_id'}).then(()=>{});
  }
  modalDiscuss(kind,id);
  renderTab();
}

  const inp=$('#cmt_input');

  const row={id:crypto.randomUUID(),trip_id:CUR.tripId,target_kind:kind,target_id:id,author_id:ME.id,content,created_at:new Date().toISOString()};
  (TD[CUR.tripId].comments=TD[CUR.tripId].comments||[]).push(row);

}

  <div id="impPreview" style="margin-top:14px"></div>`);

function csvRows(text){
  const rows=[];let row=[],cell='',inQ=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){
      if(ch==='"'){if(text[i+1]==='"'){cell+='"';i++;}else inQ=false;}
      else cell+=ch;
    }else if(ch==='"')inQ=true;
    else if(ch===','){row.push(cell);cell='';}
    else if(ch==='\n'||ch==='\r'){
      if(cell!==''||row.length){row.push(cell);rows.push(row);row=[];cell='';}
      if(ch==='\r'&&text[i+1]==='\n')i++;
    }else cell+=ch;
  }
  if(cell!==''||row.length){row.push(cell);rows.push(row);}
  return rows;
}
function parseTakeoutCSV(text){
  const rows=csvRows(text);
  if(!rows.length)return[];
  const head=rows[0].map(h=>h.trim().toLowerCase());
  const ti=head.indexOf('title'),ni=head.indexOf('note'),ui=head.indexOf('url');
  if(ti<0)return[];
  return rows.slice(1).filter(r=>r[ti]).map(r=>{
    const g=ui>=0&&r[ui]?parseGmapsLink(r[ui]):null;
    return{title:r[ti],note:ni>=0?r[ni]||'':'',lat:g?.lat??null,lng:g?.lng??null,address:null};
  });
}
function parseKML(text){
  const doc=new DOMParser().parseFromString(text,'text/xml');
  return[...doc.querySelectorAll('Placemark')].map(pm=>{
    const coords=pm.querySelector('Point > coordinates')?.textContent.trim().split(',')||[];
    return{
      title:pm.querySelector('name')?.textContent.trim()||'Imported place',
      note:pm.querySelector('description')?.textContent.trim().slice(0,300)||'',
      lng:coords[0]?+coords[0]:null,lat:coords[1]?+coords[1]:null,address:null,
    };
  }).filter(p=>p.title);
}
function parseGeoJSON(text){
  const js=JSON.parse(text);
  const feats=js.features||[];
  return feats.map(f=>{
    const pr=f.properties||{};
    const loc=pr.Location||{};
    const co=f.geometry?.type==='Point'?f.geometry.coordinates:null;
    return{
      title:pr.Title||pr.name||loc['Business Name']||'Imported place',
      note:(pr.Note||pr.description||'').slice(0,300),
      lat:co?+co[1]:(loc.Latitude?+loc.Latitude:null),
      lng:co?+co[0]:(loc.Longitude?+loc.Longitude:null),
      address:loc.Address||pr.address||null,
    };
  }).filter(p=>p.title);
}
async function importPlacesFile(tripId,input){
  const file=input.files?.[0];
  input.value='';
  if(!file)return;
  const text=await file.text();
  let places=[];
  try{
    if(/\.kml$/i.test(file.name))places=parseKML(text);
    else if(/\.(json|geojson)$/i.test(file.name))places=parseGeoJSON(text);
    else places=parseTakeoutCSV(text);
  }catch{toast('Could not parse that file');return;}
  if(!places.length){toast('No places found in that file');return;}
  window._impPlaces=places;
  const pinned=places.filter(p=>p.lat!=null).length;
  document.getElementById('impPreview').innerHTML=`
    <p style="font-size:13px;margin-bottom:10px"><b>${places.length}</b> places found · ${pinned} with exact pins${!SCHEMA_V10&&pinned?' <span style="color:var(--orange)">(run migration_v10.sql to keep the pins)</span>':''}</p>
    <div style="max-height:36vh;overflow-y:auto;margin-bottom:12px;border:1px solid var(--border);border-radius:12px;padding:6px 10px">
      ${places.map((p,i)=>`<label style="display:flex;gap:8px;align-items:center;padding:6px 2px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border)">
        <input type="checkbox" class="imp-cb" value="${i}" checked style="width:auto">
        <span>${p.lat!=null?'📍':'📄'}</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.title)}${p.note?` <span style="color:var(--dim);font-size:11px">· ${esc(p.note.slice(0,40))}</span>`:''}</span>
      </label>`).join('')}
    </div>
    <button class="btn primary" style="width:100%;justify-content:center" onclick="confirmImportPlaces('${tripId}')">📥 Import selected as ideas</button>`;
}
async function confirmImportPlaces(tripId){
  const sel=[...document.querySelectorAll('.imp-cb:checked')].map(x=>+x.value);
  const places=(window._impPlaces||[]).filter((_,i)=>sel.includes(i));

function modalSearch(){
  modal('🔍 Search',`
  <input id="srch" placeholder="Activities, hotels, flights, expenses, packing…" oninput="searchDebounce()" style="margin-bottom:12px">
  <div id="srchResults"><p class="muted" style="font-size:13px">Searches everything across all your trips.</p></div>`);

let SRCH_T=null;
function searchDebounce(){clearTimeout(SRCH_T);SRCH_T=setTimeout(runSearch,300);}
async function runSearch(){
  const box=document.getElementById('srchResults');
  const raw=$('#srch')?.value.trim()||'';
  if(!box)return;
  if(raw.length<2){box.innerHTML='<p class="muted" style="font-size:13px">Type at least 2 characters.</p>';return;}
  box.innerHTML='<p class="muted" style="font-size:13px">Searching…</p>';
  const q=raw.replace(/[,()%]/g,' ').trim();
  const like=`%${q}%`;
  let ev,st,fl,bu,pk;
  try{
    [ev,st,fl,bu,pk]=await Promise.all([
      DB.from('wtn_events').select('id,trip_id,title,location,date').or(`title.ilike.${like},location.ilike.${like}`).limit(8),
      DB.from('wtn_stays').select('id,trip_id,name,address').or(`name.ilike.${like},address.ilike.${like}`).limit(8),
      DB.from('wtn_flights').select('id,trip_id,airline,from_airport,to_airport').or(`airline.ilike.${like},from_airport.ilike.${like},to_airport.ilike.${like}`).limit(8),
      DB.from('wtn_budget_items').select('id,trip_id,name').ilike('name',like).limit(8),
      DB.from('wtn_pack_items').select('id,trip_id,name').ilike('name',like).limit(8),
    ]);
  }catch{box.innerHTML='<p class="muted" style="font-size:13px">Search unavailable offline.</p>';return;}
  if(($('#srch')?.value.trim()||'')!==raw)return; // stale response
  const tname=id=>esc(TRIPS.find(t=>t.id===id)?.name||'');
  const row=(icon,title,sub,tripId,tab)=>`<button class="mob-menu-item" style="border:1px solid var(--border);margin-bottom:6px" onclick="closeModal();openTrip('${tripId}','${tab}')"><span style="font-size:17px">${icon}</span><span style="flex:1"><b>${title}</b><br><span style="font-size:12px;color:var(--muted)">${sub}</span></span></button>`;
  const ql=q.toLowerCase();
  const trips=TRIPS.filter(t=>(t.name||'').toLowerCase().includes(ql)||(t.destination||'').toLowerCase().includes(ql)).slice(0,5);
  const out=[
    ...trips.map(t=>row(t.emoji||'🌍',esc(t.name),esc(t.destination||'Trip'),t.id,'overview')),
    ...(ev?.data||[]).map(x=>row('🎭',esc(x.title),[tname(x.trip_id),x.date?fmt(x.date):null].filter(Boolean).join(' · '),x.trip_id,'activities')),
    ...(st?.data||[]).map(x=>row('🏨',esc(x.name),tname(x.trip_id),x.trip_id,'stays')),
    ...(fl?.data||[]).map(x=>row('✈️',esc(`${x.from_airport||''} → ${x.to_airport||''}`),[esc(x.airline||''),tname(x.trip_id)].filter(Boolean).join(' · '),x.trip_id,'flights')),
    ...(bu?.data||[]).map(x=>row('💰',esc(x.name),tname(x.trip_id),x.trip_id,'budget')),
    ...(pk?.data||[]).map(x=>row('🧳',esc(x.name),tname(x.trip_id),x.trip_id,'packing')),
  ];
  box.innerHTML=out.length?out.join(''):'<p class="muted" style="font-size:13px">Nothing found for “'+esc(raw)+'”.</p>';
}

/* ═══════════════════════════════════════════════
   MOBILE GESTURES — swipe tabs, pull-to-refresh,
   long-press actions, collapsing header
═══════════════════════════════════════════════ */
let CUR_TABS=[];
let SWIPE=null;
let PTR=null;
let LP_TIMER=null,LP_FIRED=false;

document.addEventListener('touchstart',e=>{
  const t0=e.touches[0];
  const modalOpen=!!document.getElementById('modalRoot').innerHTML;
  // Swipe between tabs (not on the map/scrollers/inputs, not in modals)
  SWIPE=(CUR.view==='trip'&&!modalOpen&&!e.target.closest('#tripMap,.wx-row,.trip-tabs,.ppl-dropdown,.mob-menu-drop,input,textarea,select'))
    ?{x:t0.clientX,y:t0.clientY,t:Date.now()}:null;
  // Pull-to-refresh (only from the very top of the page)
  PTR=(window.scrollY<=2&&!modalOpen)?{y0:t0.clientY,pulled:0}:null;
  // Long-press on activity cards → quick actions
  const card=e.target.closest('.event-card[data-ev]');
  clearTimeout(LP_TIMER);LP_FIRED=false;
  if(card&&!modalOpen){
    LP_TIMER=setTimeout(()=>{LP_FIRED=true;navigator.vibrate?.(10);eventActionSheet(card.dataset.ev);},550);
  }
},{passive:true});

document.addEventListener('touchmove',e=>{
  clearTimeout(LP_TIMER);
  // Live swipe feedback: the tab content follows the finger with a rubber-band feel
  if(SWIPE){
    const t0=e.touches[0];
    const dx=t0.clientX-SWIPE.x,dy=t0.clientY-SWIPE.y;
    const el=document.getElementById('tabContent');
    if(el&&Math.abs(dx)>18&&Math.abs(dx)>Math.abs(dy)*1.5){
      SWIPE.tracking=true;
      const idx=CUR_TABS.indexOf(CUR.tab);
      // stiffen at the ends of the tab row so it feels like an edge
      const atEdge=(dx>0&&idx<=0)||(dx<0&&idx>=CUR_TABS.length-1);
      const pull=dx*(atEdge?0.12:0.35);
      el.style.transform=`translateX(${pull}px)`;
      el.style.opacity=String(1-Math.min(.3,Math.abs(pull)/420));
    }
  }
  if(!PTR)return;
  PTR.pulled=e.touches[0].clientY-PTR.y0;
  if(PTR.pulled>18&&window.scrollY<=0){
    let el=document.getElementById('ptrPill');
    if(!el){el=document.createElement('div');el.id='ptrPill';document.body.appendChild(el);}
    el.textContent=PTR.pulled>80?'↻ Release to refresh':'↓ Pull to refresh';
  }
},{passive:true});

document.addEventListener('touchend',async e=>{
  clearTimeout(LP_TIMER);
  if(LP_FIRED){e.preventDefault();LP_FIRED=false;return;} // swallow the click after a long-press
  // Pull-to-refresh release
  const ptrEl=document.getElementById('ptrPill');
  const doRefresh=PTR&&PTR.pulled>80&&window.scrollY<=0;
  if(ptrEl&&!doRefresh)ptrEl.remove();
  if(doRefresh){
    PTR=null;
    ptrEl.textContent='↻ Refreshing…';
    try{
      if(CUR.view==='trip'&&CUR.tripId){await loadTripDetail(CUR.tripId);renderTab();}
      else if(ME){await loadTrips();renderDashboard();}
      toast('Refreshed ✓');
    }finally{document.getElementById('ptrPill')?.remove();}
    return;
  }
  PTR=null;
  // Swipe between tabs
  if(!SWIPE)return;
  const t0=e.changedTouches[0];
  const dx=t0.clientX-SWIPE.x,dy=t0.clientY-SWIPE.y,dt=Date.now()-SWIPE.t;
  const wasTracking=SWIPE.tracking;
  SWIPE=null;
  // Spring the live-follow transform back (or hand off to the slide-in)
  const el=document.getElementById('tabContent');
  if(el&&wasTracking){
    el.style.transition='transform .22s cubic-bezier(.22,.9,.36,1),opacity .22s';
    el.style.transform='';el.style.opacity='';
    setTimeout(()=>{if(el)el.style.transition='';},240);
  }
  if(dt>600||Math.abs(dx)<70||Math.abs(dx)<Math.abs(dy)*2)return;
  const idx=CUR_TABS.indexOf(CUR.tab);
  if(idx<0)return;
  const next=dx<0?idx+1:idx-1;
  if(next<0||next>=CUR_TABS.length)return;
  if(el){el.style.transition='';el.style.transform='';el.style.opacity='';}
  setTab(CUR_TABS[next]);
},{passive:false});

// Collapsing header: hide on scroll down, reveal on scroll up (mobile only)
let LASTY=0,HDR_HIDDEN=false;
window.addEventListener('scroll',()=>{
  if(!window.matchMedia('(max-width:680px)').matches)return;
  const y=window.scrollY;
  const down=y>LASTY&&y>90;
  if(down!==HDR_HIDDEN){HDR_HIDDEN=down;document.body.classList.toggle('hdr-hide',down);}
  LASTY=y;
},{passive:true});

/* ── Touch drag: hold the ⠿ handle and drop an activity on another day ── */
let TDRAG=null;
function touchDragStart(e,evId){
  e.preventDefault();e.stopPropagation();
  const card=e.target.closest('.event-card');if(!card)return;
  const touch=e.touches[0];
  const r=card.getBoundingClientRect();
  const ghost=card.cloneNode(true);
  ghost.classList.add('drag-ghost');
  ghost.style.width=r.width+'px';
  document.body.appendChild(ghost);
  TDRAG={evId,ghost,offX:touch.clientX-r.left,offY:touch.clientY-r.top};
  positionDragGhost(touch);
  card.style.opacity='.35';
  TDRAG.src=card;
  navigator.vibrate?.(10);
  document.addEventListener('touchmove',touchDragMove,{passive:false});
  document.addEventListener('touchend',touchDragEnd);
}
function positionDragGhost(t){
  TDRAG.ghost.style.left=(t.clientX-TDRAG.offX)+'px';
  TDRAG.ghost.style.top=(t.clientY-TDRAG.offY)+'px';
}
function touchDragMove(e){
  if(!TDRAG)return;
  e.preventDefault(); // the page must not scroll under the drag…
  const t=e.touches[0];
  positionDragGhost(t);
  document.querySelectorAll('.day-block.drag-over').forEach(x=>x.classList.remove('drag-over'));
  const day=document.elementFromPoint(t.clientX,t.clientY)?.closest('.day-block');
  if(day)day.classList.add('drag-over');
  // …but auto-scroll near the screen edges so far-away days are reachable
  if(t.clientY<110)window.scrollBy(0,-14);
  else if(t.clientY>innerHeight-110)window.scrollBy(0,14);
}
function touchDragEnd(e){
  document.removeEventListener('touchmove',touchDragMove);
  document.removeEventListener('touchend',touchDragEnd);
  if(!TDRAG)return;
  const t=e.changedTouches[0];
  TDRAG.ghost.remove();
  if(TDRAG.src)TDRAG.src.style.opacity='';
  document.querySelectorAll('.day-block.drag-over').forEach(x=>x.classList.remove('drag-over'));
  const day=document.elementFromPoint(t.clientX,t.clientY)?.closest('.day-block');
  const evId=TDRAG.evId;
  TDRAG=null;
  if(day&&day.id?.startsWith('day-')){
    const date=day.id.slice(4);
    const ev=(TD[CUR.tripId]?.events||[]).find(x=>x.id===evId);
    if(ev&&ev.date!==date){navigator.vibrate?.(15);assignEventToDay(CUR.tripId,evId,date);}
  }
}

if('serviceWorker' in navigator){
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(refreshing)return;
    refreshing=true;
    window.location.reload();
  });

  navigator.serviceWorker.register('/sw.js').then(reg=>{
    // Force an immediate update check on every page load.
    // Without this, browsers can delay the check by up to 24 hours,
    // keeping an old (potentially broken) SW in control.
    reg.update().catch(()=>{});
  }).catch(()=>{});

  // Safety net: if the page looks blank 4 seconds after load and a SW
  // is still controlling, the old SW likely served stale broken content.
  // Unregister it so the next load goes straight to the network.
  setTimeout(async()=>{
    if(!navigator.serviceWorker.controller)return;
    const root=document.getElementById('root');
    if(root&&root.innerHTML.trim().length<30){
      const reg=await navigator.serviceWorker.getRegistration().catch(()=>null);
      if(reg)await reg.unregister().catch(()=>{});
      window.location.reload();
    }
  },4000);
}
