<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhereToNext</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --bg:#080e1c; --bg2:#0d1526; --panel:#111b2e; --panel2:#172036;
  --border:#1e2d45; --border2:#253450;
  --text:#f0f4ff; --muted:#7a90b8; --dim:#3d5275;
  --gold:#f5c542; --gold2:#ffe07a;
  --blue:#4a90e2; --cyan:#22d3ee; --green:#34d399;
  --coral:#f87171; --purple:#a78bfa; --orange:#fb923c; --pink:#f472b6;
  --radius:14px; --shadow:0 8px 32px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
h1,h2,h3{font-family:'Playfair Display',Georgia,serif}
a{color:var(--blue);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;transition:.15s}
input,textarea,select{font-family:inherit;background:var(--panel2);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:9px 12px;font-size:14px;width:100%;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,197,66,.12)}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px;font-weight:500;letter-spacing:.4px;text-transform:uppercase}
select option{background:var(--panel)}
.field{margin-bottom:14px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.flex1{flex:1;min-width:0}
.muted{color:var(--muted)}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:20px;background:var(--panel2);border:1px solid var(--border2);color:var(--muted);font-weight:500}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid var(--border2);background:var(--panel2);color:var(--text);cursor:pointer;transition:.15s;white-space:nowrap}
.btn:hover{background:var(--panel);transform:translateY(-1px)}
.btn.primary{background:linear-gradient(135deg,#3b6fd4,#2451a8);border-color:#3b6fd4;color:#fff;box-shadow:0 4px 16px rgba(59,111,212,.35)}
.btn.primary:hover{background:linear-gradient(135deg,#4a7fe4,#2f5fc0)}
.btn.gold{background:linear-gradient(135deg,#e8a800,#c47f00);border-color:#e8a800;color:#1a0f00;box-shadow:0 4px 16px rgba(245,197,66,.3)}
.btn.danger{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3);color:var(--coral)}
.btn.sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn.ghost{background:transparent;border-color:transparent}
.btn.ghost:hover{background:var(--panel2)}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.empty{text-align:center;padding:48px 24px;color:var(--muted);border:1px dashed var(--border2);border-radius:var(--radius)}
.empty .icon{font-size:48px;margin-bottom:12px}

/* ── Header ── */
#appHeader{position:sticky;top:0;z-index:50;background:rgba(8,14,28,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:16px}
.brand{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;cursor:pointer;flex-shrink:0}
.brand span{font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--muted);display:block;letter-spacing:2px;text-transform:uppercase;margin-top:-4px}
#breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);flex:1;min-width:0}
#breadcrumb .sep{color:var(--dim)}
#breadcrumb .crumb{color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#headerActions{display:flex;gap:8px;flex-shrink:0}

/* ── Dashboard ── */
#dashboard{max-width:1300px;margin:0 auto;padding:32px 24px}
.dash-hero{margin-bottom:40px}
.dash-hero h1{font-size:clamp(28px,5vw,48px);font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,#fff 40%,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.dash-hero p{color:var(--muted);font-size:15px}
.trip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.trip-card{border-radius:18px;overflow:hidden;cursor:pointer;position:relative;border:1px solid var(--border);transition:.2s;box-shadow:var(--shadow)}
.trip-card:hover{transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,.6);border-color:var(--border2)}
.trip-card-cover{height:160px;position:relative;display:flex;align-items:flex-end;padding:16px}
.trip-card-cover .dest-emoji{position:absolute;top:16px;right:16px;font-size:40px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.trip-card-cover .status-badge{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:20px;backdrop-filter:blur(8px)}
.trip-card-body{background:var(--panel);padding:16px}
.trip-card-body h3{font-size:17px;font-weight:700;margin-bottom:4px;font-family:'Playfair Display',serif}
.trip-card-body .subtitle{font-size:12px;color:var(--muted);margin-bottom:12px}
.trip-meta{display:flex;gap:12px;flex-wrap:wrap}
.trip-meta-item{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}

/* ── Trip View ── */
#tripView{max-width:1300px;margin:0 auto;padding:0 24px 48px}
.trip-hero{height:260px;border-radius:0 0 24px 24px;display:flex;align-items:flex-end;padding:28px;position:relative;overflow:hidden;margin-bottom:0}
.trip-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(8,14,28,.95) 0%,rgba(8,14,28,.4) 60%,transparent 100%)}
.trip-hero-content{position:relative;z-index:1}
.trip-hero-content h1{font-size:clamp(24px,4vw,40px);font-weight:900;margin-bottom:6px}
.trip-hero-content .trip-dates{font-size:14px;color:rgba(255,255,255,.7);display:flex;gap:16px;flex-wrap:wrap}
.trip-hero-emoji{position:absolute;top:24px;right:32px;font-size:80px;z-index:1;filter:drop-shadow(0 4px 16px rgba(0,0,0,.5))}

/* ── Tabs ── */
.trip-tabs{display:flex;gap:2px;padding:16px 0 0;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;margin-bottom:24px}
.trip-tabs::-webkit-scrollbar{display:none}
.trip-tab{padding:10px 18px;font-size:13px;font-weight:600;color:var(--muted);background:transparent;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;cursor:pointer;transition:.15s;border-radius:0}
.trip-tab:hover{color:var(--text)}
.trip-tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ── Overview tab ── */
.overview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:6px}
.stat-card .stat-val{font-size:28px;font-weight:700;font-family:'Playfair Display',serif;color:var(--gold)}
.stat-card .stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.travelers-list{display:flex;flex-wrap:wrap;gap:10px}
.traveler-chip{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--border2);border-radius:30px;padding:6px 14px 6px 6px;font-size:13px}
.traveler-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.notes-area{width:100%;resize:vertical;min-height:100px;font-size:14px;line-height:1.6}

/* ── Itinerary / Timeline ── */
.day-block{margin-bottom:32px}
.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.day-label{display:flex;align-items:center;gap:12px}
.day-num{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.day-info h3{font-size:16px;font-weight:700;margin-bottom:2px}
.day-info .day-date{font-size:12px;color:var(--muted)}
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--border);border-radius:2px}
.tl-event{position:relative;margin-bottom:12px}
.tl-dot{position:absolute;left:-23px;top:14px;width:12px;height:12px;border-radius:50%;border:2px solid var(--bg);z-index:1}
.event-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:.15s;display:flex;gap:12px;align-items:flex-start}
.event-card:hover{border-color:var(--border2);background:var(--panel2)}
.event-card.confirmed{border-left:3px solid var(--green)}
.event-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.event-body{flex:1;min-width:0}
.event-title{font-weight:600;font-size:14px;margin-bottom:3px}
.event-meta{font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
.event-meta span{display:flex;align-items:center;gap:3px}
.event-cost{font-size:13px;font-weight:700;color:var(--gold);margin-left:auto;flex-shrink:0}

/* ── Stays / Flights ── */
.booking-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;cursor:pointer;transition:.15s}
.booking-card:hover{border-color:var(--border2)}
.booking-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:10px}
.booking-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.booking-title{font-weight:700;font-size:15px;margin-bottom:3px}
.booking-sub{font-size:13px;color:var(--muted)}
.booking-detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding-top:10px;border-top:1px solid var(--border)}
.booking-detail{font-size:12px}
.booking-detail .bd-label{color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px;font-size:10px}
.booking-detail .bd-val{font-weight:600;font-size:13px}
.conf-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.5px}
.conf-badge.confirmed{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.conf-badge.pending{background:rgba(251,146,60,.12);color:var(--orange);border:1px solid rgba(251,146,60,.3)}

/* ── Packing ── */
.pack-section{margin-bottom:24px}
.pack-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pack-section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);display:flex;align-items:center;gap:8px}
.pack-progress{flex:1;height:4px;background:var(--border);border-radius:4px;overflow:hidden;margin:0 12px}
.pack-progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width .3s}
.pack-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:var(--panel);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:.15s}
.pack-item:hover{border-color:var(--border2)}
.pack-item.packed .pack-name{text-decoration:line-through;color:var(--dim)}
.pack-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;transition:.15s}
.pack-item.packed .pack-check{background:var(--green);border-color:var(--green);color:#000}
.pack-name{flex:1;font-size:14px}
.pack-qty{font-size:12px;color:var(--muted);margin-right:4px}
.pack-del{font-size:12px;color:var(--dim);opacity:0;transition:.15s}
.pack-item:hover .pack-del{opacity:1}

/* ── Budget ── */
.budget-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.budget-stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px}
.budget-stat .bv{font-size:22px;font-weight:700;margin-bottom:2px}
.budget-stat .bl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.budget-item{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.15s}
.budget-item:hover{border-color:var(--border2)}
.budget-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.budget-item-name{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
.budget-amounts{display:flex;gap:16px;font-size:13px;margin-bottom:8px}
.budget-planned{color:var(--muted)}
.budget-actual{font-weight:600}
.budget-bar{height:6px;background:var(--border);border-radius:4px;overflow:hidden}
.budget-bar-fill{height:100%;border-radius:4px;transition:width .4s}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:grid;place-items:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow:auto;box-shadow:0 40px 100px rgba(0,0,0,.6)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:1}
.modal-header h2{font-size:18px;margin:0}
.modal-body{padding:22px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--panel)}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--gold);color:var(--text);padding:12px 22px;border-radius:30px;font-weight:600;font-size:14px;z-index:300;box-shadow:var(--shadow);animation:toastIn .25s ease-out}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Category colors ── */
.cat-flight{background:rgba(74,144,226,.15);color:#7ab4f0}
.cat-hotel{background:rgba(167,139,250,.15);color:#c4b0fc}
.cat-food{background:rgba(251,146,60,.15);color:#fca36a}
.cat-activity{background:rgba(34,211,238,.15);color:#67e8f9}
.cat-transport{background:rgba(52,211,153,.15);color:#6ee7b7}
.cat-shopping{background:rgba(244,114,182,.15);color:#f9a8d4}
.cat-sightseeing{background:rgba(245,197,66,.15);color:#fde68a}
.cat-other{background:rgba(122,144,184,.15);color:#a0b4d0}
.dot-flight{background:#4a90e2}.dot-hotel{background:#a78bfa}.dot-food{background:#fb923c}
.dot-activity{background:#22d3ee}.dot-transport{background:#34d399}.dot-shopping{background:#f472b6}
.dot-sightseeing{background:#f5c542}.dot-other{background:#7a90b8}

/* ── Section head ── */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.section-head h2{font-size:20px}

/* ── Color picker ── */
.gradient-picker{display:flex;gap:8px;flex-wrap:wrap}
.gp-swatch{width:36px;height:36px;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:.15s}
.gp-swatch.sel{border-color:#fff;transform:scale(1.1)}

/* ── Responsive ── */
@media(max-width:680px){
  #appHeader{padding:0 14px}
  #dashboard,#tripView{padding:16px 14px 60px}
  .trip-hero{height:200px;padding:18px;border-radius:0 0 18px 18px}
  .modal{border-radius:18px 18px 0 0;max-height:94vh}
  .modal-bg{padding:0;align-items:flex-end}
}
@media print{
  #appHeader,#headerActions,.btn,.trip-tabs{display:none!important}
  body{background:#fff;color:#000}
  .card,.booking-card,.event-card{box-shadow:none;border:1px solid #ddd}
}
</style>
</head>
<body>

<header id="appHeader">
  <div class="brand" onclick="goHome()">✈ WhereToNext<span>Travel Planner</span></div>
  <div id="breadcrumb"></div>
  <div id="headerActions"></div>
</header>

<div id="root"></div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script>
/* ═══════════════════════════════════════════════
   GOOGLE OAUTH
═══════════════════════════════════════════════ */
const GOOGLE_CLIENT_ID = '823726634509-gglt0bbfhcn67gscifsmrj6p4h7blnmi.apps.googleusercontent.com';
let GUSER = null;

function initGoogleAuth() {
  const saved = localStorage.getItem('wtn_guser');
  if (saved) { try { GUSER = JSON.parse(saved); } catch(e){} }

  if (!GUSER) { showAuthWall(); return; }
  renderAuthHeader();
  bootApp();
}

function showAuthWall() {
  document.getElementById('root').innerHTML = `
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">
    <div style="font-size:72px;margin-bottom:16px">✈</div>
    <h1 style="font-size:36px;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent">WhereToNext</h1>
    <p style="color:var(--muted);font-size:16px;margin-bottom:40px;max-width:380px">Plan every detail of your adventures — flights, stays, day-by-day itineraries, packing & budget.</p>
    <div id="googleSignInBtn"></div>
    <p style="color:var(--dim);font-size:12px;margin-top:24px">Your trips are saved locally on this device.</p>
  </div>`;

  if (typeof google !== 'undefined') renderGoogleBtn();
  else { document.querySelector('script[src*="gsi"]').addEventListener('load', renderGoogleBtn); }
}

function renderGoogleBtn() {
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleGoogleSignIn,
    auto_select: false,
  });
  google.accounts.id.renderButton(document.getElementById('googleSignInBtn'), {
    theme: 'filled_black', size: 'large', text: 'continue_with', shape: 'pill', width: 280,
  });
}

function handleGoogleSignIn(response) {
  const payload = parseJwt(response.credential);
  GUSER = { name: payload.name, email: payload.email, picture: payload.picture, sub: payload.sub };
  localStorage.setItem('wtn_guser', JSON.stringify(GUSER));
  renderAuthHeader();
  bootApp();
}

function parseJwt(token) {
  const base64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(atob(base64));
}

function signOut() {
  if (typeof google !== 'undefined') google.accounts.id.disableAutoSelect();
  GUSER = null;
  localStorage.removeItem('wtn_guser');
  document.getElementById('root').innerHTML = '';
  showAuthWall();
  document.getElementById('headerActions').innerHTML = '';
  document.getElementById('breadcrumb').innerHTML = '';
}

function renderAuthHeader() {
  if (!GUSER) return;
  document.getElementById('headerActions').innerHTML = `
  <div style="display:flex;align-items:center;gap:10px">
    <img src="${GUSER.picture}" alt="" style="width:30px;height:30px;border-radius:50%;border:2px solid var(--border2)">
    <span style="font-size:13px;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(GUSER.name.split(' ')[0])}</span>
    <button class="btn sm ghost" onclick="signOut()" title="Sign out">↩</button>
  </div>`;
}

function bootApp() {
  load();
  if (!STATE.trips.length) seedDemo();
  render();
}

/* ═══════════════════════════════════════════════
   STATE & STORAGE
═══════════════════════════════════════════════ */
function uid(){return Math.random().toString(36).slice(2,9)}
const KEY='wanderplan_v1';
let STATE={trips:[],events:[],stays:[],flights:[],packItems:[],budgetItems:[]};
function load(){try{const r=localStorage.getItem(KEY);if(r)STATE=JSON.parse(r);}catch(e){}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(STATE));}catch(e){}}

/* ═══════════════════════════════════════════════
   ROUTER
═══════════════════════════════════════════════ */
let CUR={view:'dashboard',tripId:null,tab:'overview'};
function goHome(){CUR={view:'dashboard',tripId:null,tab:'overview'};render();}
function openTrip(id,tab='overview'){CUR={view:'trip',tripId:id,tab};render();}
function setTab(tab){CUR.tab=tab;renderTripView();}

/* ═══════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════ */
function esc(s){return(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function fmt(iso){if(!iso)return'';const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function fmtShort(iso){if(!iso)return'';const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function fmtDay(iso){if(!iso)return'';const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function diffDays(a,b){return Math.round((new Date(b)-new Date(a))/(1000*60*60*24))}
function countdown(startIso){
  const now=new Date(),start=new Date(startIso+'T00:00:00');
  const diff=Math.ceil((start-now)/(1000*60*60*24));
  if(diff>0)return`in ${diff} day${diff===1?'':'s'}`;
  if(diff===0)return'Today!';
  const end=STATE.trips.find(t=>t.startDate===startIso);
  return`${Math.abs(diff)}d ago`;
}
function tripCountdown(trip){
  const now=new Date();
  const start=new Date(trip.startDate+'T00:00:00');
  const end=new Date(trip.endDate+'T23:59:59');
  if(now<start){const d=Math.ceil((start-now)/(864e5));return{label:`in ${d} day${d===1?'':'s'}`,status:'upcoming'}}
  if(now<=end)return{label:'Happening now!',status:'active'};
  return{label:'Completed',status:'past'};
}
function tripDays(trip){
  if(!trip.startDate||!trip.endDate)return[];
  const days=[];let d=new Date(trip.startDate+'T12:00:00');
  const end=new Date(trip.endDate+'T12:00:00');
  while(d<=end){days.push(d.toISOString().slice(0,10));d=new Date(d.getTime()+864e5);}
  return days;
}
function formatCost(amt,currency){if(!amt)return'';return`${currency||'$'}${Number(amt).toLocaleString()}`}
function toast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.getElementById('toastRoot').appendChild(t);
  setTimeout(()=>t.remove(),2200);
}
function $(s,r=document){return r.querySelector(s)}
function $$(s,r=document){return [...r.querySelectorAll(s)]}

function renderDashboard(){
  document.getElementById('breadcrumb').innerHTML='';

  const trips=STATE.trips;

    <div class="dash-hero">
      <h1>Your Adventures</h1>

function tripCard(t){
  const cd=tripCountdown(t);
  const days=t.startDate&&t.endDate?diffDays(t.startDate,t.endDate)+1:0;
  const evCount=STATE.events.filter(e=>e.tripId===t.id).length;
  const statusColor=cd.status==='active'?'rgba(52,211,153,.8)':cd.status==='upcoming'?'rgba(74,144,226,.8)':'rgba(122,144,184,.6)';
  const budget=STATE.budgetItems.filter(b=>b.tripId===t.id).reduce((a,b)=>a+(+b.planned||0),0);
  return`<div class="trip-card" onclick="openTrip('${t.id}')">
    <div class="trip-card-cover" style="background:${GRADIENTS[t.gradientIdx||0]}">
      <div class="dest-emoji">${t.emoji||'🌍'}</div>
      <span class="status-badge" style="background:${statusColor};color:#fff">${cd.label}</span>
    </div>
    <div class="trip-card-body">
      <h3>${esc(t.name)}</h3>
      <div class="subtitle">${esc(t.destination)}${t.country?' · '+esc(t.country):''}</div>
      <div class="trip-meta">
        ${t.startDate?`<div class="trip-meta-item">📅 ${fmtShort(t.startDate)}${t.endDate?' – '+fmtShort(t.endDate):''}${days?` (${days}d)`:''}</div>`:''}
        ${evCount?`<div class="trip-meta-item">🗓 ${evCount} event${evCount>1?'s':''}</div>`:''}
        ${budget?`<div class="trip-meta-item">💰 ${formatCost(budget,t.currency)}</div>`:''}
        ${t.travelers&&t.travelers.length?`<div class="trip-meta-item">👥 ${t.travelers.length} traveler${t.travelers.length>1?'s':''}</div>`:''}
      </div>
    </div>
  </div>`;
}

function renderTripView(){

    <span class="sep" style="cursor:pointer;color:var(--muted)" onclick="goHome()">Trips</span>
    <span class="sep">›</span>
    <span class="crumb">${esc(t.name)}</span>`;
  document.getElementById('headerActions').innerHTML=`
    <button class="btn sm ghost" onclick="window.print()" title="Print itinerary">🖨 Print</button>
    <button class="btn sm ghost" onclick="modalTrip('${t.id}')">✎ Edit</button>
    <button class="btn sm danger" onclick="deleteTrip('${t.id}')">🗑</button>`;

  const TABS=[
    {id:'overview',icon:'📋',label:'Overview'},
    {id:'itinerary',icon:'🗓',label:'Itinerary'},
    {id:'flights',icon:'✈️',label:'Flights'},
    {id:'stays',icon:'🏨',label:'Stays'},
    {id:'activities',icon:'🎭',label:'Activities'},
    {id:'packing',icon:'🧳',label:'Packing'},
    {id:'budget',icon:'💰',label:'Budget'},
  ];

      <div class="trip-hero-emoji">${t.emoji||'🌍'}</div>
      <div class="trip-hero-content">
        <h1>${esc(t.name)}</h1>
        <div class="trip-dates">
          <span>📍 ${esc(t.destination)}${t.country?' · '+esc(t.country):''}</span>
          ${t.startDate?`<span>📅 ${fmt(t.startDate)}${t.endDate?' → '+fmt(t.endDate):''}${days?' ('+days+' days)':''}</span>`:''}
          <span>${cd.label}</span>
        </div>
      </div>
    </div>
    <div class="trip-tabs">
      ${TABS.map(tb=>`<button class="trip-tab${CUR.tab===tb.id?' active':''}" onclick="setTab('${tb.id}')">${tb.icon} ${tb.label}</button>`).join('')}
    </div>
    <div id="tabContent"></div>
  </div>`;

  renderTab();
}

function renderTab(){
  const t=STATE.trips.find(x=>x.id===CUR.tripId);if(!t)return;
  const el=document.getElementById('tabContent');if(!el)return;
  if(CUR.tab==='overview')el.innerHTML=renderOverview(t);
  else if(CUR.tab==='itinerary')el.innerHTML=renderItinerary(t);
  else if(CUR.tab==='flights')el.innerHTML=renderFlights(t);
  else if(CUR.tab==='stays')el.innerHTML=renderStays(t);
  else if(CUR.tab==='activities')el.innerHTML=renderActivities(t);
  else if(CUR.tab==='packing')el.innerHTML=renderPacking(t);
  else if(CUR.tab==='budget')el.innerHTML=renderBudget(t);
}

/* ── Overview ── */
function renderOverview(t){
  const days=t.startDate&&t.endDate?diffDays(t.startDate,t.endDate)+1:0;
  const evCount=STATE.events.filter(e=>e.tripId===t.id).length;
  const flCount=STATE.flights.filter(f=>f.tripId===t.id).length;
  const stCount=STATE.stays.filter(s=>s.tripId===t.id).length;
  const totalBudget=STATE.budgetItems.filter(b=>b.tripId===t.id).reduce((a,b)=>a+(+b.planned||0),0);
  const totalActual=STATE.budgetItems.filter(b=>b.tripId===t.id).reduce((a,b)=>a+(+b.actual||0),0);
  const travelers=t.travelers||[];
  return`
  <div class="overview-grid">
    <div class="stat-card"><div class="stat-val">${days||'—'}</div><div class="stat-label">Days</div></div>
    <div class="stat-card"><div class="stat-val">${evCount}</div><div class="stat-label">Events Planned</div></div>
    <div class="stat-card"><div class="stat-val">${flCount}</div><div class="stat-label">Flights</div></div>
    <div class="stat-card"><div class="stat-val">${stCount}</div><div class="stat-label">Stays</div></div>
    ${totalBudget?`<div class="stat-card"><div class="stat-val" style="font-size:20px">${formatCost(totalBudget,t.currency)}</div><div class="stat-label">Budget</div></div>`:''}
    ${totalActual?`<div class="stat-card"><div class="stat-val" style="font-size:20px;color:${totalActual>totalBudget?'var(--coral)':'var(--green)'}">${formatCost(totalActual,t.currency)}</div><div class="stat-label">Spent</div></div>`:''}
  </div>
  ${travelers.length?`
  <div class="card" style="margin-bottom:16px">
    <div class="section-head"><h2 style="font-size:16px">👥 Travelers</h2>
      <button class="btn sm ghost" onclick="modalTrip('${t.id}')">Edit</button></div>
    <div class="travelers-list">
      ${travelers.map((tv,i)=>`<div class="traveler-chip">
        <div class="traveler-avatar" style="background:${TRAVELER_COLORS[i%TRAVELER_COLORS.length]}20;color:${TRAVELER_COLORS[i%TRAVELER_COLORS.length]}">${(tv.name||'?')[0].toUpperCase()}</div>
        <div><div style="font-size:13px;font-weight:600">${esc(tv.name)}</div>${tv.role?`<div style="font-size:11px;color:var(--muted)">${esc(tv.role)}</div>`:''}</div>

  </div>`:''}

    <div class="section-head"><h2 style="font-size:16px">📝 Trip Notes</h2></div>
    <textarea class="notes-area" placeholder="Visa requirements, packing reminders, emergency contacts, local tips..."
      oninput="updateTripNotes('${t.id}',this.value)">${esc(t.notes||'')}</textarea>
  </div>
  ${t.emergencyContacts?`<div class="card">
    <h2 style="font-size:16px;margin-bottom:10px">🆘 Emergency Info</h2>
    <pre style="font-size:13px;color:var(--muted);white-space:pre-wrap;font-family:inherit">${esc(t.emergencyContacts)}</pre>
  </div>`:''}`;
}

/* ── Itinerary ── */
function renderItinerary(t){
  const days=tripDays(t);
  if(!days.length)return`<div class="empty"><div class="icon">🗓</div><p>Set trip dates to see your day-by-day itinerary.</p></div>`;
  const events=STATE.events.filter(e=>e.tripId===t.id);
  const dayColors=['#f5c542','#4a90e2','#34d399','#f472b6','#fb923c','#a78bfa','#22d3ee','#f87171','#67e8f9','#fde68a'];
  return`<div>
    ${days.map((date,idx)=>{
      const dayEvents=events.filter(e=>e.date===date).sort((a,b)=>(a.time||'23:59').localeCompare(b.time||'23:59'));
      const color=dayColors[idx%dayColors.length];
      return`<div class="day-block">
        <div class="day-header">
          <div class="day-label">
            <div class="day-num" style="background:${color}20;color:${color}">D${idx+1}</div>
            <div class="day-info">
              <h3>${fmtDay(date)}</h3>
              <div class="day-date">${dayEvents.length} event${dayEvents.length!==1?'s':''}</div>
            </div>
          </div>
          <button class="btn sm primary" onclick="modalEvent('${t.id}','${date}')">＋ Add Event</button>
        </div>
        <div class="timeline">
          ${dayEvents.length?dayEvents.map(ev=>eventCard(ev)).join(''):`
          <div style="color:var(--dim);font-size:13px;padding:8px 0 16px">No events — click + Add Event to plan this day.</div>`}
        </div>
      </div>`;
    }).join('')}
    <button class="btn primary" style="margin-top:8px" onclick="modalEvent('${t.id}')">＋ Add Event</button>
  </div>`;
}

function eventCard(ev){
  const cat=CATS[ev.category]||CATS.other;
  return`<div class="tl-event" onclick="modalEvent('${ev.tripId}',ev=>'${ev.id}',null,'${ev.id}')">
    <div class="tl-dot ${cat.dot}"></div>
    <div class="event-card ${ev.confirmed?'confirmed':''}">
      <div class="event-icon ${cat.cls}">${cat.icon}</div>
      <div class="event-body">
        <div class="event-title">${esc(ev.title)}</div>
        <div class="event-meta">
          ${ev.time?`<span>🕐 ${ev.time}${ev.duration?' · '+ev.duration+'m':''}</span>`:''}
          ${ev.location?`<span>📍 ${esc(ev.location)}</span>`:''}
          ${ev.confirmed?`<span style="color:var(--green)">✓ Confirmed</span>`:''}
          ${ev.notes?`<span style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📝 ${esc(ev.notes)}</span>`:''}
        </div>
      </div>
      ${ev.cost?`<div class="event-cost">${formatCost(ev.cost,ev.currency)}</div>`:''}
    </div>
  </div>`;
}

/* ── Packing ── */
function renderPacking(t){
  const items=STATE.packItems.filter(p=>p.tripId===t.id);
  const total=items.length,packed=items.filter(i=>i.packed).length;
  const byCategory={};
  items.forEach(i=>{(byCategory[i.category]=byCategory[i.category]||[]).push(i);});
  PACK_CATS.forEach(c=>{if(!byCategory[c])byCategory[c]=[];});
  return`<div>
    <div class="section-head">
      <h2>🧳 Packing List</h2>
      <div class="row">
        <span class="muted" style="align-self:center;font-size:13px">${packed}/${total} packed</span>

/* ── Budget ── */
function renderBudget(t){
  const items=STATE.budgetItems.filter(b=>b.tripId===t.id);
  const totalPlanned=items.reduce((a,b)=>a+(+b.planned||0),0);
  const totalActual=items.reduce((a,b)=>a+(+b.actual||0),0);
  const over=totalActual>totalPlanned&&totalPlanned>0;
  const pct=totalPlanned?Math.min(100,Math.round(totalActual/totalPlanned*100)):0;
  const byCategory={};
  items.forEach(i=>{(byCategory[i.category]=byCategory[i.category]||[]).push(i);});
  return`<div>
    <div class="section-head"><h2>💰 Budget Tracker</h2>
      <button class="btn primary" onclick="modalBudgetItem('${t.id}')">＋ Add Item</button>
    </div>
    ${items.length?`
    <div class="budget-summary">
      <div class="budget-stat">
        <div class="bv" style="color:var(--blue)">${formatCost(totalPlanned,t.currency)}</div>
        <div class="bl">Total Budget</div>
      </div>
      <div class="budget-stat">
        <div class="bv" style="color:${over?'var(--coral)':'var(--green)'}">${formatCost(totalActual,t.currency)}</div>
        <div class="bl">Total Spent</div>
      </div>
      <div class="budget-stat">
        <div class="bv" style="color:${over?'var(--coral)':'var(--muted)'}">${over?'−':''}${formatCost(Math.abs(totalPlanned-totalActual),t.currency)}</div>
        <div class="bl">${over?'Over Budget':'Remaining'}</div>
      </div>
    </div>
    <div style="height:8px;background:var(--border);border-radius:4px;margin-bottom:24px;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:${over?'var(--coral)':'linear-gradient(90deg,var(--blue),var(--cyan))'};border-radius:4px;transition:width .4s"></div>
    </div>
    ${Object.entries(byCategory).map(([cat,citems])=>{
      const cp=citems.reduce((a,b)=>a+(+b.planned||0),0);
      const ca=citems.reduce((a,b)=>a+(+b.actual||0),0);
      const over=ca>cp&&cp>0;
      const pct=cp?Math.min(100,Math.round(ca/cp*100)):0;
      return`<div style="margin-bottom:16px">
        <h3 style="font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">${cat}</h3>
        ${citems.map(item=>`
        <div class="budget-item" onclick="modalBudgetItem('${t.id}','${item.id}')">
          <div class="budget-item-header">
            <div class="budget-item-name">${esc(item.name)}</div>
            ${item.notes?`<span class="muted" style="font-size:12px">${esc(item.notes)}</span>`:''}
          </div>
          <div class="budget-amounts">
            <span class="budget-planned">Budget: ${formatCost(item.planned,t.currency)}</span>
            ${item.actual?`<span class="budget-actual" style="color:${+item.actual>+item.planned?'var(--coral)':'var(--green)'}">Actual: ${formatCost(item.actual,t.currency)}</span>`:'<span class="muted">Not spent yet</span>'}
          </div>
          ${item.planned?`<div class="budget-bar"><div class="budget-bar-fill" style="width:${item.actual?Math.min(100,Math.round(item.actual/item.planned*100)):0}%;background:${+item.actual>+item.planned?'var(--coral)':'var(--green)'}"></div></div>`:''}
        </div>`).join('')}
      </div>`;
    }).join('')}`
    :`<div class="empty"><div class="icon">💰</div><p>No budget items yet. Track your planned and actual spending.</p></div>`}
  </div>`;
}

  <div class="field"><label>Notes</label><input id="pk_notes" placeholder="Optional note"></div>
  <div class="modal-footer" style="margin:0 -22px -22px;border-radius:0 0 20px 20px">
    <button class="btn ghost" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="savePackItem('${tripId}')">Add Item</button>
  </div>`);
  setTimeout(()=>$('#pk_name')&&$('#pk_name').focus(),50);
}
function savePackItem(tripId){
  const name=$('#pk_name').value.trim();if(!name){toast('Item name required');return;}
  STATE.packItems.push({id:uid(),tripId,name,category:$('#pk_cat').value,qty:+$('#pk_qty').value||1,notes:$('#pk_notes').value.trim(),packed:false});
  save();closeModal();renderTab();toast('Item added ✓');
}
function togglePack(id){const i=STATE.packItems.find(x=>x.id===id);if(!i)return;i.packed=!i.packed;save();renderTab();}
function deletePackItem(id){STATE.packItems=STATE.packItems.filter(x=>x.id!==id);save();renderTab();}

/* ── Budget Modal ── */
function modalBudgetItem(tripId,bId){
  const b=bId?STATE.budgetItems.find(x=>x.id===bId):{};
  const t=STATE.trips.find(x=>x.id===tripId);
  modal(bId?'Edit Budget Item':'Add Budget Item',`
  <div class="field"><label>Description</label><input id="b_name" value="${esc(b.name||'')}" placeholder="e.g. Round-trip flights, Hotel nights"></div>
  <div class="field"><label>Category</label>
    <select id="b_cat">${BUDGET_CATS.map(c=>`<option${c===(b.category||'Misc')?' selected':''}>${c}</option>`).join('')}</select>
  </div>
  <div class="row">
    <div class="field flex1"><label>Planned (${t?.currency||'$'})</label><input id="b_plan" type="number" value="${b.planned||''}" placeholder="0"></div>
    <div class="field flex1"><label>Actual Spent (${t?.currency||'$'})</label><input id="b_actual" type="number" value="${b.actual||''}" placeholder="0"></div>
  </div>
  <div class="field"><label>Notes</label><input id="b_notes" value="${esc(b.notes||'')}" placeholder="e.g. Booked on Booking.com"></div>
  <div class="modal-footer" style="margin:0 -22px -22px;border-radius:0 0 20px 20px">
    ${bId?`<button class="btn danger" onclick="deleteBudgetItem('${bId}')">Delete</button>`:''}
    <button class="btn ghost" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="saveBudgetItem('${tripId}','${bId||''}')">Save</button>
  </div>`);
}
function saveBudgetItem(tripId,bId){
  const name=$('#b_name').value.trim();if(!name){toast('Description required');return;}
  const data={tripId,name,category:$('#b_cat').value,planned:$('#b_plan').value,actual:$('#b_actual').value,notes:$('#b_notes').value.trim()};
  if(bId){Object.assign(STATE.budgetItems.find(b=>b.id===bId),data);}
  else{STATE.budgetItems.push({id:uid(),...data});}
  save();closeModal();renderTab();toast(bId?'Updated':'Budget item added ✓');
}
function deleteBudgetItem(id){STATE.budgetItems=STATE.budgetItems.filter(x=>x.id!==id);save();closeModal();renderTab();}

/* ═══════════════════════════════════════════════
   MUTATIONS
═══════════════════════════════════════════════ */
function updateTripNotes(id,notes){const t=STATE.trips.find(x=>x.id===id);if(t)t.notes=notes;save();}
function deleteTrip(id){
  if(!confirm('Delete this trip and all its data?'))return;
  STATE.trips=STATE.trips.filter(t=>t.id!==id);
  STATE.events=STATE.events.filter(e=>e.tripId!==id);
  STATE.flights=STATE.flights.filter(f=>f.tripId!==id);
  STATE.stays=STATE.stays.filter(s=>s.tripId!==id);
  STATE.packItems=STATE.packItems.filter(p=>p.tripId!==id);
  STATE.budgetItems=STATE.budgetItems.filter(b=>b.tripId!==id);
  save();closeModal();goHome();toast('Trip deleted');
}

/* ── Starter packing list ── */

  const starter=[
    {cat:'Documents',items:['Passport','Flight tickets','Hotel confirmations','Travel insurance','Visa','Driver\'s license','Emergency contacts']},
    {cat:'Clothing',items:['T-shirts','Pants/Jeans','Underwear','Socks','Jacket','Comfortable walking shoes','Sandals','Swimwear','Pajamas']},
    {cat:'Toiletries',items:['Toothbrush','Toothpaste','Deodorant','Shampoo','Conditioner','Face wash','Razor','Moisturizer','Sunscreen','Lip balm']},
    {cat:'Electronics',items:['Phone charger','Power bank','Universal adapter','Camera','Earphones/AirPods','Laptop']},
    {cat:'Health',items:['Prescription medication','Pain reliever','Antihistamine','Band-aids','Antidiarrheal','Hand sanitizer','Face masks','First aid kit']},
    {cat:'Misc',items:['Reusable water bottle','Day bag/backpack','Neck pillow','Eye mask','Umbrella','Snacks for travel','Local currency','Luggage locks']},
  ];
  starter.forEach(({cat,items})=>items.forEach(name=>STATE.packItems.push({id:uid(),tripId,name,category:cat,qty:1,notes:'',packed:false})));
  save();renderTab();toast('Starter packing list loaded ✓');
}
