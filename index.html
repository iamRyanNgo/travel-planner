<html lang="en">
<head>

<link rel="preload" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"></noscript>
<style>
:root {
  --bg:#080e1c; --bg2:#0d1526; --panel:#111b2e; --panel2:#172036;
  --border:#1e2d45; --border2:#253450;
  --text:#f0f4ff; --muted:#7a90b8; --dim:#3d5275;
  --gold:#f5c542; --gold2:#ffe07a;
  --blue:#4a90e2; --cyan:#22d3ee; --green:#34d399;
  --coral:#f87171; --purple:#a78bfa; --orange:#fb923c; --pink:#f472b6;
  --radius:14px; --shadow:0 8px 32px rgba(0,0,0,.45);
}
[data-theme="light"]{
  --bg:#f0f4ff;--bg2:#e8edf7;--panel:#ffffff;--panel2:#f4f6fb;
  --border:#d1d9ea;--border2:#b8c4d9;
  --text:#1a2540;--muted:#566685;--dim:#9aacc5;
  --gold:#9b6f00;--gold2:#c48800;
  --blue:#2563eb;--cyan:#0891b2;--green:#059669;
  --coral:#dc2626;--purple:#7c3aed;--orange:#ea580c;--pink:#db2777;
  --radius:14px;--shadow:0 8px 32px rgba(0,0,0,.1);
}
[data-theme="light"] #appHeader{background:rgba(240,244,255,.93)}
[data-theme="light"] .trip-hero::after{background:linear-gradient(to top,rgba(240,244,255,.97) 0%,rgba(240,244,255,.5) 60%,transparent 100%)}
[data-theme="light"] .trip-hero-content .trip-dates{color:rgba(26,37,64,.75)}
[data-theme="light"] .brand{background:linear-gradient(135deg,var(--text) 40%,var(--gold));-webkit-background-clip:text;background-clip:text}
[data-theme="light"] .dash-hero h1{background:linear-gradient(135deg,var(--text) 40%,var(--gold));-webkit-background-clip:text;background-clip:text}
[data-theme="light"] .loading-screen .brand-lg{background:linear-gradient(135deg,var(--text),var(--gold));-webkit-background-clip:text;background-clip:text}
[data-theme="light"] .auth-card h1{background:linear-gradient(135deg,var(--text),var(--gold));-webkit-background-clip:text;background-clip:text}
[data-theme="light"] .timeline::before{background:var(--border2)}
[data-theme="light"] .mob-menu-drop{box-shadow:0 8px 32px rgba(0,0,0,.2)}
[data-theme="light"] .tab-nav-drop{box-shadow:0 8px 32px rgba(0,0,0,.15)}
[data-theme="light"] .ppl-dropdown{box-shadow:0 8px 32px rgba(0,0,0,.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#root{overflow-x:clip}
h1,h2,h3{font-family:'Playfair Display',Georgia,serif}
a{color:var(--blue);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;transition:.15s}
input,textarea,select{font-family:inherit;background:var(--panel2);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:9px 12px;font-size:14px;width:100%;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,197,66,.12)}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px;font-weight:500;letter-spacing:.4px;text-transform:uppercase}
select option{background:var(--panel)}
.field{margin-bottom:14px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.flex1{flex:1;min-width:0}
.muted{color:var(--muted)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid var(--border2);background:var(--panel2);color:var(--text);cursor:pointer;transition:.15s;white-space:nowrap}
.btn:hover{background:var(--panel);transform:translateY(-1px)}
.btn.primary{background:linear-gradient(135deg,#3b6fd4,#2451a8);border-color:#3b6fd4;color:#fff;box-shadow:0 4px 16px rgba(59,111,212,.35)}
.btn.primary:hover{background:linear-gradient(135deg,#4a7fe4,#2f5fc0)}
.btn.gold{background:linear-gradient(135deg,#e8a800,#c47f00);border-color:#e8a800;color:#1a0f00}
.btn.danger{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3);color:var(--coral)}
.btn.sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn.ghost{background:transparent;border-color:transparent}
.btn.ghost:hover{background:var(--panel2)}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.empty{text-align:center;padding:48px 24px;color:var(--muted);border:1px dashed var(--border2);border-radius:var(--radius)}
.empty .icon{font-size:48px;margin-bottom:12px}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:20px;background:var(--panel2);border:1px solid var(--border2);color:var(--muted);font-weight:500}

/* ── Spinner ── */
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--muted)}
.loading-screen .brand-lg{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}

/* ── Auth screens ── */
.auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.auth-card{background:var(--panel);border:1px solid var(--border2);border-radius:20px;padding:36px 32px;width:100%;max-width:420px;box-shadow:var(--shadow)}
.auth-icon{font-size:56px;margin-bottom:12px}
.auth-card h1{font-size:32px;margin-bottom:6px;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.auth-card p{color:var(--muted);font-size:15px;line-height:1.6;margin-bottom:24px}
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:13px 20px;background:#fff;color:#1a1a1a;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit}
.google-btn:hover{background:#f0f0f0;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.google-btn svg{width:20px;height:20px;flex-shrink:0}
.divider{height:1px;background:var(--border);margin:20px 0}

/* ── Header ── */
#appHeader{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(8,14,28,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:16px;overflow:visible}
#root{padding-top:58px}
#headerActions{display:flex;gap:8px;flex-shrink:0;align-items:center}
.brand{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;cursor:pointer;flex-shrink:1;min-width:0}
.brand span{font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--muted);display:block;letter-spacing:2px;text-transform:uppercase;margin-top:-4px}
#breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);flex:1;min-width:0}
#breadcrumb .sep{color:var(--dim)}
#breadcrumb .crumb{color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#headerActions{display:flex;gap:8px;flex-shrink:0;align-items:center}
.user-chip{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;background:var(--panel2);border:1px solid var(--border2);border-radius:30px}
.user-chip img{width:26px;height:26px;border-radius:50%}
.user-chip span{font-size:13px;font-weight:500;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--coral);border:2px solid var(--bg)}

/* ── Dashboard ── */
#dashboard{max-width:1300px;margin:0 auto;padding:32px 24px}
.dash-hero{margin-bottom:40px}
.dash-hero h1{font-size:clamp(28px,5vw,48px);font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,#fff 40%,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.dash-hero p{color:var(--muted);font-size:15px}
.trip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.trip-card{border-radius:18px;overflow:hidden;cursor:pointer;position:relative;border:1px solid var(--border);transition:.2s;box-shadow:var(--shadow)}
.trip-card:hover{transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,.6);border-color:var(--border2)}
.trip-card-cover{height:160px;position:relative;display:flex;align-items:flex-end;padding:16px}
.trip-card-cover .dest-emoji{position:absolute;top:16px;right:16px;font-size:40px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.trip-card-cover .status-badge{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:20px;backdrop-filter:blur(8px)}
.trip-card-body{background:var(--panel);padding:16px}
.trip-card-body h3{font-size:17px;font-weight:700;margin-bottom:4px;font-family:'Playfair Display',serif}
.trip-card-body .subtitle{font-size:12px;color:var(--muted);margin-bottom:12px}
.trip-meta{display:flex;gap:12px;flex-wrap:wrap}
.trip-meta-item{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.shared-badge{font-size:10px;padding:2px 8px;background:rgba(74,144,226,.15);color:var(--blue);border:1px solid rgba(74,144,226,.25);border-radius:8px;font-weight:600}

/* ── Trip view ── */
#tripView{max-width:1300px;margin:0 auto;padding:0 24px 48px}
.trip-hero{height:260px;border-radius:0 0 24px 24px;display:flex;align-items:flex-end;padding:28px;position:relative;overflow:hidden}
.trip-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(8,14,28,.95) 0%,rgba(8,14,28,.4) 60%,transparent 100%)}
.trip-hero-content{position:relative;z-index:1}
.trip-hero-content h1{font-size:clamp(24px,4vw,40px);font-weight:900;margin-bottom:6px}
.trip-hero-content .trip-dates{font-size:14px;color:rgba(255,255,255,.7);display:flex;gap:16px;flex-wrap:wrap}
.trip-hero-emoji{position:absolute;top:24px;right:32px;font-size:80px;z-index:1;filter:drop-shadow(0 4px 16px rgba(0,0,0,.5))}
.btn-label{display:inline}
/* ── Horizontal tab bar (desktop) ── */
.trip-tabs-wrap{position:relative;margin-bottom:20px;padding-top:14px}
.trip-tabs-wrap::after{content:'';position:absolute;right:0;top:0;bottom:0;width:40px;background:linear-gradient(to right,transparent,var(--bg));pointer-events:none}
.trip-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:2px}
.trip-tabs::-webkit-scrollbar{display:none}
.trip-tab{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;color:var(--muted);background:none;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:.15s;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.trip-tab:hover{background:var(--panel2);color:var(--text);border-color:var(--border)}
.trip-tab.active{background:var(--panel2);color:var(--gold);border-color:var(--border2)}
/* ── Tab navigation dropdown (mobile header) ── */
.tab-nav-wrap{position:relative;flex-shrink:0;display:none}
.tab-nav-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--panel2);border:1px solid var(--border2);border-radius:8px;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;transition:.15s;font-family:inherit;white-space:nowrap}
.tab-nav-btn:hover,.tab-nav-btn:focus{background:var(--panel);border-color:var(--gold);color:var(--gold);outline:none}
.tab-nav-arrow{color:var(--muted);font-size:11px;margin-left:2px}
.tab-nav-drop{position:absolute;top:calc(100% + 4px);left:0;min-width:190px;background:var(--panel);border:1px solid var(--border2);border-radius:14px;padding:6px;box-shadow:0 16px 48px rgba(0,0,0,.5);z-index:100;animation:pplIn .15s ease-out}
.tab-nav-drop.hidden{display:none}
.tab-nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;font-size:14px;font-weight:500;color:var(--muted);background:none;border:none;border-radius:9px;cursor:pointer;text-align:left;font-family:inherit;transition:.12s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.tab-nav-item:hover{background:var(--panel2);color:var(--text)}
.tab-nav-item.active{color:var(--gold);font-weight:700;background:rgba(245,197,66,.07)}

/* ── Map ── */
#tripMap{height:min(65vh,560px);border-radius:16px;border:1px solid var(--border);background:var(--panel2);z-index:1}
.map-pin-wrap{background:none;border:none}
.map-pin{width:32px;height:32px;border-radius:50%;background:var(--panel);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 10px rgba(0,0,0,.45)}
.leaflet-popup-content-wrapper,.leaflet-popup-tip{background:var(--panel);color:var(--text)}
.leaflet-container a.leaflet-popup-close-button{color:var(--muted)}

.split-btn{padding:4px 9px;font-size:12px;flex-shrink:0;margin-left:8px}

/* ── Offline sync pill ── */
#syncPill{position:fixed;bottom:16px;left:16px;background:var(--panel);border:1px solid var(--gold);color:var(--gold);padding:9px 15px;border-radius:30px;font-size:12px;font-weight:600;z-index:9998;cursor:pointer;box-shadow:var(--shadow);animation:pplIn .2s ease-out}

/* ── Weather + Today ── */
.wx-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.wx-row::-webkit-scrollbar{display:none}
.wx-day{flex:1;min-width:64px;text-align:center;padding:10px 4px;border-radius:12px;border:1px solid transparent}
.wx-day.on-trip{background:rgba(245,197,66,.07);border-color:var(--border2)}
.wx-date{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.wx-icon{font-size:24px;margin:6px 0 4px}
.wx-temp{font-size:14px;font-weight:700}
.wx-temp.lo{font-size:12px;font-weight:500;color:var(--muted)}
.wx-rain{font-size:10px;color:var(--cyan);min-height:14px;margin-top:2px}
.today-card{margin-bottom:16px;border-color:var(--gold);box-shadow:0 0 0 1px rgba(245,197,66,.15)}
.today-row{display:flex;align-items:baseline;gap:8px;padding:6px 0;font-size:14px}
.today-time{font-size:12px;font-weight:700;color:var(--gold);min-width:44px;flex-shrink:0}

/* ── Overview ── */
.overview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px}
.stat-card .stat-val{font-size:28px;font-weight:700;font-family:'Playfair Display',serif;color:var(--gold)}
.stat-card .stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.fun-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:24px}
.fun-stat{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.fun-stat-icon{font-size:22px;flex-shrink:0;width:36px;text-align:center}
.fun-stat-body{}
.fun-stat-val{font-size:18px;font-weight:700;color:var(--text);line-height:1.2}
.fun-stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-top:2px}
.notes-area{width:100%;resize:vertical;min-height:100px;font-size:14px;line-height:1.6}

/* ── Members ── */
.member-card{display:flex;align-items:center;gap:12px;padding:12px;background:var(--panel2);border:1px solid var(--border2);border-radius:12px;margin-bottom:8px}
.member-avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--border2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
.member-info{flex:1;min-width:0}
.member-name{font-weight:600;font-size:14px}
.member-email{font-size:12px;color:var(--muted)}
.role-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.5px;text-transform:uppercase}
.role-badge.owner{background:rgba(245,197,66,.15);color:var(--gold);border:1px solid rgba(245,197,66,.3)}
.role-badge.editor{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.role-badge.viewer{background:rgba(122,144,184,.12);color:var(--muted);border:1px solid var(--border2)}

/* ── Timeline / Events ── */
.day-block{margin-bottom:32px}
.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;cursor:pointer;user-select:none}
.day-header:hover .day-num{opacity:.8}
.day-label{display:flex;align-items:center;gap:12px}
.day-num{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;transition:opacity .15s}
.day-info h3{font-size:16px;font-weight:700;margin-bottom:2px}
.day-info .day-date{font-size:12px;color:var(--muted)}
.day-collapse-btn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:4px;line-height:1;flex-shrink:0;transition:transform .2s}
.day-collapse-btn.collapsed{transform:rotate(-90deg)}
.itin-filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.itin-auto{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--panel);border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
.itin-auto.itin-flight{border-left:3px solid var(--blue)}
.itin-auto.itin-stay{border-left:3px solid var(--green)}
.itin-auto-icon{font-size:15px;width:28px;text-align:center;flex-shrink:0}
.itin-auto-body{flex:1;min-width:0}
.itin-auto-title{font-size:13px;font-weight:600}
.itin-auto-meta{font-size:11px;color:var(--muted);margin-top:1px}
.itin-auto-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;flex-shrink:0;cursor:pointer}
.itin-auto-tag.tag-flight{background:rgba(74,144,226,.15);color:var(--blue)}
.itin-auto-tag.tag-stay{background:rgba(52,211,153,.12);color:var(--green)}
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--border);border-radius:2px}
.tl-event{position:relative;margin-bottom:12px}
.tl-dot{position:absolute;left:-23px;top:14px;width:12px;height:12px;border-radius:50%;border:2px solid var(--bg);z-index:1}
.event-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:.15s;display:flex;gap:12px;align-items:flex-start}
.event-card:hover{border-color:var(--border2);background:var(--panel2)}
.event-card.confirmed{border-left:3px solid var(--green)}
.event-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.event-body{flex:1;min-width:0}
.event-title{font-weight:600;font-size:14px;margin-bottom:3px}
.event-meta{font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
.event-cost{font-size:13px;font-weight:700;color:var(--gold);flex-shrink:0}
.event-card-right{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:auto}
.photo-btn{background:none;border:1px solid var(--border2);color:var(--muted);font-size:11px;padding:3px 8px;border-radius:20px;cursor:pointer;transition:.15s;flex-shrink:0;line-height:1.4;white-space:nowrap}
.photo-btn:hover,.photo-btn.active{background:var(--border2);color:var(--text)}
.ev-photo-panel{padding:6px 0 4px 50px}
.photo-strip{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.photo-strip::-webkit-scrollbar{display:none}
.photo-strip a{flex-shrink:0;display:block}
.photo-strip-img{width:100px;height:70px;border-radius:8px;object-fit:cover;display:block;opacity:0;transition:opacity .3s}
.photo-strip-img.loaded{opacity:1}
.photo-strip-ig{flex-shrink:0;width:70px;height:70px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);border-radius:8px;font-size:10px;font-weight:700;color:#fff;text-decoration:none;text-align:center;line-height:1.5;padding:6px}
.photo-credit{font-size:10px;color:var(--dim);margin-top:5px}

/* ── Bookings ── */
.booking-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;cursor:pointer;transition:.15s}
.booking-card:hover{border-color:var(--border2)}
.booking-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:10px}
.booking-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.booking-title{font-weight:700;font-size:15px;margin-bottom:3px}
.booking-sub{font-size:13px;color:var(--muted)}
.booking-detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding-top:10px;border-top:1px solid var(--border)}
.booking-detail .bd-label{color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px;font-size:10px}
.booking-detail .bd-val{font-weight:600;font-size:13px}
.conf-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.5px}
.conf-badge.confirmed{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.conf-badge.pending{background:rgba(251,146,60,.12);color:var(--orange);border:1px solid rgba(251,146,60,.3)}
.conf-badge.partial{background:rgba(74,144,226,.12);color:var(--blue);border:1px solid rgba(74,144,226,.3)}
/* Flight round-trip card */
.fl-legs{padding:10px 0 2px}
.fl-leg{display:flex;align-items:center;gap:10px;padding:7px 0}
.fl-leg+.fl-leg{border-top:1px dashed var(--border)}
.fl-leg-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);width:30px;flex-shrink:0}
.fl-leg-ret .fl-leg-label{color:var(--blue)}
.fl-leg-route{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.fl-leg-point{flex:1;min-width:0}
.fl-leg-code{font-size:17px;font-weight:700;letter-spacing:.5px}
.fl-leg-time{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap}
.fl-leg-arrow{color:var(--dim);font-size:13px;flex-shrink:0}
.fl-return-toggle{border-top:1px solid var(--border);margin:14px 0 10px;padding-top:12px;display:flex;align-items:center;gap:10px}

/* ── Packing ── */
.pack-section{margin-bottom:24px}
.pack-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pack-section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);display:flex;align-items:center;gap:8px}
.pack-progress{flex:1;height:4px;background:var(--border);border-radius:4px;overflow:hidden;margin:0 12px}
.pack-progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width .3s}
.pack-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:var(--panel);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:.15s}
.pack-item:hover{border-color:var(--border2)}
.pack-item.packed .pack-name{text-decoration:line-through;color:var(--dim)}
.pack-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;transition:.15s}
.pack-item.packed .pack-check{background:var(--green);border-color:var(--green);color:#000}
.pack-name{flex:1;font-size:14px}
.pack-qty{font-size:12px;color:var(--muted);margin-right:4px}
.pack-del{font-size:12px;color:var(--dim);opacity:0;transition:.15s}
.pack-item:hover .pack-del{opacity:1}
.pack-cat-add{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:1px 6px;border-radius:6px;line-height:1;flex-shrink:0;transition:.15s}
.pack-cat-add:hover{background:var(--border);color:var(--text)}
.pack-quick-add{margin-bottom:8px}
.pack-quick-input{width:100%;box-sizing:border-box;background:var(--panel);border:1px dashed var(--border2);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px;outline:none;font-family:inherit}
.pack-quick-input:focus{border-color:var(--accent);border-style:solid}
.pack-quick-input::placeholder{color:var(--dim)}

/* ── Budget ── */
.budget-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.budget-stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px}
.budget-stat .bv{font-size:22px;font-weight:700;margin-bottom:2px}
.budget-stat .bl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.budget-item{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;transition:.15s}
.budget-item:hover{border-color:var(--border2)}
.budget-bar{height:6px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:8px}
.budget-bar-fill{height:100%;border-radius:4px;transition:width .4s}
.budget-group{margin-bottom:22px}
.budget-group-head{display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.budget-group-head.bg-conf{color:var(--green)}
.budget-group-head.bg-pot{color:var(--orange)}
.budget-line{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--panel);border:1px solid var(--border);border-radius:10px;margin-bottom:7px}
.budget-line-icon{font-size:16px;flex-shrink:0;width:24px;text-align:center}
.budget-line-body{flex:1;min-width:0}
.budget-line-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.budget-line-sub{font-size:11px;color:var(--muted);margin-top:1px}
.budget-line-amt{font-size:14px;font-weight:700;color:var(--gold);flex-shrink:0}

/* ── Travelers ── */
.traveler-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.traveler-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:.15s;position:relative}
.traveler-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.35)}
.traveler-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0}
.traveler-header{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.traveler-name{font-size:16px;font-weight:700;font-family:'Playfair Display',serif}
.traveler-role{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.traveler-fields{display:grid;gap:8px}
.traveler-field{display:flex;gap:8px;align-items:flex-start;font-size:13px}
.traveler-field-icon{font-size:14px;flex-shrink:0;width:20px;padding-top:1px;text-align:center}
.traveler-field-body{flex:1;min-width:0}
.traveler-field-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px;font-weight:600}
.traveler-field-val{color:var(--text);word-break:break-word}
.traveler-field-val.warn{color:var(--coral)}
.traveler-field-val.ok{color:var(--green)}
.traveler-section-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);border-top:1px solid var(--border);padding-top:12px;margin-top:4px}
.traveler-status{position:absolute;top:14px;right:14px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.traveler-status.complete{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.traveler-status.partial{background:rgba(251,146,60,.12);color:var(--orange);border:1px solid rgba(251,146,60,.25)}
.traveler-status.empty{background:rgba(122,144,184,.1);color:var(--muted);border:1px solid var(--border)}

/* ── Admin panel ── */
.admin-panel{background:rgba(248,113,113,.05);border:1px solid rgba(248,113,113,.2);border-radius:14px;padding:18px;margin-bottom:20px}
.admin-panel h3{font-size:14px;font-weight:700;color:var(--coral);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.req-card{background:var(--panel2);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:10px}
.req-card .req-name{font-weight:600;margin-bottom:2px}
.req-card .req-meta{font-size:12px;color:var(--muted);margin-bottom:8px}
.req-card .req-msg{font-size:13px;color:var(--text);background:var(--panel);border-radius:8px;padding:8px 10px;margin-bottom:10px;font-style:italic}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:grid;place-items:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow:auto;box-shadow:0 40px 100px rgba(0,0,0,.6)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:1}
.modal-header h2{font-size:18px;margin:0}
.modal-body{padding:22px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--panel)}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--gold);color:var(--text);padding:12px 22px;border-radius:30px;font-weight:600;font-size:14px;z-index:300;box-shadow:var(--shadow);animation:toastIn .25s ease-out}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Category colors ── */
.cat-flight{background:rgba(74,144,226,.15);color:#7ab4f0}.cat-hotel{background:rgba(167,139,250,.15);color:#c4b0fc}
.cat-food{background:rgba(251,146,60,.15);color:#fca36a}.cat-activity{background:rgba(34,211,238,.15);color:#67e8f9}
.cat-transport{background:rgba(52,211,153,.15);color:#6ee7b7}.cat-shopping{background:rgba(244,114,182,.15);color:#f9a8d4}
.cat-sightseeing{background:rgba(245,197,66,.15);color:#fde68a}.cat-other{background:rgba(122,144,184,.15);color:#a0b4d0}
.dot-flight{background:#4a90e2}.dot-hotel{background:#a78bfa}.dot-food{background:#fb923c}
.dot-activity{background:#22d3ee}.dot-transport{background:#34d399}.dot-shopping{background:#f472b6}
.dot-sightseeing{background:#f5c542}.dot-other{background:#7a90b8}

.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.section-head h2{font-size:20px}
.gradient-picker{display:flex;gap:8px;flex-wrap:wrap}
.gp-swatch{width:36px;height:36px;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:.15s}
.gp-swatch.sel{border-color:#fff;transform:scale(1.1)}
.banner-preview{width:100%;height:110px;border-radius:10px;background:var(--border2);background-size:cover;background-position:center;margin-bottom:8px}
.trip-card-cover.has-banner::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.45),transparent)}

button,a{touch-action:manipulation}
.modal{overscroll-behavior:contain}

@media(max-width:680px){
  #appHeader{padding:env(safe-area-inset-top,0) max(12px,env(safe-area-inset-right,12px)) 0 max(12px,env(safe-area-inset-left,12px));height:calc(58px + env(safe-area-inset-top,0px));gap:8px}
  #root{padding-top:calc(58px + env(safe-area-inset-top,0px))}
  #dashboard,#tripView{padding:16px 14px max(60px,calc(env(safe-area-inset-bottom,0px) + 24px))}
  .trip-hero{height:200px;padding:18px;border-radius:0 0 18px 18px}
  .modal{border-radius:18px 18px 0 0;max-height:min(94vh,94dvh)}
  .modal-bg{padding:0;align-items:flex-end}
  input,select,textarea{font-size:16px}
  .toast{bottom:max(24px,calc(env(safe-area-inset-bottom,0px) + 16px))}
  /* Header: hide breadcrumb + desktop-only actions; avatar opens the menu */
  #breadcrumb{display:none}
  .btn-label{display:none}
  .ha-desktop{display:none!important}
  /* Show header tab dropdown on mobile; hide horizontal bar */
  .tab-nav-wrap{display:flex}
  .trip-tabs-wrap{display:none}
  /* Prevent brand from crowding the people/avatar buttons */
  .brand{font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
  /* Event cards: tighter on mobile */
  .event-card{padding:10px}
  .event-icon{width:34px;height:34px;font-size:16px}
  .event-title{font-size:13px}
  /* Booking cards: tighter */
  .booking-card{padding:14px}
  .booking-detail-grid{grid-template-columns:1fr 1fr}
  /* Overview stat grid */
  .overview-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
  .stat-card .stat-val{font-size:22px}
}
/* ── Mobile overflow menu — triggered from avatar, dropdown portaled to body ── */
.ha-desktop{display:flex;gap:6px;align-items:center}
.mob-menu-drop{position:fixed;background:var(--panel);border:1px solid var(--border2);border-radius:14px;padding:6px;box-shadow:0 16px 48px rgba(0,0,0,.7);z-index:9999;min-width:170px;animation:pplIn .15s ease-out}
.mob-menu-drop.hidden{display:none}
.mob-menu-item{display:flex;align-items:center;gap:10px;width:100%;padding:11px 14px;font-size:14px;font-weight:500;color:var(--text);background:none;border:none;border-radius:9px;cursor:pointer;text-align:left;font-family:inherit;line-height:1;transition:.12s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.mob-menu-item:active{background:var(--panel2)}
.mob-menu-item.danger{color:var(--coral)}

/* ── People dropdown (nav bar) ── */
.ppl-wrap{position:relative}
.ppl-btn{display:inline-flex;align-items:center;gap:6px}
.ppl-count{background:var(--border2);border-radius:10px;font-size:11px;font-weight:700;padding:1px 6px;color:var(--muted)}
.ppl-dropdown{position:absolute;top:calc(100% + 10px);right:0;width:272px;background:var(--panel);border:1px solid var(--border2);border-radius:16px;box-shadow:0 24px 64px rgba(0,0,0,.7);z-index:150;padding:14px;animation:pplIn .15s ease-out}
.ppl-dropdown.hidden{display:none}
@keyframes pplIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.invite-link-section{border-top:1px solid var(--border);margin-top:10px;padding-top:10px}
.invite-link-row{display:flex;gap:6px;margin-bottom:6px}
.invite-url-inp{flex:1;font-size:11px;background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--muted);padding:5px 8px;outline:none;min-width:0;cursor:text}
.invite-role-row{display:flex;gap:6px;align-items:center}
.invite-role-row select{flex:1;font-size:12px;padding:4px 6px;border-radius:7px;background:var(--bg);border:1px solid var(--border2);color:var(--text)}
.sbar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
.sbar-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;font-weight:700;font-family:'DM Sans',sans-serif}
.sbar-member{display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid var(--border)}
.sbar-member:first-of-type{border-top:none;padding-top:0}
.sbar-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;object-fit:cover;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.sbar-info{flex:1;min-width:0}
.sbar-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sbar-role{font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.sbar-remove{color:var(--dim);background:none;border:none;font-size:12px;cursor:pointer;padding:2px 5px;border-radius:4px;transition:.15s;flex-shrink:0;opacity:0}
.sbar-member:hover .sbar-remove{opacity:1;color:var(--coral)}

@media(max-width:680px){
  .ppl-dropdown{right:auto;left:50%;transform:translateX(-50%)}
  .hide-sm{display:none!important}
  .user-chip span{display:none}
  .user-chip{padding:2px 4px}
  .trip-hero-emoji{font-size:52px;top:14px;right:16px}
}
@media(hover:none),(pointer:coarse){
  .pack-del,.sbar-remove{opacity:.55}
}

/* ── Print selector modal ── */
.print-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.print-check-card{position:relative;border:2px solid var(--border);border-radius:12px;padding:14px 10px 12px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:5px;user-select:none;-webkit-tap-highlight-color:transparent}
.print-check-card:has(input:checked){border-color:var(--gold);background:rgba(245,197,66,.07)}
.print-check-card input{position:absolute;top:8px;right:8px;accent-color:var(--gold);width:15px;height:15px;cursor:pointer;flex-shrink:0}
.pcc-icon{font-size:22px;pointer-events:none}
.pcc-label{font-size:11px;font-weight:700;color:var(--text);text-align:center;pointer-events:none;text-transform:uppercase;letter-spacing:.4px}
.print-sel-row{display:flex;gap:6px;margin-bottom:14px}
.print-sel-btn{font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:20px;padding:3px 10px;cursor:pointer;font-family:inherit;transition:.12s}
.print-sel-btn:hover{color:var(--text);border-color:var(--border2)}

@media print{
  #appHeader,#root,#modalRoot,#toastRoot,#mobMenuDrop{display:none!important}
  #printView{display:block!important}
  *{box-shadow:none!important;text-shadow:none!important}
  body{background:#fff;color:#000;font-family:'DM Sans',system-ui,sans-serif;font-size:11px;line-height:1.4;margin:0;padding:0}

  /* Trip header — tight 1-liner */
  .pv-header{display:flex;align-items:baseline;gap:16px;border-bottom:2px solid #000;padding-bottom:6px;margin-bottom:14px}
  .pv-header h1{font-size:16px;font-weight:900;margin:0;white-space:nowrap}
  .pv-header p{font-size:10px;color:#555;margin:0}

  /* Section titles */
  .pv-section{margin-bottom:14px}
  .pv-section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:#555;border-bottom:1px solid #ccc;padding-bottom:3px;margin-bottom:8px}
  .pv-page-break{page-break-before:always;padding-top:14px}

  /* Cards: strip borders/radius/padding to table-row density */
  .booking-card{border:none!important;border-bottom:1px solid #eee!important;border-radius:0!important;padding:6px 0!important;margin-bottom:0!important}
  .booking-header{gap:8px;margin-bottom:3px}
  .booking-icon{width:22px;height:22px;font-size:12px;border-radius:4px}
  .booking-title{font-size:11px;font-weight:700}
  .booking-sub{font-size:10px}
  .booking-detail-grid{display:flex;flex-wrap:wrap;gap:12px;padding-top:3px;border-top:none!important}
  .booking-detail .bd-label{font-size:9px}
  .booking-detail .bd-val{font-size:10px}
  .conf-badge{display:none}

  /* Events: single-line rows */
  .event-card{border:none!important;border-bottom:1px solid #eee!important;border-radius:0!important;padding:4px 0!important;gap:8px}
  .event-icon{width:20px;height:20px;font-size:11px;border-radius:3px}
  .event-title{font-size:11px;font-weight:600;margin-bottom:0}
  .event-meta{font-size:10px;margin-top:1px;gap:6px}
  .event-cost{font-size:10px}
  .ev-photo-panel,.photo-strip,.day-collapse-btn,.photo-btn,.pack-del,.sbar-remove,.itin-filter-bar,.btn{display:none!important}

  /* Timeline: strip the vertical line */
  .timeline{padding-left:0}
  .timeline::before,.tl-dot{display:none}
  .tl-event{margin-bottom:0}

  /* Day blocks */
  .day-block{margin-bottom:10px}
  .day-header{margin-bottom:4px}
  .day-num{width:28px;height:28px;font-size:11px;border-radius:6px}
  .day-info h3{font-size:11px}
  .day-info .day-date{font-size:9px}
  .itin-auto{padding:4px 6px;margin-bottom:3px;border-radius:4px}
  .itin-auto-title{font-size:10px}

const DB = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ═══════════════════════════════════════════════
   OFFLINE WRITE QUEUE (outbox)
   DB.from() is wrapped so that when an insert/update/delete fails at
   the network level (offline), the operation is stored in localStorage,
   applied to the local cache so the UI updates instantly, and replayed
   to Supabase when the connection returns. Server-rejected ops (RLS,
   validation) are NOT queued — only fetch-level failures are.
   Conflict policy: last write wins.
═══════════════════════════════════════════════ */
const OUTBOX_KEY='wtn-outbox';
function outbox(){try{return JSON.parse(localStorage.getItem(OUTBOX_KEY)||'[]')}catch{return[]}}
function outboxSave(q){try{localStorage.setItem(OUTBOX_KEY,JSON.stringify(q))}catch{}}

const _dbFrom = DB.from.bind(DB);
DB.from = table => wrapBuilder(_dbFrom(table), {table, op:null, data:null, filters:[]});
function wrapBuilder(target, desc){
  return new Proxy(target, {
    get(t, prop){
      if(prop === 'then'){
        if(!desc.op) return t.then.bind(t); // reads pass through untouched
        const p = t.then(
          res => res,
          () => {
            queueOp(desc);
            // Mimic what the server would have returned so `.select().single()`
            // call sites keep working (ids were fixed client-side in queueOp)
            let data=null;
            if(desc.op==='insert'||desc.op==='upsert'){
              const rows=Array.isArray(desc.data)?desc.data:[desc.data];
              data=desc.single?rows[0]:rows;
            }
            return {data, error:null, queued:true};
          }
        );
        return p.then.bind(p);
      }
      const v = Reflect.get(t, prop);
      if(typeof v !== 'function') return v;
      return (...args) => {
        if(prop==='insert'||prop==='upsert'){desc.op=prop;desc.data=args[0];}
        else if(prop==='update'){desc.op='update';desc.data=args[0];}
        else if(prop==='delete'){desc.op='delete';}
        else if(prop==='single'||prop==='maybeSingle'){desc.single=true;}
        else if(desc.op&&(prop==='eq'||prop==='in'||prop==='match'))desc.filters.push([prop,args[0],args[1]]);
        const out = v.apply(t, args);
        return out&&typeof out==='object'&&typeof out.then==='function' ? wrapBuilder(out, desc) : out;
      };
    }
  });
}

let OFFLINE_TOAST_AT=0;
function queueOp(desc){
  if(desc.op==='insert'||desc.op==='upsert'){
    // Fix ids client-side so the local cache and the eventual replay agree,
    // and so an accidental double-replay hits a duplicate-key error instead
    // of inserting twice.
    const rows=Array.isArray(desc.data)?desc.data:[desc.data];
    rows.forEach(r=>{if(r&&!r.id)r.id=crypto.randomUUID();});
  }
  const q=outbox();q.push(desc);outboxSave(q);
  applyOpToLocal(desc);
  updateSyncPill();
  if(Date.now()-OFFLINE_TOAST_AT>8000){OFFLINE_TOAST_AT=Date.now();toast('📴 Saved offline — will sync when you\'re back online');}
}

const OUTBOX_TABLES={wtn_events:'events',wtn_flights:'flights',wtn_stays:'stays',wtn_pack_items:'packItems',wtn_budget_items:'budgetItems',wtn_travelers:'travelers',wtn_trip_docs:'docs'};
function applyOpToLocal(desc){
  try{
    const eqId=(desc.filters.find(f=>f[0]==='eq'&&f[1]==='id')||[])[2];
    if(desc.table==='wtn_trips'){
      if(desc.op==='update'&&eqId){const t=TRIPS.find(x=>x.id===eqId);if(t)Object.assign(t,desc.data);localStorage.setItem('wtn-cache-trips',JSON.stringify(TRIPS));}
      else if(desc.op==='insert'){
        // Callers add the returned row to TRIPS themselves — only persist the
        // cache here (deduped) so a reload while offline still shows the trip
        const rows=(Array.isArray(desc.data)?desc.data:[desc.data]).map(r=>({created_at:new Date().toISOString(),...r}));
        const merged=[...rows.filter(r=>!TRIPS.some(x=>x.id===r.id)),...TRIPS];
        localStorage.setItem('wtn-cache-trips',JSON.stringify(merged));
      }
      else if(desc.op==='delete'&&eqId){const i=TRIPS.findIndex(x=>x.id===eqId);if(i>=0)TRIPS.splice(i,1);localStorage.setItem('wtn-cache-trips',JSON.stringify(TRIPS));}
      return;
    }
    const key=OUTBOX_TABLES[desc.table];if(!key)return;
    if(desc.op==='insert'||desc.op==='upsert'){
      (Array.isArray(desc.data)?desc.data:[desc.data]).forEach(r=>{
        const td=TD[r.trip_id];if(!td)return;
        (td[key]=td[key]||[]).push({created_at:new Date().toISOString(),...r});
        localStorage.setItem('wtn-cache-td-'+r.trip_id,JSON.stringify(td));
      });
    }else if(eqId){
      for(const [tripId,td] of Object.entries(TD)){
        const arr=td[key];if(!arr)continue;
        const idx=arr.findIndex(x=>x.id===eqId);
        if(idx<0)continue;
        if(desc.op==='update')Object.assign(arr[idx],desc.data);
        else arr.splice(idx,1);
        localStorage.setItem('wtn-cache-td-'+tripId,JSON.stringify(td));
        break;
      }
    }
  }catch{}
}

let FLUSHING=false;
async function flushOutbox(){
  if(FLUSHING||!navigator.onLine)return;
  const q=outbox();
  if(!q.length){updateSyncPill();return;}
  FLUSHING=true;
  const remaining=[];let synced=0,dropped=0;
  try{
    for(const desc of q){
      try{
        let b=_dbFrom(desc.table);
        b=desc.op==='insert'?b.insert(desc.data):desc.op==='upsert'?b.upsert(desc.data):desc.op==='update'?b.update(desc.data):b.delete();
        for(const f of desc.filters)b=b[f[0]](f[1],f[2]);
        const {error}=await b;
        if(error){dropped++;console.warn('Outbox op rejected by server, dropping:',desc,error);}
        else synced++;
      }catch(e){remaining.push(desc);} // still offline — keep for next attempt
    }
  }finally{
    outboxSave(remaining);FLUSHING=false;updateSyncPill();
  }
  if(synced){
    toast(`☁️ ${synced} offline change${synced!==1?'s':''} synced ✓`);
    if(CUR.view==='trip'&&CUR.tripId){await loadTripDetail(CUR.tripId);renderTab();}
    else if(CUR.view==='dashboard'&&ME){await loadTrips();renderDashboard();}
  }
  if(dropped)toast(`⚠️ ${dropped} offline change${dropped!==1?'s':''} rejected by the server`);
}
function updateSyncPill(){
  const n=outbox().length;
  let el=document.getElementById('syncPill');
  if(!n){el?.remove();return;}
  if(!el){
    el=document.createElement('div');el.id='syncPill';
    el.title='Tap to retry now';el.onclick=()=>flushOutbox();
    document.body.appendChild(el);
  }
  el.textContent=`📴 ${n} change${n!==1?'s':''} waiting to sync`;
}

// Exchange rates (frankfurter.dev, keyless) keyed by base ISO code; null = fetch failed
let RATES={};
async function ensureRates(baseSym){
  const iso=SYM2ISO[baseSym||'$']||'USD';
  if(RATES[iso]!==undefined)return;
  try{
    const r=await fetch(`https://api.frankfurter.dev/v1/latest?base=${iso}`);
    RATES[iso]=r.ok?(await r.json()).rates:null;
  }catch{RATES[iso]=null}
}
function convToTrip(amt,itemSym,tripSym){
  if(!amt)return 0;
  if(!itemSym||itemSym===tripSym)return +amt;
  const from=SYM2ISO[itemSym],to=SYM2ISO[tripSym||'$']||'USD';
  if(!from||from===to)return +amt;
  const rates=RATES[to];
  if(!rates||!rates[from])return null; // rates unavailable — caller shows the original amount
  return +amt/rates[from];
}

  // while the auth lock is held and awaiting DB queries here can deadlock, which
  // left the app blank until a hard refresh. Defer the work with setTimeout(…,0)
  // so afterSignIn() runs outside the lock.
  DB.auth.onAuthStateChange((event,session)=>{
    clearTimeout(window.__loadTimer); // app is responding, cancel the global safety net
    if(event==='SIGNED_OUT'){
      handled=false; ME=null; TRIPS=[]; TD={}; showSignIn();
      return;
    }
    if(handled)return;
    if((event==='INITIAL_SESSION'||event==='SIGNED_IN')&&session){
      handled=true;
      setTimeout(()=>{ afterSignIn(session.user); },0);
    } else if(event==='INITIAL_SESSION'&&!session){
      showSignIn();
    }
  });
}

async function afterSignIn(user){
  showLoading('Loading your profile…');
  // Trigger handles insert; retry a few times in case it's still propagating
  let profile = null, lastErr = null;
  for(let i=0;i<6;i++){
    try{
      const {data,error} = await DB.from('wtn_profiles').select('*').eq('id',user.id).single();
      if(data){profile=data;break;}
      lastErr=error;
    }catch(e){
      // Network down — boot from the cached profile so the trip data
      // (also cached) is still reachable offline
      try{profile=JSON.parse(localStorage.getItem('wtn-cache-me')||'null')}catch{}
      if(profile)break;
      lastErr=e;
    }
    await new Promise(r=>setTimeout(r,900));
  }
  ME = profile;
  if(ME)try{localStorage.setItem('wtn-cache-me',JSON.stringify(ME))}catch{}

  if(!ME){
    document.getElementById('root').innerHTML=`<div class="loading-screen"><p style="color:var(--coral);max-width:380px;text-align:center">Could not load your profile. Try signing out and back in.<br><br><small style="color:var(--dim)">${lastErr?.message||'unknown error'}</small></p><button class="btn primary" onclick="signOut()" style="margin-top:16px">Sign out</button></div>`;
    return;
  }

  // Ryan is always approved
  if(ME.email===ADMIN_EMAIL && !ME.approved){
    await DB.from('wtn_profiles').update({approved:true}).eq('id',ME.id);
    ME.approved=true;
  }

  if(!ME.approved){
    const {data:req} = await DB.from('wtn_access_requests').select('*').eq('user_id',ME.id).order('requested_at',{ascending:false}).limit(1).single();
    if(!req){showRequestAccess();}
    else{showPending(req);}
    return;
  }

  renderAuthHeader();
  await loadTrips();
  if(PENDING_INVITE){await processInvite(PENDING_INVITE);}
  else{renderDashboard();}
  // Push any changes made offline last session, and surface the pending pill
  updateSyncPill();
  if(outbox().length)flushOutbox();
}

async function loadTrips(){
  try{
    const {data:owned} = await DB.from('wtn_trips').select('*').eq('owner_id',ME.id).order('created_at',{ascending:false});
    const {data:memberships} = await DB.from('wtn_trip_members').select('trip_id, role, wtn_trips!trip_id(*)').eq('user_id',ME.id);
    const memberTrips = (memberships||[]).map(m=>({...m.wtn_trips, _role:m.role})).filter(Boolean);
    const seen=new Set((owned||[]).map(t=>t.id));
    const all=[...(owned||[]),...memberTrips.filter(t=>!seen.has(t.id))];
    TRIPS=all;
    try{localStorage.setItem('wtn-cache-trips',JSON.stringify(all))}catch{}
  }catch(e){
    // Network down — fall back to last-synced copy so the itinerary is still readable
    try{TRIPS=JSON.parse(localStorage.getItem('wtn-cache-trips')||'[]')}catch{TRIPS=[]}
    if(TRIPS.length)toast('📡 Offline — showing last-synced trips');
  }
}

async function loadTripDetail(id){
  const trip=TRIPS.find(x=>x.id===id);
  try{
    const [
      {data:events},{data:flights},{data:stays},{data:packItems},{data:budgetItems},{data:members},{data:ownerProfile},{data:travelers}
    ] = await Promise.all([
      DB.from('wtn_events').select('*').eq('trip_id',id).order('date').order('time'),
      DB.from('wtn_flights').select('*').eq('trip_id',id).order('depart_date'),
      DB.from('wtn_stays').select('*').eq('trip_id',id).order('check_in'),
      DB.from('wtn_pack_items').select('*').eq('trip_id',id).order('category').order('created_at'),
      DB.from('wtn_budget_items').select('*').eq('trip_id',id).order('category').order('created_at'),
      DB.from('wtn_trip_members').select('*, wtn_profiles!user_id(id,name,email,picture)').eq('trip_id',id),
      DB.from('wtn_profiles').select('id,name,email,picture').eq('id',trip?.owner_id||'').single(),
      DB.from('wtn_travelers').select('*').eq('trip_id',id).order('name'),
    ]);
    TD[id]={
      events:events||[], flights:flights||[], stays:stays||[],
      packItems:packItems||[], budgetItems:budgetItems||[],
      members:(members||[]).map(m=>({...m,profile:m.wtn_profiles})),
      ownerProfile:ownerProfile||null,
      travelers:travelers||[],
    };
    if(await detectSchemaV2()){
      const {data:docs}=await DB.from('wtn_trip_docs').select('*').eq('trip_id',id).order('created_at',{ascending:false});
      TD[id].docs=docs||[];
    }
    detectSchemaV3();
    // Privacy: passport/visa data never touches localStorage — the offline
    // cache stores everything except travelers
    try{localStorage.setItem('wtn-cache-td-'+id,JSON.stringify({...TD[id],travelers:[]}))}catch{}
  }catch(e){
    // Network down — hydrate from last-synced copy (read-only until back online)
    try{
      const cached=localStorage.getItem('wtn-cache-td-'+id);
      if(cached){TD[id]=JSON.parse(cached);toast('📡 Offline — showing last-synced trip data');}
    }catch{}
  }
  renderSidebar(id);
}

function renderTab(){
  const t=TRIPS.find(x=>x.id===CUR.tripId);if(!t)return;
  const el=document.getElementById('tabContent');if(!el)return;
  const d=TD[t.id]||{events:[],flights:[],stays:[],packItems:[],budgetItems:[],members:[]};
  if(CUR.tab==='overview'){el.innerHTML=renderOverview(t,d);loadWeather(t);}
  else if(CUR.tab==='itinerary')el.innerHTML=renderItinerary(t,d);
  else if(CUR.tab==='flights')el.innerHTML=renderFlights(t,d);
  else if(CUR.tab==='stays')el.innerHTML=renderStays(t,d);
  else if(CUR.tab==='activities')el.innerHTML=renderActivities(t,d);
  else if(CUR.tab==='map'){el.innerHTML=renderMapShell(t,d);initTripMap(t,d);}
  else if(CUR.tab==='packing')el.innerHTML=renderPacking(t,d);
  else if(CUR.tab==='budget'){
    el.innerHTML=renderBudget(t,d);
    // If conversions are needed (foreign-currency items or a display currency
    // different from the trip's), fetch rates once then re-render
    const tripSym=t.currency||'$';
    const disp=BUDGET_DISP_CUR||tripSym;
    const iso=SYM2ISO[disp]||'USD';
    const needs=disp!==tripSym||(d.budgetItems||[]).some(b=>b.currency&&b.currency!==disp);
    if(RATES[iso]===undefined&&needs){
      ensureRates(disp).then(()=>{if(CUR.tab==='budget')renderTab();});
    }
  }
  else if(CUR.tab==='travelers'){
    if(t.owner_id!==ME?.id){
      el.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:260px;gap:12px;color:var(--muted);text-align:center;padding:32px">
        <div style="font-size:48px">🔒</div>
        <div style="font-size:16px;font-weight:700;color:var(--text)">Private section</div>
        <div style="font-size:14px;max-width:300px;line-height:1.6">Traveler details are only visible to the trip owner.</div>
      </div>`;
    }else{
      el.innerHTML=renderTravelers(t,d);
    }
  }
}

/* ── Map ── */
let MAP=null;
const GEO_KEY='wtn-geo-v2'; // v2: multi-attempt queries + fallback geocoder (v1 cached misses too aggressively)
function geoCache(){try{return JSON.parse(localStorage.getItem(GEO_KEY)||'{}')}catch{return{}}}
function geoCacheSet(q,v){const c=geoCache();c[q]=v;try{localStorage.setItem(GEO_KEY,JSON.stringify(c))}catch{}}
let GEO_LAST=0;
async function geoNominatim(q){
  // Nominatim usage policy: max 1 request/sec — globally throttled here
  const wait=GEO_LAST+1100-Date.now();
  if(wait>0)await new Promise(r=>setTimeout(r,wait));
  GEO_LAST=Date.now();
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&accept-language=en&q=${encodeURIComponent(q)}`);
    if(!res.ok)return undefined;                                // transient (throttled/5xx) — never cache
    const js=await res.json();
    return js?.[0]?{lat:+js[0].lat,lon:+js[0].lon}:null;        // null = genuinely no match
  }catch{return undefined}                                      // network/CSP failure — never cache
}
async function geoOpenMeteo(name){
  try{
    const res=await fetch(`https://geocoding-api.open-meteo.com/v1/search?count=1&name=${encodeURIComponent(name)}`);
    if(!res.ok)return undefined;
    const r=(await res.json())?.results?.[0];
    return r?{lat:r.latitude,lon:r.longitude}:null;
  }catch{return undefined}
}
async function geocodeTries(tries,nameOnly,cacheKey){
  const c=geoCache();
  if(cacheKey in c)return c[cacheKey];
  let transient=false;
  for(const q of tries.filter(Boolean)){
    const g=await geoNominatim(q);
    if(g){geoCacheSet(cacheKey,g);return g;}
    if(g===undefined)transient=true;
  }
  if(nameOnly){
    const g2=await geoOpenMeteo(nameOnly);
    if(g2){geoCacheSet(cacheKey,g2);return g2;}
    if(g2===undefined)transient=true;
  }
  if(!transient)geoCacheSet(cacheKey,null); // only cache confirmed misses, so retries stay possible
  return null;
}
async function geocode(q){return geocodeTries([q],q,q);} // one-shot (destination centering, weather)
function mapPlaces(t,d){
  const suffix=[t.destination,t.country].filter(Boolean).join(', ');
  const places=[];
  (d.stays||[]).forEach(s=>{
    const addr=s.address;
    places.push({
      icon:'🏨',color:'var(--purple)',name:s.name,
      sub:[s.check_in?fmt(s.check_in):'',s.check_out?'→ '+fmt(s.check_out):''].filter(Boolean).join(' '),
      // Try the address in context, the raw address, then the place name in context
      tries:[addr&&suffix?`${addr}, ${suffix}`:null, addr||null, s.name&&suffix?`${s.name}, ${suffix}`:s.name],
      nameOnly:s.name||null,
      qKey:`stay|${addr||s.name}|${suffix}`,
    });
  });
  (d.events||[]).filter(e=>e.location||e.address).forEach(e=>{
    const cat=CATS[e.category]||CATS.other;
    const loc=e.address||e.location;
    places.push({
      icon:cat.icon,color:'var(--gold)',name:e.title,
      sub:[e.location,e.date?fmt(e.date):''].filter(Boolean).join(' · '),
      tries:[suffix?`${loc}, ${suffix}`:loc, loc, e.address&&e.location?`${e.location}, ${suffix}`:null],
      nameOnly:e.location||null,
      qKey:`ev|${loc}|${suffix}`,
    });
  });
  return places;
}
function retryMapPins(){
  const t=TRIPS.find(x=>x.id===CUR.tripId);if(!t)return;
  const d=TD[t.id]||{};
  const c=geoCache();
  mapPlaces(t,d).forEach(p=>{if(c[p.qKey]===null)delete c[p.qKey];});
  try{localStorage.setItem(GEO_KEY,JSON.stringify(c))}catch{}
  renderTab();
}
function renderMapShell(t,d){
  const n=mapPlaces(t,d).length;
  return `
  <div class="section-head">
    <h2 style="font-family:'Playfair Display',serif">🗺 Trip Map</h2>
    <span id="mapStatus" style="font-size:12px;color:var(--muted)"></span>
  </div>
  ${n===0?`<p style="font-size:13px;color:var(--muted);margin-bottom:12px">No pinnable places yet — add stays or activities with a location or address and they'll show up here.</p>`:''}
  <div id="tripMap"></div>
  <div id="mapMissing" style="margin-top:10px;font-size:12px;color:var(--muted)"></div>`;
}
async function initTripMap(t,d){
  const el=document.getElementById('tripMap');if(!el)return;
  if(typeof L==='undefined'){el.innerHTML='<p style="padding:20px;color:var(--muted)">Map library failed to load — check your connection and refresh.</p>';return;}
  if(MAP){MAP.remove();MAP=null;}
  MAP=L.map(el).setView([20,0],2);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'}).addTo(MAP);
  const destQ=[t.destination,t.country].filter(Boolean).join(', ');
  if(destQ){const g=await geocode(destQ);if(g&&MAP)MAP.setView([g.lat,g.lon],11);}
  const places=mapPlaces(t,d);
  const statusEl=document.getElementById('mapStatus');
  const pts=[];let done=0;
  for(const p of places){
    if(CUR.tab!=='map'||!MAP)return;
    const g=await geocodeTries(p.tries,p.nameOnly,p.qKey);
    done++;
    if(statusEl)statusEl.textContent=done<places.length?`Locating places… ${done}/${places.length}`:'';
    if(g){
      pts.push([g.lat,g.lon]);
      L.marker([g.lat,g.lon],{icon:L.divIcon({className:'map-pin-wrap',html:`<div class="map-pin" style="border-color:${p.color}">${p.icon}</div>`,iconSize:[34,34],iconAnchor:[17,17]})})
        .addTo(MAP)
        .bindPopup(`<b>${esc(p.name)}</b>${p.sub?`<br><span style="font-size:12px">${esc(p.sub)}</span>`:''}`);
      if(pts.length>1)MAP.fitBounds(pts,{padding:[46,46]});
      else MAP.setView(pts[0],13);
    }else p.missing=true;
  }
  if(statusEl)statusEl.textContent=pts.length?`${pts.length}/${places.length} pinned`:'';
  const missing=places.filter(p=>p.missing);
  const missEl=document.getElementById('mapMissing');
  if(missEl&&missing.length)missEl.innerHTML=`Couldn't pin: ${missing.map(m=>esc(m.name)).join(', ')} — a fuller address helps. <button class="btn sm ghost" onclick="retryMapPins()" style="margin-left:6px">↻ Retry lookups</button>`;
}

/* ── Calendar export (.ics) ── */
function icsEsc(s){return String(s||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\r?\n/g,'\\n')}
function exportICS(tripId){
  const t=TRIPS.find(x=>x.id===tripId);const d=TD[tripId];
  if(!t||!d){toast('Trip data still loading…');return;}
  const out=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//WhereToNext//Trip//EN',`X-WR-CALNAME:${icsEsc(t.name)}`];
  const stamp=new Date().toISOString().replace(/[-:]/g,'').replace(/\.\d+/,'');
  const dt=(d8)=>d8.replace(/-/g,'');
  const push=(uid,props)=>out.push('BEGIN:VEVENT',`UID:${uid}@wheretonext`,`DTSTAMP:${stamp}`,...props,'END:VEVENT');
  (d.flights||[]).forEach(f=>{
    if(!f.depart_date)return;
    const props=[];
    if(f.depart_time){
      props.push(`DTSTART:${dt(f.depart_date)}T${f.depart_time.replace(':','')}00`);
      if(f.arrive_date&&f.arrive_time)props.push(`DTEND:${dt(f.arrive_date)}T${f.arrive_time.replace(':','')}00`);
    }else props.push(`DTSTART;VALUE=DATE:${dt(f.depart_date)}`);
    props.push(`SUMMARY:${icsEsc(`✈️ ${f.from_airport||''}${f.to_airport?' → '+f.to_airport:''} ${f.airline||''} ${f.flight_num||''}`.replace(/\s+/g,' ').trim())}`);
    if(f.confirm_num)props.push(`DESCRIPTION:${icsEsc('Confirmation: '+f.confirm_num)}`);
    push('fl-'+f.id,props);
  });
  (d.stays||[]).forEach(s=>{
    if(!s.check_in)return;
    const props=[`DTSTART;VALUE=DATE:${dt(s.check_in)}`];
    if(s.check_out)props.push(`DTEND;VALUE=DATE:${dt(s.check_out)}`);
    props.push(`SUMMARY:${icsEsc('🏨 '+s.name)}`);
    if(s.address)props.push(`LOCATION:${icsEsc(s.address)}`);
    if(s.confirm_num)props.push(`DESCRIPTION:${icsEsc('Confirmation: '+s.confirm_num)}`);
    push('st-'+s.id,props);
  });
  (d.events||[]).forEach(e=>{
    if(!e.date)return;
    const props=[];
    if(e.time){
      props.push(`DTSTART:${dt(e.date)}T${e.time.replace(':','')}00`);
      if(e.duration){
        const end=new Date(`${e.date}T${e.time}`);end.setMinutes(end.getMinutes()+ +e.duration);
        props.push(`DTEND:${end.toLocaleDateString('en-CA').replace(/-/g,'')}T${String(end.getHours()).padStart(2,'0')}${String(end.getMinutes()).padStart(2,'0')}00`);
      }
    }else props.push(`DTSTART;VALUE=DATE:${dt(e.date)}`);
    props.push(`SUMMARY:${icsEsc((CATS[e.category]||CATS.other).icon+' '+e.title)}`);
    if(e.location||e.address)props.push(`LOCATION:${icsEsc(e.address||e.location)}`);
    push('ev-'+e.id,props);
  });
  out.push('END:VCALENDAR');
  const blob=new Blob([out.join('\r\n')],{type:'text/calendar'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${(t.name||'trip').replace(/[^\w\- ]+/g,'').trim()||'trip'}.ics`;
  a.click();URL.revokeObjectURL(a.href);
  toast('Calendar file downloaded ✓');
}

/* ── Weather (Open-Meteo, keyless) ── */
function wmoIcon(c){
  if(c===0)return'☀️';if(c<=2)return'🌤';if(c===3)return'☁️';
  if(c<=48)return'🌫';if(c<=57)return'🌦';if(c<=67)return'🌧';
  if(c<=77)return'🌨';if(c<=82)return'🌧';if(c<=86)return'🌨';return'⛈';
}
function modalWxLocation(tripId){

async function loadWeather(t){
  const el=document.getElementById('wxWidget');if(!el)return;
  const custom=localStorage.getItem('wtn-wx-'+t.id);
  const destQ=custom||[t.destination,t.country].filter(Boolean).join(', ');
  const editBtn=`<button class="btn sm ghost" onclick="modalWxLocation('${t.id}')" title="Change forecast location" style="font-size:11px;padding:3px 8px">📍 ${custom?'Change':'Set'} location</button>`;
  if(!destQ){
    el.innerHTML=`<div class="card" style="margin-bottom:16px"><div class="section-head"><h2 style="font-size:16px">🌤 Weather</h2>${editBtn}</div><p class="muted" style="font-size:13px">Set a location to see the 7-day forecast.</p></div>`;
    return;
  }
  const g=await geocode(destQ);
  if(!g){
    const cur0=document.getElementById('wxWidget');if(!cur0)return;
    cur0.innerHTML=`<div class="card" style="margin-bottom:16px"><div class="section-head"><h2 style="font-size:16px">🌤 Weather</h2>${editBtn}</div><p class="muted" style="font-size:13px">Couldn't find “${esc(destQ)}” — try a nearby city name.</p></div>`;
    return;
  }
  const useF=(navigator.language||'').startsWith('en-US');
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${g.lat}&longitude=${g.lon}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=7${useF?'&temperature_unit=fahrenheit':''}`);
    if(!r.ok)return;
    const js=await r.json();const D=js.daily;if(!D?.time)return;
    const cur=document.getElementById('wxWidget');if(!cur)return; // user navigated away
    cur.innerHTML=`<div class="card" style="margin-bottom:16px">
      <div class="section-head"><h2 style="font-size:16px">🌤 Weather — ${esc(custom||t.destination||t.country)}</h2><span style="display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:var(--dim)">next 7 days · °${useF?'F':'C'}</span>${editBtn}</span></div>
      <div class="wx-row">${D.time.map((dtStr,i)=>`
        <div class="wx-day${t.start_date&&t.end_date&&dtStr>=t.start_date&&dtStr<=t.end_date?' on-trip':''}">
          <div class="wx-date">${new Date(dtStr+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'})}</div>
          <div class="wx-icon">${wmoIcon(D.weather_code[i])}</div>
          <div class="wx-temp">${Math.round(D.temperature_2m_max[i])}°</div>
          <div class="wx-temp lo">${Math.round(D.temperature_2m_min[i])}°</div>
          <div class="wx-rain">${(D.precipitation_probability_max?.[i]||0)>=30?`💧${D.precipitation_probability_max[i]}%`:''}</div>
        </div>`).join('')}</div>
    </div>`;
  }catch{}
}

/* ── Overview ── */
function renderOverview(t,d){
  const days=t.start_date&&t.end_date?diffDays(t.start_date,t.end_date)+1:0;
  const totalBudget=d.budgetItems.reduce((a,b)=>a+(+b.planned||0),0);
  const totalActual=d.budgetItems.reduce((a,b)=>a+(+b.actual||0),0);
  const travelers=t.travelers||[];
  const write=canWrite(t);
  const isOwner=t.owner_id===ME?.id;

  const ownerProfile=d.ownerProfile||(t.owner_id===ME?.id?{id:ME.id,name:ME.name,email:ME.email,picture:ME.picture}:{id:t.owner_id,name:'Owner',email:'',picture:null});
  const allMembers=[{user_id:t.owner_id,role:'owner',profile:ownerProfile},...(d.members||[])];

  // ── Fun stats ──
  // Total air time from flights that have both depart + arrive datetime
  let airMins=0;
  d.flights.forEach(f=>{
    if(f.depart_date&&f.depart_time&&f.arrive_date&&f.arrive_time){
      const dep=new Date(`${f.depart_date}T${f.depart_time}`);
      const arr=new Date(`${f.arrive_date}T${f.arrive_time}`);
      const diff=(arr-dep)/60000;
      if(diff>0&&diff<1440*3)airMins+=diff; // sanity: ignore negatives / >3 day gaps
    }
  });
  const airTimeStr=airMins>=60?`${Math.floor(airMins/60)}h ${Math.round(airMins%60)}m`:airMins>0?`${Math.round(airMins)}m`:'';

  // Total nights (sum of each stay's duration)
  let totalNights=0;
  d.stays.forEach(s=>{if(s.check_in&&s.check_out){const n=diffDays(s.check_in,s.check_out);if(n>0)totalNights+=n;}});

  // Unique destinations from stays
  const destinations=[...new Set(d.stays.map(s=>s.city||s.name).filter(Boolean))];

  // Confirmed % across all bookable items
  const bookable=[...d.flights,...d.stays,...d.events];
  const confirmedCount=bookable.filter(x=>x.confirmed).length;
  const confirmedPct=bookable.length?Math.round(confirmedCount/bookable.length*100):null;

  // Cost per day (all confirmed cost sources)
  const allCosts=[
    ...d.flights.filter(f=>f.confirmed&&f.cost).map(f=>+f.cost),
    ...d.stays.filter(s=>s.confirmed&&s.cost).map(s=>+s.cost),
    ...d.events.filter(e=>e.confirmed&&e.cost).map(e=>+e.cost),
  ];
  const totalConfirmedCost=allCosts.reduce((a,b)=>a+b,0);
  const costPerDay=days&&totalConfirmedCost?Math.round(totalConfirmedCost/days):null;

  // Busiest day (most events)
  const evByDay={};
  d.events.forEach(e=>{if(e.date)evByDay[e.date]=(evByDay[e.date]||0)+1;});
  const busiestEntry=Object.entries(evByDay).sort((a,b)=>b[1]-a[1])[0];
  const busiestDayNum=busiestEntry&&t.start_date?diffDays(t.start_date,busiestEntry[0])+1:null;
  const busiestDay=busiestEntry?`Day ${busiestDayNum||'?'}`:null;
  const busiestDaySub=busiestEntry?`${busiestEntry[1]} event${busiestEntry[1]!==1?'s':''} · ${fmtShort(busiestEntry[0])}`:null;

  // Packing progress
  const packed=d.packItems.filter(p=>p.packed).length;
  const packTotal=d.packItems.length;

  // Build fun stat tiles (only show if there's data)
  const funStats=[
    airTimeStr&&{icon:'✈️',val:airTimeStr,label:'Air Time'},
    totalNights&&{icon:'🌙',val:totalNights,label:`Night${totalNights!==1?'s':''} Away`},
    destinations.length&&{icon:'📍',val:destinations.length,label:`Destination${destinations.length!==1?'s':''}`,sub:destinations.slice(0,2).join(', ')+(destinations.length>2?'…':'')},
    confirmedPct!==null&&{icon:'✅',val:`${confirmedPct}%`,label:'Confirmed'},
    costPerDay&&{icon:'💵',val:formatCost(costPerDay,t.currency),label:'Per Day (est.)'},
    busiestDay&&{icon:'🔥',val:busiestDay,label:'Busiest Day',sub:busiestDaySub},
    packTotal&&{icon:'🧳',val:`${packed}/${packTotal}`,label:'Items Packed'},
  ].filter(Boolean);

  function funStatCard(s){
    return`<div class="fun-stat">
      <div class="fun-stat-icon">${s.icon}</div>
      <div class="fun-stat-body">
        <div class="fun-stat-val">${s.val}</div>
        <div class="fun-stat-label">${s.label}</div>
        ${s.sub?`<div style="font-size:11px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px">${esc(s.sub)}</div>`:''}
      </div>
    </div>`;
  }

  // ── "Today" day-of dashboard (only while the trip is happening) ──
  const todayStr=new Date().toLocaleDateString('en-CA');
  let todayHtml='';
  if(t.start_date&&t.end_date&&todayStr>=t.start_date&&todayStr<=t.end_date){
    const dayNum=diffDays(t.start_date,todayStr)+1;
    const evToday=d.events.filter(e=>e.date===todayStr).sort((a,b)=>(a.time||'23:59').localeCompare(b.time||'23:59'));
    const flToday=d.flights.filter(f=>f.depart_date===todayStr);
    const stayTonight=d.stays.find(s=>s.check_in&&s.check_out&&todayStr>=s.check_in&&todayStr<s.check_out)||d.stays.find(s=>s.check_in===todayStr);
    const rows=[
      ...flToday.map(f=>`<div class="today-row"><span class="today-time">${f.depart_time||''}</span> ✈️ ${esc(`${f.from_airport||''} → ${f.to_airport||''}`)} ${esc(f.airline||'')}${f.confirm_num?` · <b>${esc(f.confirm_num)}</b>`:''}</div>`),
      ...evToday.map(e=>`<div class="today-row"><span class="today-time">${e.time||''}</span> ${(CATS[e.category]||CATS.other).icon} ${esc(e.title)}${e.location?` · <span style="color:var(--muted)">${esc(e.location)}</span>`:''}</div>`),
    ];
    todayHtml=`<div class="card today-card">
      <div class="section-head"><h2 style="font-size:17px">📍 Today — Day ${dayNum} of ${days}</h2><span style="font-size:12px;color:var(--muted)">${fmt(todayStr)}</span></div>
      ${rows.length?rows.join(''):'<p style="font-size:13px;color:var(--muted)">Nothing scheduled today — enjoy the freedom! 🏖</p>'}
      ${stayTonight?`<div class="today-row" style="border-top:1px solid var(--border);margin-top:8px;padding-top:10px"><span class="today-time">🌙</span> Tonight: <b>${esc(stayTonight.name)}</b>${stayTonight.address?` · <span style="color:var(--muted)">${esc(stayTonight.address)}</span>`:''}</div>`:''}
    </div>`;
  }

  return`
  ${todayHtml}
  <div class="overview-grid">
    <div class="stat-card"><div class="stat-val">${days||'—'}</div><div class="stat-label">Days</div></div>
    <div class="stat-card"><div class="stat-val">${d.events.length}</div><div class="stat-label">Events</div></div>
    <div class="stat-card"><div class="stat-val">${d.flights.length}</div><div class="stat-label">Flights</div></div>
    <div class="stat-card"><div class="stat-val">${d.stays.length}</div><div class="stat-label">Stays</div></div>
    ${totalBudget?`<div class="stat-card"><div class="stat-val" style="font-size:20px">${formatCost(totalBudget,t.currency)}</div><div class="stat-label">Budget</div></div>`:''}
    ${totalActual?`<div class="stat-card"><div class="stat-val" style="font-size:20px;color:${totalActual>totalBudget?'var(--coral)':'var(--green)'}">${formatCost(totalActual,t.currency)}</div><div class="stat-label">Spent</div></div>`:''}
  </div>
  ${funStats.length?`<div class="fun-stats">${funStats.map(funStatCard).join('')}</div>`:''}
  <div id="wxWidget"></div>

  <!-- Members -->
  <div class="card" style="margin-bottom:16px">
    <div class="section-head">
      <h2 style="font-size:17px">👥 Trip Members</h2>
