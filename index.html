<style>
:root {
  /* Refined dark editorial — rich near-black, champagne-gold accent */
  --bg:#0b0d11; --bg2:#0f1217; --panel:#14171d; --panel2:#1b1f27;
  --border:#23262e; --border2:#2f333d;
  --text:#edeff3; --muted:#8b93a1; --dim:#4d5460;
  --gold:#d9b877; --gold2:#f0d9a4;
  --blue:#7aa0dc; --cyan:#5ec4d2; --green:#5cc295;
  --coral:#e28479; --purple:#ab97e0; --orange:#e0a066; --pink:#dd8bb4;
  --radius:16px;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 14px 40px -14px rgba(0,0,0,.6);
  --shadow-sm:0 1px 3px rgba(0,0,0,.35);
  --accent-soft:rgba(217,184,119,.12);
}
[data-theme="light"]{
  /* Soft muted daylight — easy, warm greige canvas, not stark white */
  --bg:#e5e3dd;--bg2:#dddad2;--panel:#f0eee9;--panel2:#e8e5df;
  --border:#d2cec3;--border2:#c3beb1;
  --text:#22262e;--muted:#5f6470;--dim:#9b978c;
  --gold:#a97e2e;--gold2:#c99a44;
  --blue:#3a6cc0;--cyan:#0e8ba0;--green:#2e9c6f;
  --coral:#cf5b4d;--purple:#7c5fd0;--orange:#c47a2e;--pink:#c25a94;
  --radius:16px;
  --shadow:0 1px 2px rgba(60,50,30,.06), 0 14px 40px -18px rgba(60,50,30,.22);
  --shadow-sm:0 1px 3px rgba(60,50,30,.08);
  --accent-soft:rgba(169,126,46,.10);
}
[data-theme="light"] #appHeader{background:rgba(229,227,221,.9)}
[data-theme="light"] .trip-hero::after{background:linear-gradient(to top,rgba(229,227,221,.97) 0%,rgba(229,227,221,.5) 60%,transparent 100%)}
[data-theme="light"] .trip-hero-content .trip-dates{color:rgba(26,37,64,.75)}
[data-theme="light"] .timeline::before{background:var(--border2)}
[data-theme="light"] .mob-menu-drop{box-shadow:0 8px 32px rgba(0,0,0,.2)}
[data-theme="light"] .ppl-dropdown{box-shadow:0 8px 32px rgba(0,0,0,.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-.1px}
#root{overflow-x:clip}
h1,h2,h3{font-family:'Cormorant Garamond',Georgia,serif;font-weight:700;letter-spacing:0}
a{color:var(--blue);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;transition:.15s}
input,textarea,select{font-family:inherit;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:11px;padding:10px 13px;font-size:14px;width:100%;outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,textarea:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--accent-soft)}
input::placeholder,textarea::placeholder{color:var(--dim)}
label{font-size:11px;color:var(--muted);display:block;margin-bottom:6px;font-weight:600;letter-spacing:.7px;text-transform:uppercase}
select option{background:var(--panel)}
.field{margin-bottom:14px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.flex1{flex:1;min-width:0}
.muted{color:var(--muted)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 17px;border-radius:11px;font-size:13px;font-weight:600;letter-spacing:.2px;border:1px solid var(--border2);background:var(--panel2);color:var(--text);cursor:pointer;transition:background .15s,border-color .15s,transform .12s,box-shadow .15s;white-space:nowrap}
.btn:hover{background:var(--panel);border-color:var(--border2)}
.btn:active{transform:scale(.97)}
/* Single confident accent: champagne. Primary and gold are one look now. */
.btn.primary,.btn.gold{background:linear-gradient(160deg,var(--gold2),var(--gold));border-color:var(--gold);color:#1c1503;font-weight:700;box-shadow:0 4px 14px -4px rgba(217,184,119,.5)}
.btn.primary:hover,.btn.gold:hover{filter:brightness(1.05);border-color:var(--gold2)}
.btn.danger{background:transparent;border-color:color-mix(in srgb,var(--coral) 40%,transparent);color:var(--coral)}
.btn.danger:hover{background:color-mix(in srgb,var(--coral) 12%,transparent)}
.btn.sm{padding:7px 13px;font-size:12px;border-radius:9px}
.btn.ghost{background:transparent;border-color:transparent}
.btn.ghost:hover{background:var(--panel2)}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm)}
/* ── Liquid glass: blurred cover backdrop + translucent frosted cards ── */
#tripBg{display:none;position:fixed;inset:-20px;z-index:-2;background-size:cover;background-position:center;filter:blur(8px) saturate(1.25) brightness(.95);transform:scale(1.04)}
#tripBg::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,color-mix(in srgb,var(--bg) 12%,transparent),color-mix(in srgb,var(--bg) 40%,transparent) 55%,var(--bg) 98%)}
/* Over the bright photo, boost secondary-text contrast and give bare
   empty-states a glass backing so their text is legible */
body.trip-open{background:var(--bg2);--muted:#c2c9d4;--dim:#93a0b0}
[data-theme="light"] body.trip-open{--muted:#4a4f5a;--dim:#7a7f8a}
body.trip-open #tripBg{display:block}
body.trip-open .empty{
  background:color-mix(in srgb,var(--panel) 40%,transparent);
  backdrop-filter:blur(30px) saturate(1.5);-webkit-backdrop-filter:blur(30px) saturate(1.5);
  border:1px solid color-mix(in srgb,#fff 16%,transparent);color:var(--text);
}
body.trip-open .empty p,body.trip-open .empty .muted{color:var(--muted)}
/* Liquid glass: translucent milky-frosted panels — legibility comes from
   heavy blur + a light inner rim, not from opacity, so the warm photo
   glows through like the reference */
body.trip-open .card,body.trip-open .stat-card,body.trip-open .fun-stat,body.trip-open .booking-card,body.trip-open .budget-group,body.trip-open .trip-hero,body.trip-open .glass{
  background:color-mix(in srgb,var(--panel) 46%,transparent);
  backdrop-filter:blur(40px) saturate(1.7);-webkit-backdrop-filter:blur(40px) saturate(1.7);
  border:1px solid color-mix(in srgb,#fff 15%,transparent);
  box-shadow:0 12px 40px -16px rgba(0,0,0,.5),inset 0 1px 0 color-mix(in srgb,#fff 14%,transparent);
}
[data-theme="light"] body.trip-open .card,[data-theme="light"] body.trip-open .stat-card,[data-theme="light"] body.trip-open .fun-stat,[data-theme="light"] body.trip-open .booking-card,[data-theme="light"] body.trip-open .budget-group,[data-theme="light"] body.trip-open .trip-hero{
  background:color-mix(in srgb,#fff 58%,transparent);border-color:color-mix(in srgb,#fff 60%,transparent);
}
/* Itinerary "By Day": wrap each day in its own glass card so the header
   and timeline aren't floating see-through over the photo */
body.trip-open .day-block{
  background:color-mix(in srgb,var(--panel) 46%,transparent);
  backdrop-filter:blur(40px) saturate(1.7);-webkit-backdrop-filter:blur(40px) saturate(1.7);
  border:1px solid color-mix(in srgb,#fff 15%,transparent);
  border-radius:var(--radius);padding:16px 18px;
  box-shadow:0 12px 40px -16px rgba(0,0,0,.5),inset 0 1px 0 color-mix(in srgb,#fff 12%,transparent);
}
[data-theme="light"] body.trip-open .day-block{background:color-mix(in srgb,#fff 58%,transparent);border-color:color-mix(in srgb,#fff 60%,transparent)}
/* Inner rows read as flat items inside the day card (no double-glass) */
body.trip-open .day-block .event-card,body.trip-open .day-block .itin-auto{
  background:color-mix(in srgb,var(--panel) 34%,transparent);
  backdrop-filter:none;-webkit-backdrop-filter:none;box-shadow:none;
  border-color:color-mix(in srgb,#fff 8%,transparent);
}
.empty{text-align:center;padding:52px 24px;color:var(--muted);border:1px solid var(--border);border-radius:var(--radius)}
.empty .icon{font-size:44px;margin-bottom:14px;opacity:.85}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px;border-radius:20px;background:var(--panel2);border:1px solid var(--border);color:var(--muted);font-weight:500}

/* ── Spinner ── */
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--muted)}
.loading-screen .brand-lg{font-family:'Cormorant Garamond',Georgia,serif;font-size:30px;font-weight:700;letter-spacing:.3px;color:var(--text)}

/* ── Auth screens ── */
.auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;position:relative;overflow:hidden}
.auth-screen::before{content:'';position:absolute;top:-30%;left:50%;transform:translateX(-50%);width:140%;height:70%;background:radial-gradient(ellipse at center,var(--accent-soft),transparent 70%);pointer-events:none}
.auth-card{position:relative;background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:40px 34px;width:100%;max-width:420px;box-shadow:var(--shadow)}
.auth-icon{font-size:52px;margin-bottom:14px}
.auth-card h1{font-size:34px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px;color:var(--text)}
.auth-card p{color:var(--muted);font-size:15px;line-height:1.6;margin-bottom:24px}
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:13px 20px;background:#fff;color:#1a1a1a;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit}
.google-btn:hover{background:#f0f0f0;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.google-btn svg{width:20px;height:20px;flex-shrink:0}
.divider{height:1px;background:var(--border);margin:20px 0}

/* ── Header ── */
#appHeader{position:fixed;top:0;left:0;right:0;z-index:50;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;gap:16px;overflow:visible}
#root{padding-top:58px}
#headerActions{display:flex;gap:8px;flex-shrink:0;align-items:center}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:1;min-width:0}
.brand-ico{width:26px;height:26px;color:var(--gold);flex-shrink:0}
.brand-text{display:flex;flex-direction:column;min-width:0}
.brand-word{font-family:'Fraunces',Georgia,serif;font-size:22px;font-weight:700;letter-spacing:-.6px;color:var(--text);line-height:1.05;font-variation-settings:'opsz' 144;white-space:nowrap}
.brand-accent{color:var(--gold);font-style:italic;font-weight:500;padding:0 .5px}
.brand-tag{font-size:9.5px;font-family:'Inter',sans-serif;font-weight:600;color:var(--muted);letter-spacing:2.6px;text-transform:uppercase;margin-top:1px}
#breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);flex:1;min-width:0}
#breadcrumb .sep{color:var(--dim)}
#breadcrumb .crumb{color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#headerActions{display:flex;gap:8px;flex-shrink:0;align-items:center}
.user-chip{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;background:var(--panel2);border:1px solid var(--border2);border-radius:30px}
.user-chip img{width:26px;height:26px;border-radius:50%}
.user-chip span{font-size:13px;font-weight:500;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--coral);border:2px solid var(--bg)}
.notif-btn{position:relative;background:none;border:none;color:var(--muted);cursor:pointer;padding:7px;border-radius:11px;display:inline-flex;align-items:center;justify-content:center;transition:color .15s,background .15s;flex-shrink:0}
.notif-btn:hover{color:var(--text);background:var(--panel2)}
.notif-btn svg{width:21px;height:21px}
.notif-btn.has-pending{color:var(--gold)}
.notif-count{position:absolute;top:1px;right:1px;min-width:16px;height:16px;padding:0 4px;background:var(--coral);color:#fff;font-size:10px;font-weight:700;border-radius:9px;display:none;align-items:center;justify-content:center;font-family:'Inter',sans-serif;line-height:1;box-shadow:0 0 0 2px var(--bg)}
.notif-count.show{display:inline-flex}

/* ── Dashboard ── */
#dashboard{max-width:1300px;margin:0 auto;padding:32px 24px}
.dash-hero{margin-bottom:40px}
.trips-divider{display:flex;align-items:center;gap:16px;margin:44px 0 22px}
.trips-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.trips-divider span{font-family:'Cormorant Garamond',Georgia,serif;font-size:19px;font-weight:600;letter-spacing:-.2px;color:var(--muted);white-space:nowrap}
.past-grid{opacity:.72;transition:opacity .2s}
.past-grid:hover{opacity:1}
.dash-hero h1{font-size:clamp(30px,5vw,46px);font-weight:700;letter-spacing:-.5px;margin-bottom:8px;color:var(--text)}
.dash-hero p{color:var(--muted);font-size:15px}
.trip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.trip-card{border-radius:var(--radius);overflow:hidden;cursor:pointer;position:relative;border:1px solid var(--border);transition:transform .25s cubic-bezier(.22,.9,.36,1),box-shadow .25s,border-color .25s;box-shadow:var(--shadow-sm)}
.trip-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--border2)}
.trip-card-cover{height:160px;position:relative;display:flex;align-items:flex-end;padding:16px}
.trip-card-cover .dest-emoji{position:absolute;top:16px;right:16px;font-size:40px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.trip-card-cover .status-badge{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:20px;backdrop-filter:blur(8px)}
.trip-card-body{background:var(--panel);padding:16px}
.trip-card-body h3{font-size:17px;font-weight:700;margin-bottom:4px;font-family:'Cormorant Garamond',Georgia,serif}
.trip-card-body .subtitle{font-size:12px;color:var(--muted);margin-bottom:12px}
.trip-meta{display:flex;gap:12px;flex-wrap:wrap}
.trip-meta-item{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.shared-badge{font-size:10px;padding:2px 8px;background:rgba(74,144,226,.15);color:var(--blue);border:1px solid rgba(74,144,226,.25);border-radius:8px;font-weight:600}

/* ── Trip view ── */
#tripView{max-width:1100px;margin:0 auto;padding:18px 20px 48px}
.trip-hero{border-radius:var(--radius);display:flex;align-items:flex-end;padding:24px 26px;position:relative;overflow:hidden;margin-bottom:18px;min-height:150px;background:var(--panel);border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.trip-hero-content{position:relative;z-index:1}
.trip-hero-content h1{font-size:clamp(26px,4vw,40px);font-weight:600;letter-spacing:-.5px;margin-bottom:8px;color:var(--text)}
.trip-hero-content .trip-dates{font-size:13.5px;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap}
.trip-hero-emoji{position:absolute;top:20px;right:24px;font-size:52px;z-index:1;filter:drop-shadow(0 4px 16px rgba(0,0,0,.35))}
.hero-countdown{font-size:11px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.hero-bar-wrap{margin-top:14px;max-width:520px}
.hero-bar{position:relative;height:4px;border-radius:4px;background:color-mix(in srgb,var(--text) 16%,transparent)}
.hero-bar-fill{position:absolute;left:0;top:0;bottom:0;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--gold2))}
.hero-bar-dot{position:absolute;top:50%;width:11px;height:11px;border-radius:50%;background:var(--gold2);transform:translate(-50%,-50%);box-shadow:0 0 0 3px color-mix(in srgb,var(--gold) 30%,transparent)}
.hero-bar-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:7px;font-weight:500}
.btn-label{display:inline}
/* ── Horizontal tab bar (desktop) ── */
.trip-tabs-wrap{position:relative;margin-bottom:20px;padding-top:14px}
.trip-tabs-wrap::after{content:none}
.trip-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:2px}
.trip-tabs::-webkit-scrollbar{display:none}
.trip-tab{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;color:var(--muted);background:none;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:.15s;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.trip-tab:hover{background:var(--panel2);color:var(--text);border-color:var(--border)}
.trip-tab.active{background:var(--accent-soft);color:var(--gold);border-color:color-mix(in srgb,var(--gold) 40%,transparent);font-weight:700}
/* Over the glass trip backdrop, tabs need their own frosted pill + a clear
   filled active state to read correctly */
body.trip-open .trip-tab{color:color-mix(in srgb,var(--text) 80%,transparent);background:color-mix(in srgb,var(--panel) 40%,transparent);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-color:color-mix(in srgb,#fff 8%,transparent)}
body.trip-open .trip-tab:hover{color:var(--text);background:color-mix(in srgb,var(--panel) 60%,transparent)}
body.trip-open .trip-tab.active{background:linear-gradient(160deg,var(--gold2),var(--gold));color:#1c1503;border-color:var(--gold);box-shadow:0 4px 14px -5px rgba(217,184,119,.6)}
.trip-tab .tt-label{display:inline}
/* ── Itinerary view toggle (By Day / All Activities) ── */
.itin-seg{display:inline-flex;background:color-mix(in srgb,var(--panel) 45%,transparent);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid color-mix(in srgb,#fff 10%,transparent);border-radius:12px;padding:3px;margin-bottom:16px;gap:2px}
.itin-seg-btn{border:none;background:none;color:color-mix(in srgb,var(--text) 78%,transparent);font-family:inherit;font-size:13px;font-weight:600;padding:8px 16px;border-radius:9px;cursor:pointer;transition:.15s;white-space:nowrap}
.itin-seg-btn.active{background:linear-gradient(160deg,var(--gold2),var(--gold));color:#1c1503;font-weight:700}
.itin-seg-btn:disabled{opacity:.4;cursor:not-allowed}
/* ── Mobile bottom navigation (hidden on desktop) ── */
.bottom-nav{display:none;position:fixed;left:0;right:0;bottom:0;z-index:90;background:color-mix(in srgb,var(--bg) 85%,transparent);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);border-top:1px solid var(--border);padding:6px 4px calc(6px + env(safe-area-inset-bottom,0px));justify-content:space-around}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-family:inherit;font-size:10px;font-weight:600;letter-spacing:.2px;cursor:pointer;padding:5px 2px;border-radius:10px;-webkit-tap-highlight-color:transparent;min-height:48px;transition:color .15s}
.bn-item .nav-ico{width:22px;height:22px;transition:transform .15s}
.bn-item .bn-ico-emoji{font-size:20px;line-height:1}
.bn-item.active{color:var(--gold)}
.bn-item.active .nav-ico{transform:translateY(-1px) scale(1.05)}
/* nav icons in the desktop tab bar */
.trip-tab .nav-ico{width:16px;height:16px}
.more-tile{flex-direction:column!important;gap:8px!important;padding:20px 10px!important;border:1px solid var(--border)!important;border-radius:14px!important}
.more-tile .nav-ico{width:24px;height:24px}
.more-tile.active{border-color:var(--gold)!important;color:var(--gold)!important;background:var(--accent-soft)!important}

/* ── Map ── */
#tripMap{height:min(65vh,560px);border-radius:16px;border:1px solid var(--border);background:var(--panel2);z-index:1}
.map-pin-wrap{background:none;border:none}
.map-pin{width:32px;height:32px;border-radius:50%;background:var(--panel);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 10px rgba(0,0,0,.45)}
.leaflet-popup-content-wrapper,.leaflet-popup-tip{background:var(--panel);color:var(--text)}
.leaflet-container a.leaflet-popup-close-button{color:var(--muted)}

.split-btn{padding:4px 9px;font-size:12px;flex-shrink:0;margin-left:8px}
.discuss-chip{display:inline-flex;align-items:center;gap:3px;background:var(--panel2);border:1px solid var(--border);border-radius:14px;padding:3px 9px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;transition:.12s}
.discuss-chip:hover{border-color:var(--gold);color:var(--gold)}
.discuss-chip.has-activity{color:var(--gold);border-color:rgba(245,197,66,.35);background:rgba(245,197,66,.06)}

/* ── Itinerary day context strips (staying tonight / travel in progress) ── */
.day-ctx-wrap{margin:2px 0 10px;padding-left:2px}
.day-ctx{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:7px 12px;border-radius:9px;margin-bottom:6px;cursor:pointer;border:1px solid transparent;transition:.12s}
.day-ctx:hover{filter:brightness(1.15)}
.ctx-stay{background:rgba(167,139,250,.08);color:var(--purple);border-color:rgba(167,139,250,.22)}
.ctx-travel{background:rgba(74,144,226,.08);color:var(--blue);border-color:rgba(74,144,226,.22)}
.day-ctx-sub{color:var(--muted);font-weight:500}
.ev-transport{color:var(--cyan)}
/* Idea placeholders: dashed + muted until upgraded to a real activity */
.event-card.idea{border:1.5px dashed var(--border2);background:transparent;opacity:.9}
.event-card.idea .event-title{color:var(--muted);font-style:italic}
.idea-input{margin:4px 0 14px;padding:9px 14px;font-size:13px;background:transparent;border:1.5px dashed var(--border);border-radius:12px;color:var(--text);width:100%;transition:.15s}
.idea-input::placeholder{color:var(--dim)}
.idea-input:focus{border-color:var(--gold);border-style:solid;background:var(--panel)}
/* Drag & drop activities between days */
.event-card[draggable="true"]{cursor:grab}
.event-card[draggable="true"]:active{cursor:grabbing}
.day-block.drag-over{outline:2px dashed var(--gold);outline-offset:4px;border-radius:14px;background:rgba(245,197,66,.04)}

/* ── Mobile gestures: collapsing header + pull-to-refresh ── */
body{overscroll-behavior-y:contain}
#appHeader{transition:transform .22s ease}
body.hdr-hide #appHeader{transform:translateY(-100%)}
#ptrPill{position:fixed;top:calc(66px + env(safe-area-inset-top,0px));left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border2);color:var(--muted);padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;z-index:96;box-shadow:var(--shadow)}

/* ── Tab swipe transitions + touch drag ── */
.slide-in-r{animation:slideInR .3s cubic-bezier(.22,.9,.36,1)}
.slide-in-l{animation:slideInL .3s cubic-bezier(.22,.9,.36,1)}
@keyframes slideInR{from{opacity:0;transform:translateX(48px)}to{opacity:1;transform:none}}
@keyframes slideInL{from{opacity:0;transform:translateX(-48px)}to{opacity:1;transform:none}}
.ev-drag{color:var(--dim);font-size:15px;padding:4px 7px;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;flex-shrink:0}
.ev-drag:active{cursor:grabbing;color:var(--gold)}
.drag-ghost{position:fixed;z-index:9999;pointer-events:none;opacity:.92;box-shadow:0 18px 44px rgba(0,0,0,.55);transform:rotate(1.5deg);border-radius:12px;background:var(--panel)}

/* ── Mobile FAB + Today pill + skeletons ── */
.fab{display:none;position:fixed;right:16px;bottom:max(20px,calc(env(safe-area-inset-bottom,0px) + 16px));width:56px;height:56px;border-radius:18px;background:linear-gradient(160deg,var(--gold2),var(--gold));color:#1c1503;font-size:26px;font-weight:700;border:none;box-shadow:0 10px 28px -8px rgba(217,184,119,.6);z-index:95;cursor:pointer;align-items:center;justify-content:center;font-family:inherit;-webkit-tap-highlight-color:transparent}
.fab:active{transform:scale(.92)}
@media(max-width:680px){.fab{display:flex}}
.today-pill{position:fixed;bottom:max(20px,calc(env(safe-area-inset-bottom,0px) + 16px));left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--gold);color:var(--gold);padding:9px 16px;border-radius:30px;font-size:13px;font-weight:700;z-index:94;cursor:pointer;box-shadow:var(--shadow);font-family:inherit;animation:pplIn .2s ease-out}
.skel{background:linear-gradient(90deg,var(--panel) 25%,var(--panel2) 50%,var(--panel) 75%);background-size:200% 100%;animation:skel 1.2s infinite;border-radius:14px;margin-bottom:14px}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── Offline sync pill ── */
#syncPill{position:fixed;bottom:16px;left:16px;background:var(--panel);border:1px solid var(--gold);color:var(--gold);padding:9px 15px;border-radius:30px;font-size:12px;font-weight:600;z-index:9998;cursor:pointer;box-shadow:var(--shadow);animation:pplIn .2s ease-out}

/* ── Weather + Today ── */
.wx-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.wx-row::-webkit-scrollbar{display:none}
.wx-day{flex:1;min-width:64px;text-align:center;padding:10px 4px;border-radius:12px;border:1px solid transparent}
.wx-day.on-trip{background:rgba(245,197,66,.07);border-color:var(--border2)}
.wx-date{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.wx-icon{font-size:24px;margin:6px 0 4px}
.wx-temp{font-size:14px;font-weight:700}
.wx-temp.lo{font-size:12px;font-weight:500;color:var(--muted)}
.wx-rain{font-size:10px;color:var(--cyan);min-height:14px;margin-top:2px}
.today-card{margin-bottom:16px;border-color:var(--gold);box-shadow:0 0 0 1px rgba(245,197,66,.15)}
.today-row{display:flex;align-items:baseline;gap:8px;padding:6px 0;font-size:14px}
.today-time{font-size:12px;font-weight:700;color:var(--gold);min-width:44px;flex-shrink:0}
.today-ico{flex-shrink:0}
.today-body{flex:1;min-width:0;overflow-wrap:anywhere;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── Overview ── */
.overview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
/* Trip Summary panel — divided stat columns */
.summary-panel{margin-bottom:18px;padding:18px 20px}
.summary-title{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.summary-row{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.summary-row::-webkit-scrollbar{display:none}
.summary-cell{flex:1 0 auto;padding:0 16px;border-left:1px solid var(--border);min-width:72px}
.summary-cell:first-child{padding-left:0;border-left:none}
.summary-val{font-family:'Cormorant Garamond',Georgia,serif;font-size:30px;font-weight:700;color:var(--gold);line-height:1.1}
.summary-lbl{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-top:4px}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px}
.stat-card .stat-val{font-size:28px;font-weight:700;font-family:'Cormorant Garamond',Georgia,serif;color:var(--gold)}
.stat-card .stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.fun-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:24px}
.fun-stat{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.fun-stat-icon{font-size:22px;flex-shrink:0;width:36px;text-align:center}
.fun-stat-body{}
.fun-stat-val{font-size:18px;font-weight:700;color:var(--text);line-height:1.2}
.fun-stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-top:2px}
.notes-area{width:100%;resize:vertical;min-height:100px;font-size:14px;line-height:1.6}

/* ── Members ── */
.member-card{display:flex;align-items:center;gap:12px;padding:12px;background:var(--panel2);border:1px solid var(--border2);border-radius:12px;margin-bottom:8px}
.member-avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--border2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
.member-info{flex:1;min-width:0}
.member-name{font-weight:600;font-size:14px}
.member-email{font-size:12px;color:var(--muted)}
.role-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.5px;text-transform:uppercase}
.role-badge.owner{background:rgba(245,197,66,.15);color:var(--gold);border:1px solid rgba(245,197,66,.3)}
.role-badge.editor{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.role-badge.viewer{background:rgba(122,144,184,.12);color:var(--muted);border:1px solid var(--border2)}

/* ── Timeline / Events ── */
.day-block{margin-bottom:32px;scroll-margin-top:80px}
.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;cursor:pointer;user-select:none}
.day-header:hover .day-num{opacity:.8}
.day-label{display:flex;align-items:center;gap:12px}
.day-num{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;transition:opacity .15s}
.day-info h3{font-family:'Inter',sans-serif;font-size:16px;font-weight:700;letter-spacing:-.2px;margin-bottom:2px}
.day-info .day-date{font-size:12px;color:var(--muted)}
.day-collapse-btn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:4px;line-height:1;flex-shrink:0;transition:transform .2s}
.day-collapse-btn.collapsed{transform:rotate(-90deg)}
.itin-filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.itin-auto{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--panel);border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
.itin-auto.itin-flight{border-left:3px solid var(--blue)}
.itin-auto.itin-stay{border-left:3px solid var(--green)}
.itin-auto-icon{font-size:15px;width:28px;text-align:center;flex-shrink:0}
.itin-auto-body{flex:1;min-width:0}
.itin-auto-title{font-size:13px;font-weight:600}
.itin-auto-meta{font-size:11px;color:var(--muted);margin-top:1px}
.itin-auto-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;flex-shrink:0;cursor:pointer}
.itin-auto-tag.tag-flight{background:rgba(74,144,226,.15);color:var(--blue)}
.itin-auto-tag.tag-stay{background:rgba(52,211,153,.12);color:var(--green)}
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--border);border-radius:2px}
.tl-event{position:relative;margin-bottom:12px}
.tl-dot{position:absolute;left:-23px;top:14px;width:12px;height:12px;border-radius:50%;border:2px solid var(--bg);z-index:1}
.event-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;transition:border-color .15s,background .15s,transform .12s;display:flex;gap:13px;align-items:flex-start}
.event-card:hover{border-color:var(--border2);background:var(--panel2)}
.event-card:active{transform:scale(.995)}
.event-card.confirmed{border-left:2.5px solid var(--green)}
.event-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.event-icon .nav-ico{width:20px;height:20px}
.booking-icon .nav-ico{width:23px;height:23px}
.event-body{flex:1;min-width:0}
.event-title{font-weight:600;font-size:14.5px;margin-bottom:3px;letter-spacing:-.1px}
.event-meta{font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;margin-top:5px;align-items:center}
.event-cost{font-size:13px;font-weight:700;color:var(--gold);flex-shrink:0}
.event-card-right{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:auto}
.photo-btn{background:none;border:1px solid var(--border);color:var(--dim);font-size:11px;padding:4px 9px;border-radius:20px;cursor:pointer;transition:.15s;flex-shrink:0;line-height:1.4;white-space:nowrap}
.photo-btn:hover{color:var(--gold);border-color:color-mix(in srgb,var(--gold) 40%,transparent)}
.photo-btn:hover,.photo-btn.active{background:var(--border2);color:var(--text)}
.ev-photo-panel{padding:6px 0 4px 50px}
.photo-strip{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.photo-strip::-webkit-scrollbar{display:none}
.photo-strip a{flex-shrink:0;display:block}
.photo-strip-img{width:100px;height:70px;border-radius:8px;object-fit:cover;display:block;opacity:0;transition:opacity .3s}
.photo-strip-img.loaded{opacity:1}
.photo-strip-ig{flex-shrink:0;width:70px;height:70px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);border-radius:8px;font-size:10px;font-weight:700;color:#fff;text-decoration:none;text-align:center;line-height:1.5;padding:6px}
.photo-credit{font-size:10px;color:var(--dim);margin-top:5px}

/* ── Bookings ── */
.booking-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:18px 20px;margin-bottom:12px;cursor:pointer;transition:border-color .15s,transform .12s;box-shadow:var(--shadow-sm)}
.booking-card:hover{border-color:var(--border2)}
.booking-card:active{transform:scale(.995)}
.booking-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:10px}
.booking-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.booking-title{font-weight:700;font-size:15px;margin-bottom:3px}
.booking-sub{font-size:13px;color:var(--muted)}
.booking-detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding-top:10px;border-top:1px solid var(--border)}
.booking-detail .bd-label{color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px;font-size:10px}
.booking-detail .bd-val{font-weight:600;font-size:13px}
.conf-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.5px}
.conf-badge.confirmed{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.conf-badge.pending{background:rgba(251,146,60,.12);color:var(--orange);border:1px solid rgba(251,146,60,.3)}
.conf-badge.partial{background:rgba(74,144,226,.12);color:var(--blue);border:1px solid rgba(74,144,226,.3)}
/* Flight round-trip card */
.fl-legs{padding:10px 0 2px}
.fl-leg{display:flex;align-items:center;gap:10px;padding:7px 0}
.fl-leg+.fl-leg{border-top:1px dashed var(--border)}
.fl-leg-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);width:30px;flex-shrink:0}
.fl-leg-ret .fl-leg-label{color:var(--blue)}
.fl-leg-route{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.fl-leg-point{flex:1;min-width:0}
.fl-leg-code{font-size:17px;font-weight:700;letter-spacing:.5px}
.fl-leg-time{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap}
.fl-leg-arrow{color:var(--dim);font-size:13px;flex-shrink:0}
.fl-return-toggle{border-top:1px solid var(--border);margin:14px 0 10px;padding-top:12px;display:flex;align-items:center;gap:10px}

/* ── Packing ── */
.pack-section{margin-bottom:24px}
.pack-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pack-section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);display:flex;align-items:center;gap:8px}
.pack-progress{flex:1;height:4px;background:var(--border);border-radius:4px;overflow:hidden;margin:0 12px}
.pack-progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width .3s}
.pack-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:var(--panel);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:.15s}
.pack-item:hover{border-color:var(--border2)}
.pack-item.packed .pack-name{text-decoration:line-through;color:var(--dim)}
.pack-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;transition:.15s}
.pack-item.packed .pack-check{background:var(--green);border-color:var(--green);color:#000}
.pack-name{flex:1;font-size:14px}
.pack-qty{font-size:12px;color:var(--muted);margin-right:4px}
.pack-del{font-size:12px;color:var(--dim);opacity:0;transition:.15s}
.pack-item:hover .pack-del{opacity:1}
.pack-cat-add{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:1px 6px;border-radius:6px;line-height:1;flex-shrink:0;transition:.15s}
.pack-cat-add:hover{background:var(--border);color:var(--text)}
.pack-quick-add{margin-bottom:8px}
.pack-quick-input{width:100%;box-sizing:border-box;background:var(--panel);border:1px dashed var(--border2);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px;outline:none;font-family:inherit}
.pack-quick-input:focus{border-color:var(--accent);border-style:solid}
.pack-quick-input::placeholder{color:var(--dim)}

/* ── Budget ── */
.budget-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.budget-stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px}
.budget-stat .bv{font-size:22px;font-weight:700;margin-bottom:2px}
.budget-stat .bl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.budget-item{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;transition:.15s}
.budget-item:hover{border-color:var(--border2)}
.budget-bar{height:6px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:8px}
.budget-bar-fill{height:100%;border-radius:4px;transition:width .4s}
.budget-group{margin-bottom:22px}
.budget-group-head{display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.budget-group-head.bg-conf{color:var(--green)}
.budget-group-head.bg-pot{color:var(--orange)}
.budget-line{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--panel);border:1px solid var(--border);border-radius:10px;margin-bottom:7px}
.budget-line-icon{font-size:16px;flex-shrink:0;width:24px;text-align:center}
.budget-line-body{flex:1;min-width:0}
.budget-line-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.budget-line-sub{font-size:11px;color:var(--muted);margin-top:1px}
.budget-line-amt{font-size:14px;font-weight:700;color:var(--gold);flex-shrink:0}

/* ── Travelers ── */
.traveler-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.traveler-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:.15s;position:relative}
.traveler-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.35)}
.traveler-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0}
.traveler-header{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.traveler-name{font-size:16px;font-weight:700;font-family:'Cormorant Garamond',Georgia,serif}
.traveler-role{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.traveler-fields{display:grid;gap:8px}
.traveler-field{display:flex;gap:8px;align-items:flex-start;font-size:13px}
.traveler-field-icon{font-size:14px;flex-shrink:0;width:20px;padding-top:1px;text-align:center}
.traveler-field-body{flex:1;min-width:0}
.traveler-field-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px;font-weight:600}
.traveler-field-val{color:var(--text);word-break:break-word}
.traveler-field-val.warn{color:var(--coral)}

/* ═══════════════════════════════════════════════
   OFFLINE WRITE QUEUE (outbox)
   DB.from() is wrapped so that when an insert/update/delete fails at
   the network level (offline), the operation is stored in localStorage,
   applied to the local cache so the UI updates instantly, and replayed
   to Supabase when the connection returns. Server-rejected ops (RLS,
   validation) are NOT queued — only fetch-level failures are.
   Conflict policy: last write wins.
═══════════════════════════════════════════════ */
const OUTBOX_KEY='wtn-outbox';
// PostgREST filter methods that can constrain a write; all are captured for
// faithful offline replay (see the DB.from proxy)
const FILTER_METHODS=new Set(['eq','neq','gt','gte','lt','lte','like','ilike','is','in','contains','containedBy','match','not','or','filter']);
let PENDING_WRITES=0,LAST_WRITE_AT=0;
function outbox(){try{return JSON.parse(localStorage.getItem(OUTBOX_KEY)||'[]')}catch{return[]}}
function outboxSave(q){try{localStorage.setItem(OUTBOX_KEY,JSON.stringify(q))}catch{}}

const _dbFrom = DB.from.bind(DB);
DB.from = table => wrapBuilder(_dbFrom(table), {table, op:null, data:null, filters:[]});
function wrapBuilder(target, desc){
  return new Proxy(target, {
    get(t, prop){
      if(prop === 'then'){
        if(!desc.op) return t.then.bind(t); // reads pass through untouched
        // Track in-flight writes so live-sync reloads wait for them —
        // otherwise our own realtime echo can re-render stale state
        PENDING_WRITES++;
        let settled=false;
        const settle=()=>{if(settled)return;settled=true;PENDING_WRITES=Math.max(0,PENDING_WRITES-1);LAST_WRITE_AT=Date.now();};
        // Safety net: a hung fetch must not block realtime reloads forever
        setTimeout(settle,15000);
        const p = t.then(
          res => {settle();return res;},
          () => {
            settle();
            queueOp(desc);
            // Mimic what the server would have returned so `.select().single()`
            // call sites keep working (ids were fixed client-side in queueOp)
            let data=null;
            if(desc.op==='insert'||desc.op==='upsert'){
              const rows=Array.isArray(desc.data)?desc.data:[desc.data];
              data=desc.single?rows[0]:rows;
            }
            return {data, error:null, queued:true};
          }
        );
        return p.then.bind(p);
      }
      const v = Reflect.get(t, prop);
      if(typeof v !== 'function') return v;
      return (...args) => {
        if(prop==='insert'||prop==='upsert'){desc.op=prop;desc.data=args[0];}
        else if(prop==='update'){desc.op='update';desc.data=args[0];}
        else if(prop==='delete'){desc.op='delete';}
        else if(prop==='single'||prop==='maybeSingle'){desc.single=true;}
        // Capture every PostgREST filter on a write so offline replay is
        // faithful — a dropped filter (e.g. .lt) would replay as delete/update
        // over every RLS-visible row. eq/in/match keep their local-apply
        // fast-paths; anything else still replays correctly, just isn't
        // reflected in the optimistic local cache.
        else if(desc.op&&FILTER_METHODS.has(prop))desc.filters.push([prop,...args]);
        const out = v.apply(t, args);
        return out&&typeof out==='object'&&typeof out.then==='function' ? wrapBuilder(out, desc) : out;
      };
    }
  });
}

let OFFLINE_TOAST_AT=0;
function queueOp(desc){
  if(desc.op==='insert'||desc.op==='upsert'){
    // Fix ids client-side so the local cache and the eventual replay agree,
    // and so an accidental double-replay hits a duplicate-key error instead
    // of inserting twice.
    const rows=Array.isArray(desc.data)?desc.data:[desc.data];
    rows.forEach(r=>{if(r&&!r.id)r.id=crypto.randomUUID();});
  }
  const q=outbox();q.push(desc);outboxSave(q);
  applyOpToLocal(desc);
  updateSyncPill();
  if(Date.now()-OFFLINE_TOAST_AT>8000){OFFLINE_TOAST_AT=Date.now();toast('📴 Saved offline — will sync when you\'re back online');}
}

const OUTBOX_TABLES={wtn_events:'events',wtn_flights:'flights',wtn_stays:'stays',wtn_pack_items:'packItems',wtn_budget_items:'budgetItems',wtn_trip_docs:'docs'};
// Passport/visa data must never touch disk — strip travelers from every
// TD cache write, no matter which code path persists it. Coalesced on idle
// so a burst of edits doesn't stringify the whole trip synchronously each
// time (the offline outbox is the source of truth for pending writes; this
// cache is only a read fallback, so a slight delay is harmless).
const _cacheTDPending=new Map();
let _cacheTDScheduled=false;
function cacheTD(tripId,td){
  _cacheTDPending.set(tripId,td);
  if(_cacheTDScheduled)return;
  _cacheTDScheduled=true;
  const flush=()=>{
    _cacheTDScheduled=false;
    for(const [id,t] of _cacheTDPending){
      try{localStorage.setItem('wtn-cache-td-'+id,JSON.stringify({...t,travelers:[]}));}catch{}
    }
    _cacheTDPending.clear();
  };
  (window.requestIdleCallback||(f=>setTimeout(f,200)))(flush);
}
function applyOpToLocal(desc){
  try{
    const eqId=(desc.filters.find(f=>f[0]==='eq'&&f[1]==='id')||[])[2];
    if(desc.table==='wtn_trips'){
      if(desc.op==='update'&&eqId){const t=TRIPS.find(x=>x.id===eqId);if(t)Object.assign(t,desc.data);localStorage.setItem('wtn-cache-trips',JSON.stringify(TRIPS));}
      else if(desc.op==='insert'){
        // Callers add the returned row to TRIPS themselves — only persist the
        // cache here (deduped) so a reload while offline still shows the trip
        const rows=(Array.isArray(desc.data)?desc.data:[desc.data]).map(r=>({created_at:new Date().toISOString(),...r}));
        const merged=[...rows.filter(r=>!TRIPS.some(x=>x.id===r.id)),...TRIPS];
        localStorage.setItem('wtn-cache-trips',JSON.stringify(merged));
      }
      else if(desc.op==='delete'&&eqId){const i=TRIPS.findIndex(x=>x.id===eqId);if(i>=0)TRIPS.splice(i,1);localStorage.setItem('wtn-cache-trips',JSON.stringify(TRIPS));}
      return;
    }
    const key=OUTBOX_TABLES[desc.table];if(!key)return;
    if(desc.op==='insert'||desc.op==='upsert'){
      (Array.isArray(desc.data)?desc.data:[desc.data]).forEach(r=>{
        const td=TD[r.trip_id];if(!td)return;
        td[key]=td[key]||[];
        // Dedupe by id: optimistic paths (quick-add idea/packing) already
        // pushed this row locally before the offline write rejected here
        if(r.id&&td[key].some(x=>x.id===r.id))return;
        td[key].push({created_at:new Date().toISOString(),...r});
        cacheTD(r.trip_id,td);
      });
    }else if(eqId){
      for(const [tripId,td] of Object.entries(TD)){
        const arr=td[key];if(!arr)continue;
        const idx=arr.findIndex(x=>x.id===eqId);
        if(idx<0)continue;
        if(desc.op==='update')Object.assign(arr[idx],desc.data);
        else arr.splice(idx,1);
        cacheTD(tripId,td);
        break;
      }
    }
  }catch{}
}

let FLUSHING=false;
async function flushOutbox(){
  if(FLUSHING||!navigator.onLine)return;
  const q=outbox();
  if(!q.length){updateSyncPill();return;}
  FLUSHING=true;
  const remaining=[];let synced=0,dropped=0;
  try{
    for(const desc of q){
      try{
        let b=_dbFrom(desc.table);
        b=desc.op==='insert'?b.insert(desc.data):desc.op==='upsert'?b.upsert(desc.data):desc.op==='update'?b.update(desc.data):b.delete();
        for(const f of desc.filters)b=b[f[0]](...f.slice(1));
        const {error}=await b;
        if(error){dropped++;console.warn('Outbox op rejected by server, dropping:',desc,error);}
        else synced++;
      }catch(e){remaining.push(desc);} // still offline — keep for next attempt
    }
  }finally{
    outboxSave(remaining);FLUSHING=false;updateSyncPill();
  }
  if(synced){
    toast(`☁️ ${synced} offline change${synced!==1?'s':''} synced ✓`);
    if(CUR.view==='trip'&&CUR.tripId){await loadTripDetail(CUR.tripId);renderTab();}
    else if(CUR.view==='dashboard'&&ME){await loadTrips();renderDashboard();}
  }
  if(dropped)toast(`⚠️ ${dropped} offline change${dropped!==1?'s':''} rejected by the server`);
}
function updateSyncPill(){
  const n=outbox().length;
  let el=document.getElementById('syncPill');
  if(!n){el?.remove();return;}
  if(!el){
    el=document.createElement('div');el.id='syncPill';
    el.title='Tap to retry now';el.onclick=()=>flushOutbox();
    document.body.appendChild(el);
  }
  el.textContent=`📴 ${n} change${n!==1?'s':''} waiting to sync`;
}
window.addEventListener('online',()=>setTimeout(flushOutbox,800));
setInterval(()=>{if(navigator.onLine&&ME&&outbox().length)flushOutbox();},30000);

function uid(){return Math.random().toString(36).slice(2,9)}
function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#x27;'}[c]))}
function safeBannerUrl(u){if(!u)return'';if(u.startsWith('data:image/'))return u;try{const p=new URL(u).protocol;if(p!=='https:'&&p!=='http:')return'';}catch{return'';}return u;}
function fmt(iso){if(!iso)return'';const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function fmtShort(iso){if(!iso)return'';const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function fmtDay(iso){if(!iso)return'';const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function diffDays(a,b){return Math.round((new Date(b)-new Date(a))/(1000*60*60*24))}
function formatCost(amt,cur){if(!amt)return'';return`${cur||'$'}${Number(amt).toLocaleString()}`}
function tripCountdown(t){
  const now=new Date(),s=new Date(t.start_date+'T00:00:00'),e=new Date(t.end_date+'T23:59:59');
  if(now<s){const d=Math.ceil((s-now)/864e5);return{label:`in ${d} day${d===1?'':'s'}`,status:'upcoming'}}
  if(now<=e)return{label:'Happening now!',status:'active'};
  return{label:'Completed',status:'past'};
}
// Slim progress bar for the trip hero (countdown-to-trip, then day-of-trip)
function heroProgress(t){
  if(!t.start_date||!t.end_date)return'';
  const s=new Date(t.start_date+'T12:00:00'),e=new Date(t.end_date+'T12:00:00'),n=new Date();
  let pct,left,right;
  if(n<s){pct=4;left='Upcoming';right=fmt(t.start_date);}
  else if(n<=e){pct=Math.max(4,Math.round((n-s)/(e-s||1)*100));left='Day '+(diffDays(t.start_date,new Date().toLocaleDateString('en-CA'))+1);right=fmt(t.end_date);}
  else{pct=100;left='Completed';right=fmt(t.end_date);}
  return`<div class="hero-bar-wrap">
    <div class="hero-bar"><div class="hero-bar-fill" style="width:${pct}%"></div><div class="hero-bar-dot" style="left:${pct}%"></div></div>
    <div class="hero-bar-labels"><span>${esc(left)}</span><span>${esc(right)}</span></div>
  </div>`;
}
function tripDays(t){
  if(!t.start_date||!t.end_date)return[];
  const days=[];let d=new Date(t.start_date+'T12:00:00');
  const end=new Date(t.end_date+'T12:00:00');
  // Emit local-calendar day strings (toLocaleDateString en-CA) to match how
  // the rest of the app derives "today" — toISOString would shift a day in
  // UTC+13/+14 (NZ/Pacific) and break event→day matching and jump-to-today
  while(d<=end){days.push(d.toLocaleDateString('en-CA'));d=new Date(d.getTime()+864e5);}
  return days;
}
function toast(msg,action){
  const el=document.createElement('div');el.className='toast';el.textContent=msg;
  if(action){
    const b=document.createElement('button');
    b.className='toast-action';b.textContent=action.label||'Undo';
    b.onclick=()=>{el.remove();action.fn();};
    el.appendChild(b);
  }
  document.getElementById('toastRoot').appendChild(el);
  setTimeout(()=>el.remove(),action?6000:2400);
}

// Delete with a 6s Undo instead of a jarring confirm() dialog: the row is
// removed optimistically + on the server, and Undo re-inserts it verbatim.
const UNDO_TABLES={wtn_events:'events',wtn_flights:'flights',wtn_stays:'stays',wtn_pack_items:'packItems',wtn_budget_items:'budgetItems'};
async function deleteRowUndo(tripId,table,id,label){
  const key=UNDO_TABLES[table];
  const arr=TD[tripId]?.[key]||[];
  const idx=arr.findIndex(x=>x.id===id);
  const row=idx>=0?{...arr[idx]}:null;
  if(idx>=0){arr.splice(idx,1);}
  closeModal();renderTab();
  const {error}=await DB.from(table).delete().eq('id',id);
  if(error){toast('Delete failed');await loadTripDetail(tripId);renderTab();return;}
  toast(`${label} deleted`,{label:'Undo',fn:async()=>{
    if(!row)return;
    const {error:e2}=await DB.from(table).insert(row);
    if(e2){toast('Could not restore');return;}
    await loadTripDetail(tripId);renderTab();
    toast('Restored ✓');
  }});
}

// All destinations for a trip: primary + extras, deduped
function tripDests(t){
  const out=[];
  const push=x=>{x=(x||'').trim();if(x&&!out.some(y=>y.toLowerCase()===x.toLowerCase()))out.push(x);};
  push(t?.destination);
  (Array.isArray(t?.destinations)?t.destinations:[]).forEach(push);
  return out;
}
// Active region filter (per session; cleared when opening a trip)
let REGION_FILTER=null;
function setRegionFilter(r){REGION_FILTER=r||null;renderTab();}
// Effective region of an item: explicit tag wins, otherwise inferred by
// matching the trip's destination cities against the item's own text
// (location, address, city, name, title) — so tagging is rarely needed.
function itemRegion(t,x){
  if(x.region)return x.region;
  const dests=tripDests(t);
  if(dests.length<2)return null;
  const hay=[x.location,x.address,x.city,x.name,x.title].filter(Boolean).join(' ').toLowerCase();
  if(!hay)return null;
  for(const dd of dests){
    const city=dd.split(',')[0].trim().toLowerCase();
    if(city&&hay.includes(city))return dd;
  }
  return null;
}
function filterByRegion(d,t){
  if(!REGION_FILTER)return d;
  const m=x=>itemRegion(t,x)===REGION_FILTER;
  return {...d,
    events:(d.events||[]).filter(m),
    stays:(d.stays||[]).filter(m),
    flights:(d.flights||[]).filter(m),
  };
}
function regionFilterBar(t,d){
  if(!SCHEMA_V6)return'';
  const dests=tripDests(t);
  if(dests.length<2)return'';
  const unmatched=REGION_FILTER?[...(d.events||[]),...(d.stays||[]),...(d.flights||[])].filter(x=>!itemRegion(t,x)).length:0;
  return`<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:14px">
    <button class="btn sm ${!REGION_FILTER?'primary':'ghost'}" onclick="setRegionFilter('')">🌍 All</button>
    ${dests.map(x=>`<button class="btn sm ${REGION_FILTER===x?'primary':'ghost'}" data-r="${esc(x)}" onclick="setRegionFilter(this.dataset.r)">📍 ${esc(x.split(',')[0])}</button>`).join('')}
    ${unmatched?`<span style="font-size:11px;color:var(--dim)">${unmatched} item${unmatched!==1?'s':''} without a matching city hidden — mention the city in the item or set its region</span>`:''}
  </div>`;
}
// Region <select> for item modals (only when the trip has 2+ destinations).

function regionSelect(t,idAttr,current,isNew){

  </div>`;

// Pull exact coordinates + place name out of a Google Maps URL
function parseGmapsLink(url){
  try{
    const u=decodeURIComponent(url);
    const name=(u.match(/\/maps\/place\/([^/@]+)/)||[])[1]?.replace(/\+/g,' ')||null;
    let m=u.match(/!3d(-?\d+\.?\d*)!4d(-?\d+\.?\d*)/);          // exact place marker
    if(m)return{lat:+m[1],lng:+m[2],name};
    m=u.match(/[?&]q=(-?\d+\.?\d*),(-?\d+\.?\d*)/);              // q=lat,lng
    if(m)return{lat:+m[1],lng:+m[2],name};
    m=u.match(/@(-?\d+\.?\d*),(-?\d+\.?\d*)/);                   // map center (close enough)
    if(m)return{lat:+m[1],lng:+m[2],name};
  }catch{}
  return null;
}
function gmapLinkChanged(el,prefix){
  const v=el.value.trim();
  if(!v)return;
  if(/maps\.app\.goo\.gl|goo\.gl\/maps/.test(v)){
    toast('Short links hide the location — open it in the browser and copy the full maps.google.com URL');
    return;
  }
  const p=parseGmapsLink(v);
  if(!p){toast('Could not read coordinates from that link');return;}
  const la=document.getElementById(prefix+'_lat'),lo=document.getElementById(prefix+'_lng');
  if(la)la.value=p.lat;
  if(lo)lo.value=p.lng;
  toast('📍 Exact location captured ✓');
}

};
let RT_DIRTY=new Set();
function subscribeTripRealtime(tripId){
  try{
    if(RT_CHANNEL){DB.removeChannel(RT_CHANNEL);RT_CHANNEL=null;}
    if(!DB.channel)return;
    RT_DIRTY=new Set();
    let ch=DB.channel('trip-'+tripId);
    Object.keys(RT_TABLE_LOADERS).forEach(tbl=>{
      ch=ch.on('postgres_changes',{event:'*',schema:'public',table:tbl,filter:`trip_id=eq.${tripId}`},()=>{
        RT_DIRTY.add(tbl);
        // Debounced, and deferred while our own writes are in flight or very
        // recent, so the echo of our own edit doesn't revert newer local state
        const attempt=async()=>{
          if(PENDING_WRITES>0||Date.now()-LAST_WRITE_AT<1200){
            clearTimeout(RT_TIMER);RT_TIMER=setTimeout(attempt,700);return;
          }
          if(CUR.view!=='trip'||CUR.tripId!==tripId||document.getElementById('modalRoot').innerHTML)return;
          const tables=[...RT_DIRTY];RT_DIRTY.clear();
          try{
            const patches=await Promise.all(tables.map(tb=>RT_TABLE_LOADERS[tb](tripId)));
            if(CUR.tripId!==tripId||!TD[tripId])return;
            Object.assign(TD[tripId],...patches);
            cacheTD(tripId,TD[tripId]);
            renderTab();
          }catch{}
        };
        clearTimeout(RT_TIMER);
        RT_TIMER=setTimeout(attempt,500);
      });
    });
    RT_CHANNEL=ch.subscribe();
  }catch{}
}
function unsubscribeTripRealtime(){
  try{if(RT_CHANNEL){DB.removeChannel(RT_CHANNEL);RT_CHANNEL=null;}}catch{}
}

// Exchange rates keyed by base ISO code; null = all sources failed.
// Primary: frankfurter.dev (ECB reference rates, business-daily). ECB doesn't
// list every currency (e.g. VND), so open.er-api.com (daily) fills the gaps.
let RATES={};
async function ensureRates(baseSym){
  const iso=SYM2ISO[baseSym||'$']||'USD';
  if(RATES[iso]!==undefined)return;
  let rates=null;
  try{
    const r=await fetch(`https://api.frankfurter.dev/v1/latest?base=${iso}`);
    if(r.ok)rates=(await r.json()).rates;
  }catch{}
  try{
    const r2=await fetch(`https://open.er-api.com/v6/latest/${iso}`);
    if(r2.ok){
      const extra=(await r2.json())?.rates||{};
      rates=rates?{...extra,...rates}:extra; // ECB wins where both have a rate
    }
  }catch{}
  RATES[iso]=rates&&Object.keys(rates).length?rates:null;
}
function convToTrip(amt,itemSym,tripSym){
  if(!amt)return 0;
  if(!itemSym||itemSym===tripSym)return +amt;
  const from=SYM2ISO[itemSym],to=SYM2ISO[tripSym||'$']||'USD';
  if(!from||from===to)return +amt;
  const rates=RATES[to];
  if(!rates||!rates[from])return null; // rates unavailable — caller shows the original amount
  return +amt/rates[from];
}

/* ═══════════════════════════════════════════════
   AUTH FLOW
═══════════════════════════════════════════════ */
async function initApp(){
  // Public read-only share link: ?share=<token> renders the itinerary with
  // no sign-in required. Short-circuits the whole auth flow.
  const shareTok=new URLSearchParams(location.search).get('share');
  if(shareTok){renderSharedTrip(shareTok);return;}
  showLoading('Checking your session…');
  let handled=false;
  // IMPORTANT: never await other Supabase calls *inside* this callback — it runs
  // while the auth lock is held and awaiting DB queries here can deadlock, which
  // left the app blank until a hard refresh. Defer the work with setTimeout(…,0)
  // so afterSignIn() runs outside the lock.
  DB.auth.onAuthStateChange((event,session)=>{
    clearTimeout(window.__loadTimer); // app is responding, cancel the global safety net
    if(event==='SIGNED_OUT'){
      handled=false; ME=null; TRIPS=[]; TD={}; showSignIn();
      return;
    }
    if(handled)return;
    if((event==='INITIAL_SESSION'||event==='SIGNED_IN')&&session){
      handled=true;
      setTimeout(()=>{ afterSignIn(session.user); },0);
    } else if(event==='INITIAL_SESSION'&&!session){
      showSignIn();
    }
  });
}

async function afterSignIn(user){
  showLoading('Loading your profile…');
  // Trigger handles insert; retry a few times in case it's still propagating
  let profile = null, lastErr = null;
  for(let i=0;i<6;i++){
    try{
      const {data,error} = await DB.from('wtn_profiles').select('*').eq('id',user.id).single();
      if(data){profile=data;break;}
      lastErr=error;
    }catch(e){
      // Network down — boot from the cached profile so the trip data
      // (also cached) is still reachable offline
      try{profile=JSON.parse(localStorage.getItem('wtn-cache-me')||'null')}catch{}
      if(profile)break;
      lastErr=e;
    }
    await new Promise(r=>setTimeout(r,900));
  }
  ME = profile;
  if(ME)try{localStorage.setItem('wtn-cache-me',JSON.stringify(ME))}catch{}

  if(!ME){
    document.getElementById('root').innerHTML=`<div class="loading-screen"><p style="color:var(--coral);max-width:380px;text-align:center">Could not load your profile. Try signing out and back in.<br><br><small style="color:var(--dim)">${lastErr?.message||'unknown error'}</small></p><button class="btn primary" onclick="signOut()" style="margin-top:16px">Sign out</button></div>`;
    return;
  }

  // Ryan is always approved
  if(ME.email===ADMIN_EMAIL && !ME.approved){
    await DB.from('wtn_profiles').update({approved:true}).eq('id',ME.id);
    ME.approved=true;
  }

  if(!ME.approved){
    const {data:req} = await DB.from('wtn_access_requests').select('*').eq('user_id',ME.id).order('requested_at',{ascending:false}).limit(1).single();
    if(!req){showRequestAccess();}
    else{showPending(req);}
    return;
  }

  renderAuthHeader();
  // Resolve schema feature flags BEFORE the first render/save so cold-start
  // saves don't silently drop lat/lng/region while detection is still pending
  await Promise.all([detectSchemaV2(),detectSchemaV3(),detectSchemaV4(),detectSchemaV5(),detectSchemaV6(),detectSchemaV7(),detectSchemaV8(),detectSchemaV9(),detectSchemaV10(),detectSchemaV13(),detectSchemaV14(),detectSchemaV15()]);
  await loadTrips();
  if(PENDING_INVITE){await processInvite(PENDING_INVITE);}
  else{renderDashboard();}
  // Push any changes made offline last session, and surface the pending pill
  updateSyncPill();
  if(outbox().length)flushOutbox();
}

/* ═══════════════════════════════════════════════
   DATA LOADING
═══════════════════════════════════════════════ */
async function loadTrips(){
  try{
    const {data:owned} = await DB.from('wtn_trips').select('*').eq('owner_id',ME.id).order('created_at',{ascending:false});
    const {data:memberships} = await DB.from('wtn_trip_members').select('trip_id, role, wtn_trips!trip_id(*)').eq('user_id',ME.id);
    const memberTrips = (memberships||[]).filter(m=>m.wtn_trips).map(m=>({...m.wtn_trips, _role:m.role}));
    const seen=new Set((owned||[]).map(t=>t.id));
    const all=[...(owned||[]),...memberTrips.filter(t=>!seen.has(t.id))];
    TRIPS=all;
    try{localStorage.setItem('wtn-cache-trips',JSON.stringify(all))}catch{}
  }catch(e){
    // Network down — fall back to last-synced copy so the itinerary is still readable
    try{TRIPS=JSON.parse(localStorage.getItem('wtn-cache-trips')||'[]')}catch{TRIPS=[]}
    if(TRIPS.length)toast('📡 Offline — showing last-synced trips');
  }
}

async function loadTripDetail(id){
  const trip=TRIPS.find(x=>x.id===id);
  try{
    const [
      {data:events},{data:flights},{data:stays},{data:packItems},{data:budgetItems},{data:members},{data:ownerProfile},{data:travelers}
    ] = await Promise.all([
      DB.from('wtn_events').select('*').eq('trip_id',id).order('date').order('time'),
      DB.from('wtn_flights').select('*').eq('trip_id',id).order('depart_date'),
      DB.from('wtn_stays').select('*').eq('trip_id',id).order('check_in'),
      DB.from('wtn_pack_items').select('*').eq('trip_id',id).order('category').order('created_at'),
      DB.from('wtn_budget_items').select('*').eq('trip_id',id).order('category').order('created_at'),
      DB.from('wtn_trip_members').select('*, wtn_profiles!user_id(id,name,email,picture)').eq('trip_id',id),
      DB.from('wtn_profiles').select('id,name,email,picture').eq('id',trip?.owner_id||'').single(),
      DB.from('wtn_travelers').select('*').eq('trip_id',id).order('name'),
    ]);
    TD[id]={
      events:events||[], flights:flights||[], stays:stays||[],
      packItems:packItems||[], budgetItems:budgetItems||[],
      members:(members||[]).map(m=>({...m,profile:m.wtn_profiles})),
      ownerProfile:ownerProfile||null,
      travelers:travelers||[],
    };
    if(await detectSchemaV2()){
      const {data:docs}=await DB.from('wtn_trip_docs').select('*').eq('trip_id',id).order('created_at',{ascending:false});
      TD[id].docs=docs||[];
    }
    detectSchemaV3();detectSchemaV4();detectSchemaV5();detectSchemaV6();
    if(await detectSchemaV7()){
      const {data:journal}=await DB.from('wtn_journal').select('*').eq('trip_id',id).order('date');
      TD[id].journal=journal||[];
    }
    if(await detectSchemaV8()){
      const [{data:comments},{data:votes}]=await Promise.all([
        DB.from('wtn_comments').select('*').eq('trip_id',id).order('created_at'),
        DB.from('wtn_votes').select('*').eq('trip_id',id),
      ]);
      TD[id].comments=comments||[];
      TD[id].votes=votes||[];
    }
    // Privacy: passport/visa data never touches localStorage (see cacheTD)
    cacheTD(id,TD[id]);
  }catch(e){
    // Network down — hydrate from last-synced copy (read-only until back online)
    try{
      const cached=localStorage.getItem('wtn-cache-td-'+id);
      if(cached){TD[id]=JSON.parse(cached);toast('📡 Offline — showing last-synced trip data');}
    }catch{}
  }
  renderSidebar(id);
}

  const todayStr=new Date().toLocaleDateString('en-CA');

}

/* ── Map ── */
let MAP=null;
const GEO_KEY='wtn-geo-v3'; // v3: Photon fuzzy search + address simplification (clears older cached misses)
function geoCache(){try{return JSON.parse(localStorage.getItem(GEO_KEY)||'{}')}catch{return{}}}
function geoCacheSet(q,v){const c=geoCache();c[q]=v;try{localStorage.setItem(GEO_KEY,JSON.stringify(c))}catch{}}
let GEO_LAST=0;
// Join place parts, dropping case-insensitive duplicates ("Seoul, Seoul" → "Seoul")
function dedupeLabel(parts){
  const out=[];
  for(const p of parts.filter(Boolean)){
    if(!out.some(x=>x.toLowerCase()===p.toLowerCase()))out.push(p);
  }
  return out.join(', ');
}
async function geoNominatim(q){
  // Nominatim usage policy: max 1 request/sec — globally throttled here
  const wait=GEO_LAST+1100-Date.now();
  if(wait>0)await new Promise(r=>setTimeout(r,wait));
  GEO_LAST=Date.now();
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&accept-language=en&q=${encodeURIComponent(q)}`);
    if(!res.ok)return undefined;                                // transient (throttled/5xx) — never cache
    const js=await res.json();
    if(!js?.[0])return null;                                    // null = genuinely no match
    // label = "Place, Country" from the resolved result, so UIs can show
    // what was actually matched rather than what was typed
    const parts=(js[0].display_name||'').split(', ');
    const label=parts.length>1?`${parts[0]}, ${parts[parts.length-1]}`:parts[0]||null;
    return {lat:+js[0].lat,lon:+js[0].lon,label};
  }catch{return undefined}                                      // network/CSP failure — never cache
}
// US state abbreviations → full name, so "Plymouth, MA" can match admin1
const US_STATES={al:'alabama',ak:'alaska',az:'arizona',ar:'arkansas',ca:'california',co:'colorado',ct:'connecticut',de:'delaware',fl:'florida',ga:'georgia',hi:'hawaii',id:'idaho',il:'illinois',in:'indiana',ia:'iowa',ks:'kansas',ky:'kentucky',la:'louisiana',me:'maine',md:'maryland',ma:'massachusetts',mi:'michigan',mn:'minnesota',ms:'mississippi',mo:'missouri',mt:'montana',ne:'nebraska',nv:'nevada',nh:'new hampshire',nj:'new jersey',nm:'new mexico',ny:'new york',nc:'north carolina',nd:'north dakota',oh:'ohio',ok:'oklahoma',or:'oregon',pa:'pennsylvania',ri:'rhode island',sc:'south carolina',sd:'south dakota',tn:'tennessee',tx:'texas',ut:'utah',vt:'vermont',va:'virginia',wa:'washington',wv:'west virginia',wi:'wisconsin',wy:'wyoming'};
async function geoOpenMeteo(name){
  try{
    // search on the first segment ("Chicago" from "Chicago, IL") so the API's
    // name field can match exactly; keep the rest as disambiguating context
    const segs=(name||'').split(',').map(s=>s.trim()).filter(Boolean);
    const q=segs[0]; if(!q)return null;
    const ctx=segs.slice(1).map(s=>s.toLowerCase());
    const res=await fetch(`https://geocoding-api.open-meteo.com/v1/search?count=10&name=${encodeURIComponent(q)}`);
    if(!res.ok)return undefined;
    let results=(await res.json())?.results;
    if(!results||!results.length)return null;
    const byPop=(a,b)=>(b.population||0)-(a.population||0);
    // Prefer results whose name matches exactly (drops "Chicago Creek" when
    // you searched "Chicago")
    const exact=results.filter(r=>r.name&&r.name.toLowerCase()===q.toLowerCase());
    let pool=exact.length?exact:results;
    // If a state/country was given ("Plymouth, MA" or "Plymouth, United
    // States"), keep only results matching it — so a bare city name doesn't
    // jump to the most-populous namesake in another country.
    if(ctx.length){
      const matches=pool.filter(r=>{
        const fields=[r.country,r.country_code,r.admin1,r.admin2,r.admin3].filter(Boolean).map(s=>String(s).toLowerCase());
        return ctx.some(tok=>fields.some(f=>f===tok||US_STATES[tok]===f));
      });
      if(matches.length)pool=matches;
    }
    const r=pool.slice().sort(byPop)[0];
    return{lat:r.latitude,lon:r.longitude,label:dedupeLabel([r.name,r.admin1,r.country])};
  }catch{return undefined}
}
// Photon (komoot): fuzzy, typo-tolerant search over OSM — much better at
// POI/hotel names and partial addresses than raw Nominatim. Keyless.
async function geoPhoton(q,placeOnly){
  try{
    // placeOnly restricts to cities/towns/regions (osm_tag=place / boundary) so
    // a bare "Chicago" resolves to the city, not a business named after it
    const tags=placeOnly?'&osm_tag=place&osm_tag=boundary':'';
    const res=await fetch(`https://photon.komoot.io/api/?limit=1&lang=en${tags}&q=${encodeURIComponent(q)}`);
    if(!res.ok)return undefined;
    const f=(await res.json())?.features?.[0];
    if(!f)return null;
    const [lon,lat]=f.geometry.coordinates;
    const p=f.properties||{};
    return{lat,lon,label:[p.name||p.street,p.city||p.state,p.country].filter(Boolean).slice(0,3).join(', ')||q};
  }catch{return undefined}
}
// Place lookup for weather + map centering. Open-Meteo's geocoder is
// city-focused and population-ranked, so "Chicago" → Chicago, Illinois
// (not a business, nor an obscure Alaskan hamlet). Photon/Nominatim back it up.
async function geocodePlace(q){
  const c=geoCache();const key='placeG|'+q;
  if(key in c)return c[key];
  let transient=false;
  for(const fn of [()=>geoOpenMeteo(q),()=>geoPhoton(q,true),()=>geoNominatim(q)]){
    const g=await fn();
    if(g){geoCacheSet(key,g);return g;}
    if(g===undefined)transient=true;
  }
  if(!transient)geoCacheSet(key,null);
  return null;
}
// Addresses that fail whole often work once the hyper-local parts go:
// "Block 6, Phuoc Hai, Hội An Đông, Đà Nẵng 51300, Vietnam"
//  → "Phuoc Hai, Hội An Đông, Đà Nẵng, Vietnam" → "Hội An Đông, Đà Nẵng, Vietnam" → …
function geoSimplify(q){
  const parts=(q||'').split(',').map(s=>s.replace(/\b\d{4,6}\b/g,'').trim()).filter(Boolean);
  const out=[];
  for(let i=1;i<parts.length-1&&out.length<3;i++)out.push(parts.slice(i).join(', '));
  return out;
}
async function geocodeTries(tries,nameOnly,cacheKey){
  const c=geoCache();
  if(cacheKey in c)return c[cacheKey];
  let transient=false;
  const exact=tries.filter(Boolean);
  // Pass 1: Photon (fast, fuzzy, unthrottled) over exact candidates
  for(const q of exact){
    const g=await geoPhoton(q);
    if(g){geoCacheSet(cacheKey,g);return g;}
    if(g===undefined)transient=true;
  }
  // Pass 2: Nominatim (strict, 1 req/s) over the first two candidates
  for(const q of exact.slice(0,2)){
    const g=await geoNominatim(q);
    if(g){geoCacheSet(cacheKey,g);return g;}
    if(g===undefined)transient=true;
  }
  // Pass 3: progressively simplified address → approximate area pin
  for(const q of geoSimplify(exact[0]||'')){
    const g=await geoPhoton(q);
    if(g){const v={...g,approx:true};geoCacheSet(cacheKey,v);return v;}
    if(g===undefined)transient=true;
  }
  // Pass 4: bare place-name lookup
  if(nameOnly){
    const g2=await geoOpenMeteo(nameOnly);
    if(g2){geoCacheSet(cacheKey,g2);return g2;}
    if(g2===undefined)transient=true;
  }
  if(!transient)geoCacheSet(cacheKey,null); // only cache confirmed misses, so retries stay possible
  return null;
}
async function geocode(q){return geocodeTries([q],q,q);} // one-shot (destination centering, weather)
function mapPlaces(t,d){
  d=filterByRegion(d,t);
  const mainSuffix=[t.destination,t.country].filter(Boolean).join(', ');
  const places=[];
  (d.stays||[]).forEach(s=>{
    const addr=s.address;
    const region=itemRegion(t,s);
    const suffix=region||mainSuffix; // geocode within the item's own region when known
    places.push({
      icon:'🏨',color:'var(--purple)',name:s.name,region,
      fixed:(s.lat!=null&&s.lng!=null)?{lat:+s.lat,lon:+s.lng}:null,
      sub:[s.check_in?fmt(s.check_in):'',s.check_out?'→ '+fmt(s.check_out):''].filter(Boolean).join(' '),
      // Try the address in context, the raw address, then the place name in context
      tries:[addr&&suffix?`${addr}, ${suffix}`:null, addr||null, s.name&&suffix?`${s.name}, ${suffix}`:s.name],
      nameOnly:s.name||null,
      qKey:`stay|${addr||s.name}|${suffix}`,
    });
  });
  (d.events||[]).filter(e=>e.location||e.address).forEach(e=>{
    const cat=CATS[e.category]||CATS.other;
    const loc=e.address||e.location;
    const region=itemRegion(t,e);
    const suffix=region||mainSuffix;
    places.push({
      icon:cat.icon,color:'var(--gold)',name:e.title,region,
      fixed:(e.lat!=null&&e.lng!=null)?{lat:+e.lat,lon:+e.lng}:null,
      sub:[e.location,e.date?fmt(e.date):''].filter(Boolean).join(' · '),
      tries:[suffix?`${loc}, ${suffix}`:loc, loc, e.address&&e.location?`${e.location}, ${suffix}`:null],
      nameOnly:e.location||null,
      qKey:`ev|${loc}|${suffix}`,
    });
  });
  return places;
}
function retryMapPins(){
  const t=TRIPS.find(x=>x.id===CUR.tripId);if(!t)return;
  const d=TD[t.id]||{};
  const c=geoCache();
  mapPlaces(t,d).forEach(p=>{if(c[p.qKey]===null)delete c[p.qKey];});
  try{localStorage.setItem(GEO_KEY,JSON.stringify(c))}catch{}
  renderTab();
}
function renderMapShell(t,d){
  const n=mapPlaces(t,d).length;

  <div class="section-head">
    <h2 style="font-family:'Cormorant Garamond',Georgia,serif">🗺 Trip Map</h2>

  </div>
  ${regionFilterBar(t,d)}

  <div id="tripMap"></div>
  <div id="mapMissing" style="margin-top:10px;font-size:12px;color:var(--muted)"></div>`;
}
// Leaflet is loaded on demand the first time the Map tab opens, so its
// ~190 KB of JS+CSS isn't parsed on every app launch for a rarely-used tab
let LEAFLET_LOADING=null;
function ensureLeaflet(){
  if(typeof L!=='undefined')return Promise.resolve(true);
  if(LEAFLET_LOADING)return LEAFLET_LOADING;
  LEAFLET_LOADING=new Promise(resolve=>{
    const css=document.createElement('link');css.rel='stylesheet';css.href='vendor/leaflet/leaflet.css';document.head.appendChild(css);
    const js=document.createElement('script');js.src='vendor/leaflet/leaflet.js';
    js.onload=()=>resolve(true);
    js.onerror=()=>{LEAFLET_LOADING=null;resolve(false);};
    document.head.appendChild(js);
  });
  return LEAFLET_LOADING;
}
async function initTripMap(t,d){
  const el=document.getElementById('tripMap');if(!el)return;
  const ok=await ensureLeaflet();
  if(CUR.tab!=='map')return; // navigated away while loading
  if(!ok||typeof L==='undefined'){el.innerHTML='<p style="padding:20px;color:var(--muted)">Map library failed to load — check your connection and refresh.</p>';return;}
  if(MAP){MAP.remove();MAP=null;}
  MAP=L.map(el).setView([20,0],2);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'}).addTo(MAP);
  const destQ=[t.destination,t.country].filter(Boolean).join(', ');
  if(destQ){const g=await geocodePlace(destQ);if(g&&MAP)MAP.setView([g.lat,g.lon],11);}
  const places=mapPlaces(t,d);
  const statusEl=document.getElementById('mapStatus');
  const pts=[];let done=0;
  for(const p of places){
    if(CUR.tab!=='map'||!MAP)return;
    // Exact coordinates (Google Maps link / import) beat geocoding every time
    const g=p.fixed||await geocodeTries(p.tries,p.nameOnly,p.qKey);
    done++;
    if(statusEl)statusEl.textContent=done<places.length?`Locating places… ${done}/${places.length}`:'';
    if(g){
      pts.push([g.lat,g.lon]);
      L.marker([g.lat,g.lon],{icon:L.divIcon({className:'map-pin-wrap',html:`<div class="map-pin" style="border-color:${p.color}">${p.icon}</div>`,iconSize:[34,34],iconAnchor:[17,17]})})
        .addTo(MAP)
        .bindPopup(`<b>${esc(p.name)}</b>${p.sub?`<br><span style="font-size:12px">${esc(p.sub)}</span>`:''}${g.approx?`<br><span style="font-size:11px;color:#b8860b">≈ approximate — pinned to ${esc(g.label||'the area')}</span>`:''}<br><a href="${mapsUrl(`${g.lat},${g.lon}`)}" target="_blank" rel="noopener" style="font-size:12px">🧭 Directions</a>${p.region&&!REGION_FILTER&&tripDests(t).length>1?`<br><button class="btn sm ghost" style="margin-top:6px;font-size:11px" data-r="${esc(p.region)}" onclick="setRegionFilter(this.dataset.r)">🔍 Only show ${esc(p.region.split(',')[0])}</button>`:''}`)
        // Clicking a pin glides the map to that spot (popup still opens)
        .on('click',ev=>{if(MAP)MAP.flyTo(ev.latlng,Math.max(MAP.getZoom(),15),{duration:.6});});
    }else p.missing=true;
  }
  // Single fit after all pins are placed — avoids N forced reflows in the loop
  if(MAP&&pts.length>1)MAP.fitBounds(pts,{padding:[46,46]});
  else if(MAP&&pts.length===1)MAP.setView(pts[0],13);
  if(statusEl)statusEl.textContent=pts.length?`${pts.length}/${places.length} pinned`:'';
  const missing=places.filter(p=>p.missing);
  const missEl=document.getElementById('mapMissing');
  if(missEl&&missing.length)missEl.innerHTML=`Couldn't pin: ${missing.map(m=>esc(m.name)).join(', ')} — a fuller address helps. <button class="btn sm ghost" onclick="retryMapPins()" style="margin-left:6px">↻ Retry lookups</button>`;
}
