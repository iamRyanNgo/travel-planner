<style>
:root {
  --bg:#080e1c; --bg2:#0d1526; --panel:#111b2e; --panel2:#172036;
  --border:#1e2d45; --border2:#253450;
  --text:#f0f4ff; --muted:#7a90b8; --dim:#3d5275;
  --gold:#f5c542; --gold2:#ffe07a;
  --blue:#4a90e2; --cyan:#22d3ee; --green:#34d399;
  --coral:#f87171; --purple:#a78bfa; --orange:#fb923c; --pink:#f472b6;
  --radius:14px; --shadow:0 8px 32px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
h1,h2,h3{font-family:'Playfair Display',Georgia,serif}
a{color:var(--blue);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;transition:.15s}
input,textarea,select{font-family:inherit;background:var(--panel2);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:9px 12px;font-size:14px;width:100%;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,197,66,.12)}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px;font-weight:500;letter-spacing:.4px;text-transform:uppercase}
select option{background:var(--panel)}
.field{margin-bottom:14px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.flex1{flex:1;min-width:0}
.muted{color:var(--muted)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid var(--border2);background:var(--panel2);color:var(--text);cursor:pointer;transition:.15s;white-space:nowrap}
.btn:hover{background:var(--panel);transform:translateY(-1px)}
.btn.primary{background:linear-gradient(135deg,#3b6fd4,#2451a8);border-color:#3b6fd4;color:#fff;box-shadow:0 4px 16px rgba(59,111,212,.35)}
.btn.primary:hover{background:linear-gradient(135deg,#4a7fe4,#2f5fc0)}
.btn.gold{background:linear-gradient(135deg,#e8a800,#c47f00);border-color:#e8a800;color:#1a0f00}
.btn.danger{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3);color:var(--coral)}
.btn.sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn.ghost{background:transparent;border-color:transparent}
.btn.ghost:hover{background:var(--panel2)}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.empty{text-align:center;padding:48px 24px;color:var(--muted);border:1px dashed var(--border2);border-radius:var(--radius)}
.empty .icon{font-size:48px;margin-bottom:12px}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:20px;background:var(--panel2);border:1px solid var(--border2);color:var(--muted);font-weight:500}

/* ── Spinner ── */
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--muted)}
.loading-screen .brand-lg{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}

/* ── Auth screens ── */
.auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.auth-card{background:var(--panel);border:1px solid var(--border2);border-radius:20px;padding:36px 32px;width:100%;max-width:420px;box-shadow:var(--shadow)}
.auth-icon{font-size:56px;margin-bottom:12px}
.auth-card h1{font-size:32px;margin-bottom:6px;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.auth-card p{color:var(--muted);font-size:15px;line-height:1.6;margin-bottom:24px}
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:13px 20px;background:#fff;color:#1a1a1a;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit}
.google-btn:hover{background:#f0f0f0;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.google-btn svg{width:20px;height:20px;flex-shrink:0}
.divider{height:1px;background:var(--border);margin:20px 0}

/* ── Header ── */
#appHeader{position:sticky;top:0;z-index:50;background:rgba(8,14,28,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:16px}
.brand{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;cursor:pointer;flex-shrink:0}
.brand span{font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--muted);display:block;letter-spacing:2px;text-transform:uppercase;margin-top:-4px}
#breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);flex:1;min-width:0}
#breadcrumb .sep{color:var(--dim)}
#breadcrumb .crumb{color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#headerActions{display:flex;gap:8px;flex-shrink:0;align-items:center}
.user-chip{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;background:var(--panel2);border:1px solid var(--border2);border-radius:30px}
.user-chip img{width:26px;height:26px;border-radius:50%}
.user-chip span{font-size:13px;font-weight:500;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--coral);border:2px solid var(--bg)}

/* ── Dashboard ── */
#dashboard{max-width:1300px;margin:0 auto;padding:32px 24px}
.dash-hero{margin-bottom:40px}
.dash-hero h1{font-size:clamp(28px,5vw,48px);font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,#fff 40%,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.dash-hero p{color:var(--muted);font-size:15px}
.trip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.trip-card{border-radius:18px;overflow:hidden;cursor:pointer;position:relative;border:1px solid var(--border);transition:.2s;box-shadow:var(--shadow)}
.trip-card:hover{transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,.6);border-color:var(--border2)}
.trip-card-cover{height:160px;position:relative;display:flex;align-items:flex-end;padding:16px}
.trip-card-cover .dest-emoji{position:absolute;top:16px;right:16px;font-size:40px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.trip-card-cover .status-badge{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:20px;backdrop-filter:blur(8px)}
.trip-card-body{background:var(--panel);padding:16px}
.trip-card-body h3{font-size:17px;font-weight:700;margin-bottom:4px;font-family:'Playfair Display',serif}
.trip-card-body .subtitle{font-size:12px;color:var(--muted);margin-bottom:12px}
.trip-meta{display:flex;gap:12px;flex-wrap:wrap}
.trip-meta-item{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.shared-badge{font-size:10px;padding:2px 8px;background:rgba(74,144,226,.15);color:var(--blue);border:1px solid rgba(74,144,226,.25);border-radius:8px;font-weight:600}

/* ── Trip view ── */
#tripView{max-width:1300px;margin:0 auto;padding:0 24px 48px}
.trip-hero{height:260px;border-radius:0 0 24px 24px;display:flex;align-items:flex-end;padding:28px;position:relative;overflow:hidden}
.trip-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(8,14,28,.95) 0%,rgba(8,14,28,.4) 60%,transparent 100%)}
.trip-hero-content{position:relative;z-index:1}
.trip-hero-content h1{font-size:clamp(24px,4vw,40px);font-weight:900;margin-bottom:6px}
.trip-hero-content .trip-dates{font-size:14px;color:rgba(255,255,255,.7);display:flex;gap:16px;flex-wrap:wrap}
.trip-hero-emoji{position:absolute;top:24px;right:32px;font-size:80px;z-index:1;filter:drop-shadow(0 4px 16px rgba(0,0,0,.5))}
.trip-tabs{display:flex;gap:2px;padding:16px 0 0;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;margin-bottom:24px}
.trip-tabs::-webkit-scrollbar{display:none}
.trip-tab{padding:10px 18px;font-size:13px;font-weight:600;color:var(--muted);background:transparent;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;cursor:pointer;transition:.15s}
.trip-tab:hover{color:var(--text)}
.trip-tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ── Overview ── */
.overview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px}
.stat-card .stat-val{font-size:28px;font-weight:700;font-family:'Playfair Display',serif;color:var(--gold)}
.stat-card .stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.notes-area{width:100%;resize:vertical;min-height:100px;font-size:14px;line-height:1.6}

/* ── Members ── */
.member-card{display:flex;align-items:center;gap:12px;padding:12px;background:var(--panel2);border:1px solid var(--border2);border-radius:12px;margin-bottom:8px}
.member-avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--border2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
.member-info{flex:1;min-width:0}
.member-name{font-weight:600;font-size:14px}
.member-email{font-size:12px;color:var(--muted)}
.role-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.5px;text-transform:uppercase}
.role-badge.owner{background:rgba(245,197,66,.15);color:var(--gold);border:1px solid rgba(245,197,66,.3)}
.role-badge.editor{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.role-badge.viewer{background:rgba(122,144,184,.12);color:var(--muted);border:1px solid var(--border2)}

/* ── Timeline / Events ── */
.day-block{margin-bottom:32px}
.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.day-label{display:flex;align-items:center;gap:12px}
.day-num{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.day-info h3{font-size:16px;font-weight:700;margin-bottom:2px}
.day-info .day-date{font-size:12px;color:var(--muted)}
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--border);border-radius:2px}
.tl-event{position:relative;margin-bottom:12px}
.tl-dot{position:absolute;left:-23px;top:14px;width:12px;height:12px;border-radius:50%;border:2px solid var(--bg);z-index:1}
.event-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:.15s;display:flex;gap:12px;align-items:flex-start}
.event-card:hover{border-color:var(--border2);background:var(--panel2)}
.event-card.confirmed{border-left:3px solid var(--green)}
.event-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.event-body{flex:1;min-width:0}
.event-title{font-weight:600;font-size:14px;margin-bottom:3px}
.event-meta{font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
.event-cost{font-size:13px;font-weight:700;color:var(--gold);flex-shrink:0}
.event-card-right{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:auto}
.photo-btn{background:none;border:1px solid var(--border2);color:var(--muted);font-size:11px;padding:3px 8px;border-radius:20px;cursor:pointer;transition:.15s;flex-shrink:0;line-height:1.4;white-space:nowrap}
.photo-btn:hover,.photo-btn.active{background:var(--border2);color:var(--text)}
.ev-photo-panel{padding:6px 0 4px 50px}
.photo-strip{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.photo-strip::-webkit-scrollbar{display:none}
.photo-strip a{flex-shrink:0;display:block}
.photo-strip-img{width:100px;height:70px;border-radius:8px;object-fit:cover;display:block;opacity:0;transition:opacity .3s}
.photo-strip-img.loaded{opacity:1}
.photo-strip-ig{flex-shrink:0;width:70px;height:70px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);border-radius:8px;font-size:10px;font-weight:700;color:#fff;text-decoration:none;text-align:center;line-height:1.5;padding:6px}
.photo-credit{font-size:10px;color:var(--dim);margin-top:5px}

/* ── Bookings ── */
.booking-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;cursor:pointer;transition:.15s}
.booking-card:hover{border-color:var(--border2)}
.booking-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:10px}
.booking-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.booking-title{font-weight:700;font-size:15px;margin-bottom:3px}
.booking-sub{font-size:13px;color:var(--muted)}
.booking-detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding-top:10px;border-top:1px solid var(--border)}
.booking-detail .bd-label{color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px;font-size:10px}
.booking-detail .bd-val{font-weight:600;font-size:13px}
.conf-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.5px}
.conf-badge.confirmed{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.conf-badge.pending{background:rgba(251,146,60,.12);color:var(--orange);border:1px solid rgba(251,146,60,.3)}

/* ── Packing ── */
.pack-section{margin-bottom:24px}
.pack-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pack-section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);display:flex;align-items:center;gap:8px}
.pack-progress{flex:1;height:4px;background:var(--border);border-radius:4px;overflow:hidden;margin:0 12px}
.pack-progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width .3s}
.pack-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:var(--panel);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:.15s}
.pack-item:hover{border-color:var(--border2)}
.pack-item.packed .pack-name{text-decoration:line-through;color:var(--dim)}
.pack-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;transition:.15s}
.pack-item.packed .pack-check{background:var(--green);border-color:var(--green);color:#000}
.pack-name{flex:1;font-size:14px}
.pack-qty{font-size:12px;color:var(--muted);margin-right:4px}
.pack-del{font-size:12px;color:var(--dim);opacity:0;transition:.15s}
.pack-item:hover .pack-del{opacity:1}
.pack-cat-add{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:1px 6px;border-radius:6px;line-height:1;flex-shrink:0;transition:.15s}
.pack-cat-add:hover{background:var(--border);color:var(--text)}
.pack-quick-add{margin-bottom:8px}
.pack-quick-input{width:100%;box-sizing:border-box;background:var(--panel);border:1px dashed var(--border2);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px;outline:none;font-family:inherit}
.pack-quick-input:focus{border-color:var(--accent);border-style:solid}
.pack-quick-input::placeholder{color:var(--dim)}

/* ── Budget ── */
.budget-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.budget-stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px}
.budget-stat .bv{font-size:22px;font-weight:700;margin-bottom:2px}
.budget-stat .bl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.budget-item{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.15s}
.budget-item:hover{border-color:var(--border2)}
.budget-bar{height:6px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:8px}
.budget-bar-fill{height:100%;border-radius:4px;transition:width .4s}

/* ── Admin panel ── */
.admin-panel{background:rgba(248,113,113,.05);border:1px solid rgba(248,113,113,.2);border-radius:14px;padding:18px;margin-bottom:20px}
.admin-panel h3{font-size:14px;font-weight:700;color:var(--coral);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.req-card{background:var(--panel2);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:10px}
.req-card .req-name{font-weight:600;margin-bottom:2px}
.req-card .req-meta{font-size:12px;color:var(--muted);margin-bottom:8px}
.req-card .req-msg{font-size:13px;color:var(--text);background:var(--panel);border-radius:8px;padding:8px 10px;margin-bottom:10px;font-style:italic}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:grid;place-items:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow:auto;box-shadow:0 40px 100px rgba(0,0,0,.6)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:1}
.modal-header h2{font-size:18px;margin:0}
.modal-body{padding:22px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--panel)}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--gold);color:var(--text);padding:12px 22px;border-radius:30px;font-weight:600;font-size:14px;z-index:300;box-shadow:var(--shadow);animation:toastIn .25s ease-out}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Category colors ── */
.cat-flight{background:rgba(74,144,226,.15);color:#7ab4f0}.cat-hotel{background:rgba(167,139,250,.15);color:#c4b0fc}
.cat-food{background:rgba(251,146,60,.15);color:#fca36a}.cat-activity{background:rgba(34,211,238,.15);color:#67e8f9}
.cat-transport{background:rgba(52,211,153,.15);color:#6ee7b7}.cat-shopping{background:rgba(244,114,182,.15);color:#f9a8d4}
.cat-sightseeing{background:rgba(245,197,66,.15);color:#fde68a}.cat-other{background:rgba(122,144,184,.15);color:#a0b4d0}
.dot-flight{background:#4a90e2}.dot-hotel{background:#a78bfa}.dot-food{background:#fb923c}

function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#x27;'}[c]))}
function safeBannerUrl(u){if(!u)return'';if(u.startsWith('data:image/'))return u;try{const p=new URL(u).protocol;if(p!=='https:'&&p!=='http:')return'';}catch{return'';}return u;}
function fmt(iso){if(!iso)return'';const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function fmtShort(iso){if(!iso)return'';const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function fmtDay(iso){if(!iso)return'';const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function diffDays(a,b){return Math.round((new Date(b)-new Date(a))/(1000*60*60*24))}
function formatCost(amt,cur){if(!amt)return'';return`${cur||'$'}${Number(amt).toLocaleString()}`}
function tripCountdown(t){
  const now=new Date(),s=new Date(t.start_date+'T00:00:00'),e=new Date(t.end_date+'T23:59:59');
  if(now<s){const d=Math.ceil((s-now)/864e5);return{label:`in ${d} day${d===1?'':'s'}`,status:'upcoming'}}
  if(now<=e)return{label:'Happening now!',status:'active'};
  return{label:'Completed',status:'past'};
}
function tripDays(t){
  if(!t.start_date||!t.end_date)return[];
  const days=[];let d=new Date(t.start_date+'T12:00:00');
  const end=new Date(t.end_date+'T12:00:00');
  while(d<=end){days.push(d.toISOString().slice(0,10));d=new Date(d.getTime()+864e5);}
  return days;
}

async function initApp(){
  showLoading('Checking your session…');
  let handled=false;
  DB.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_OUT'){
      handled=false; ME=null; TRIPS=[]; TD={}; showSignIn();
      return;
    }
    if(handled)return;
    if(event==='INITIAL_SESSION'&&session){
      handled=true;
      await afterSignIn(session.user);
    } else if(event==='INITIAL_SESSION'&&!session){
      showSignIn();
    } else if(event==='SIGNED_IN'&&session){
      handled=true;
      await afterSignIn(session.user);
    }
  });
}

async function afterSignIn(user){
  showLoading('Loading your profile…');
  // Trigger handles insert; retry a few times in case it's still propagating
  let profile = null, lastErr = null;
  for(let i=0;i<6;i++){
    const {data,error} = await DB.from('wtn_profiles').select('*').eq('id',user.id).single();
    if(data){profile=data;break;}
    lastErr=error;
    await new Promise(r=>setTimeout(r,900));
  }
  ME = profile;

  if(!ME){
    document.getElementById('root').innerHTML=`<div class="loading-screen"><p style="color:var(--coral);max-width:380px;text-align:center">Could not load your profile. Try signing out and back in.<br><br><small style="color:var(--dim)">${lastErr?.message||'unknown error'}</small></p><button class="btn primary" onclick="signOut()" style="margin-top:16px">Sign out</button></div>`;
    return;
  }

  // Ryan is always approved
  if(ME.email===ADMIN_EMAIL && !ME.approved){
    await DB.from('wtn_profiles').update({approved:true}).eq('id',ME.id);
    ME.approved=true;
  }

  if(!ME.approved){
    const {data:req} = await DB.from('wtn_access_requests').select('*').eq('user_id',ME.id).order('requested_at',{ascending:false}).limit(1).single();
    if(!req){showRequestAccess();}
    else{showPending(req);}
    return;
  }

  renderAuthHeader();
  await loadTrips();
  if(PENDING_INVITE){await processInvite(PENDING_INVITE);}
  else{renderDashboard();}
}

/* ═══════════════════════════════════════════════
   DATA LOADING
═══════════════════════════════════════════════ */
async function loadTrips(){
  const {data:owned} = await DB.from('wtn_trips').select('*').eq('owner_id',ME.id).order('created_at',{ascending:false});
  const {data:memberships} = await DB.from('wtn_trip_members').select('trip_id, role, wtn_trips!trip_id(*)').eq('user_id',ME.id);
  const memberTrips = (memberships||[]).map(m=>({...m.wtn_trips, _role:m.role})).filter(Boolean);
  const seen=new Set((owned||[]).map(t=>t.id));
  const all=[...(owned||[]),...memberTrips.filter(t=>!seen.has(t.id))];
  TRIPS=all;
}

async function loadTripDetail(id){
  const trip=TRIPS.find(x=>x.id===id);
  const [
    {data:events},{data:flights},{data:stays},{data:packItems},{data:budgetItems},{data:members},{data:ownerProfile}
  ] = await Promise.all([
    DB.from('wtn_events').select('*').eq('trip_id',id).order('date').order('time'),
    DB.from('wtn_flights').select('*').eq('trip_id',id).order('depart_date'),
    DB.from('wtn_stays').select('*').eq('trip_id',id).order('check_in'),
    DB.from('wtn_pack_items').select('*').eq('trip_id',id).order('category').order('created_at'),
    DB.from('wtn_budget_items').select('*').eq('trip_id',id).order('category').order('created_at'),
    DB.from('wtn_trip_members').select('*, wtn_profiles!user_id(id,name,email,picture)').eq('trip_id',id),
    DB.from('wtn_profiles').select('id,name,email,picture').eq('id',trip?.owner_id||'').single(),
  ]);
  TD[id]={
    events:events||[], flights:flights||[], stays:stays||[],
    packItems:packItems||[], budgetItems:budgetItems||[],
    members:(members||[]).map(m=>({...m,profile:m.wtn_profiles})),
    ownerProfile:ownerProfile||null,
  };
  renderSidebar(id);
}

  const {data:requests} = await DB.from('wtn_access_requests')
    .select('*, wtn_profiles(id,name,email,picture)')
    .eq('status','pending')
    .order('requested_at',{ascending:true});

  const reqs = requests||[];
  modal('🛡 Admin — Pending Requests',`
  ${reqs.length===0?`<div class="empty"><div class="icon">✅</div><p>No pending requests.</p></div>`:''}
  ${reqs.map(r=>{
    const p=r.wtn_profiles||{};
    return`<div class="req-card">
      <div class="req-name">${esc(p.name||'Unknown')}</div>
      <div class="req-meta">${esc(p.email)} · requested ${new Date(r.requested_at).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
      ${r.message?`<div class="req-msg">"${esc(r.message)}"</div>`:''}
      <div class="row">
        <button class="btn sm primary" onclick="approveRequest('${r.id}','${p.id}')">✓ Approve</button>
        <button class="btn sm danger" onclick="rejectRequest('${r.id}','${p.id}')">✕ Reject</button>
      </div>
    </div>`;
  }).join('')}
  <div class="modal-footer" style="margin:0 -22px -22px;border-radius:0 0 20px 20px">
    <button class="btn ghost" onclick="closeModal()">Close</button>
  </div>`);
}

async function approveRequest(reqId, userId){
  await Promise.all([
    DB.from('wtn_profiles').update({approved:true}).eq('id',userId),
    DB.from('wtn_access_requests').update({status:'approved',reviewed_at:new Date().toISOString()}).eq('id',reqId),
  ]);
  toast('User approved ✓');
  closeModal();
  checkPendingBadge();
}

async function rejectRequest(reqId, userId){
  await DB.from('wtn_access_requests').update({status:'rejected',reviewed_at:new Date().toISOString()}).eq('id',reqId);
  toast('Request rejected');
  closeModal();
  checkPendingBadge();
}

function renderTab(){

/* ── Overview ── */
function renderOverview(t,d){
  const days=t.start_date&&t.end_date?diffDays(t.start_date,t.end_date)+1:0;
  const totalBudget=d.budgetItems.reduce((a,b)=>a+(+b.planned||0),0);
  const totalActual=d.budgetItems.reduce((a,b)=>a+(+b.actual||0),0);
  const travelers=t.travelers||[];
  const write=canWrite(t);
  const isOwner=t.owner_id===ME?.id;

  const ownerProfile=d.ownerProfile||(t.owner_id===ME?.id?{id:ME.id,name:ME.name,email:ME.email,picture:ME.picture}:{id:t.owner_id,name:'Owner',email:'',picture:null});
  const allMembers=[{user_id:t.owner_id,role:'owner',profile:ownerProfile},...(d.members||[])];

  return`
  <div class="overview-grid">
    <div class="stat-card"><div class="stat-val">${days||'—'}</div><div class="stat-label">Days</div></div>
    <div class="stat-card"><div class="stat-val">${d.events.length}</div><div class="stat-label">Events</div></div>
    <div class="stat-card"><div class="stat-val">${d.flights.length}</div><div class="stat-label">Flights</div></div>
    <div class="stat-card"><div class="stat-val">${d.stays.length}</div><div class="stat-label">Stays</div></div>
    ${totalBudget?`<div class="stat-card"><div class="stat-val" style="font-size:20px">${formatCost(totalBudget,t.currency)}</div><div class="stat-label">Budget</div></div>`:''}
    ${totalActual?`<div class="stat-card"><div class="stat-val" style="font-size:20px;color:${totalActual>totalBudget?'var(--coral)':'var(--green)'}">${formatCost(totalActual,t.currency)}</div><div class="stat-label">Spent</div></div>`:''}
  </div>

  <!-- Members -->
  <div class="card" style="margin-bottom:16px">
    <div class="section-head">
      <h2 style="font-size:17px">👥 Trip Members</h2>
      ${isOwner?`<button class="btn sm primary" onclick="modalInvite('${t.id}')">＋ Invite</button>`:''}
    </div>
    ${allMembers.map(m=>{
      const p=m.profile||{};
      const initials=(p.name||p.email||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      return`<div class="member-card">
        ${p.picture?`<img class="member-avatar" src="${esc(p.picture)}" loading="lazy" decoding="async" alt="">`:
          `<div class="member-avatar" style="background:var(--border2)">${initials}</div>`}
        <div class="member-info">
          <div class="member-name">${esc(p.name||p.email||'Unknown')}</div>
          <div class="member-email">${esc(p.email||'')}</div>
        </div>
        <span class="role-badge ${m.role}">${m.role}</span>
        ${isOwner&&m.user_id!==ME?.id?`
          <select style="width:auto;padding:4px 8px;font-size:12px" onchange="updateMemberRole('${t.id}','${m.user_id}',this.value)">
            <option${m.role==='editor'?' selected':''}>editor</option>
            <option${m.role==='viewer'?' selected':''}>viewer</option>
          </select>
          <button class="btn sm danger" onclick="removeMember('${t.id}','${m.user_id}')">✕</button>`:''}
      </div>`;
    }).join('')}
    ${allMembers.length===1&&isOwner?`<p class="muted" style="font-size:13px;margin-top:8px">Invite others to collaborate on this trip.</p>`:''}
  </div>

  ${travelers.length?`
  <div class="card" style="margin-bottom:16px">
    <div class="section-head"><h2 style="font-size:16px">🧑‍🤝‍🧑 Travelers</h2></div>
    <div style="display:flex;flex-wrap:wrap;gap:10px">
      ${travelers.map((tv,i)=>`<div style="display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--border2);border-radius:30px;padding:6px 14px 6px 6px">
        <div style="width:28px;height:28px;border-radius:50%;background:${TRAVELER_COLORS[i%TRAVELER_COLORS.length]}20;color:${TRAVELER_COLORS[i%TRAVELER_COLORS.length]};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">${(tv.name||'?')[0].toUpperCase()}</div>
        <div><div style="font-size:13px;font-weight:600">${esc(tv.name)}</div>${tv.role?`<div style="font-size:11px;color:var(--muted)">${esc(tv.role)}</div>`:''}</div>
      </div>`).join('')}
    </div>
  </div>`:''}

  <div class="card" style="margin-bottom:16px">
    <div class="section-head"><h2 style="font-size:16px">📝 Trip Notes</h2></div>
    <textarea class="notes-area" placeholder="Visa requirements, emergency contacts, tips..." ${write?'':'readonly'}
      oninput="debouncedSaveNotes('${t.id}',this.value)">${esc(t.notes||'')}</textarea>

let _notesTimer=null;
function debouncedSaveNotes(id,notes){
  clearTimeout(_notesTimer);
  _notesTimer=setTimeout(()=>DB.from('wtn_trips').update({notes}).eq('id',id),800);
}

/* ── Itinerary ── */
function renderItinerary(t,d){
  const days=tripDays(t);
  if(!days.length)return`<div class="empty"><div class="icon">🗓</div><p>Set trip dates to see your day-by-day itinerary.</p></div>`;
  const write=canWrite(t);
  const dayColors=['#f5c542','#4a90e2','#34d399','#f472b6','#fb923c','#a78bfa','#22d3ee','#f87171','#67e8f9','#fde68a'];
  return`<div>
    ${days.map((date,idx)=>{
      const dayEvents=d.events.filter(e=>e.date===date).sort((a,b)=>(a.time||'23:59').localeCompare(b.time||'23:59'));
      const color=dayColors[idx%dayColors.length];
      return`<div class="day-block">
        <div class="day-header">
          <div class="day-label">
            <div class="day-num" style="background:${color}20;color:${color}">D${idx+1}</div>
            <div class="day-info">
              <h3>${fmtDay(date)}</h3>
              <div class="day-date">${dayEvents.length} event${dayEvents.length!==1?'s':''}</div>
            </div>
          </div>
          ${write?`<button class="btn sm primary" onclick="modalEvent('${t.id}','${date}')">＋ Add</button>`:''}
        </div>
        <div class="timeline">
          ${dayEvents.length?dayEvents.map(ev=>eventCard(ev,write)).join(''):`<div style="color:var(--dim);font-size:13px;padding:8px 0 16px">No events yet.</div>`}
        </div>
      </div>`;
    }).join('')}
    ${write?`<button class="btn primary" style="margin-top:8px" onclick="modalEvent('${t.id}')">＋ Add Event</button>`:''}
  </div>`;
}

  items.forEach(i=>{(byCategory[i.category]=byCategory[i.category]||[]).push(i);});
  return`<div>
    <div class="section-head"><h2>🧳 Packing List</h2>
      <div class="row">

    ${Object.entries(byCategory).filter(([,items])=>items.length).map(([cat,catItems])=>{

        ${catItems.map(item=>`
        <div class="pack-item ${item.packed?'packed':''}" onclick="${write?`togglePack('${t.id}','${item.id}',${!item.packed})`:''}" style="${write?'':'cursor:default'}">
          <div class="pack-check">${item.packed?'✓':''}</div>
          <div class="pack-name">${esc(item.name)}</div>
          ${item.qty>1?`<div class="pack-qty">×${item.qty}</div>`:''}
          ${write?`<button class="pack-del" onclick="event.stopPropagation();deletePackItem('${t.id}','${item.id}')" title="Remove">✕</button>`:''}
        </div>`).join('')}
      </div>`;
    }).join('')}
    ${!total?`<div class="empty"><div class="icon">🧳</div><p>Nothing added yet.</p>
      ${write?`<button class="btn gold" style="margin-top:16px" onclick="seedPackItems('${t.id}')">📋 Load Starter List</button>`:''}
    </div>`:''}
  </div>`;
}

/* ── Budget ── */
function renderBudget(t,d){
  const write=canWrite(t);
  const items=d.budgetItems;
  const totalPlanned=items.reduce((a,b)=>a+(+b.planned||0),0);
  const totalActual=items.reduce((a,b)=>a+(+b.actual||0),0);
  const over=totalActual>totalPlanned&&totalPlanned>0;
  const pct=totalPlanned?Math.min(100,Math.round(totalActual/totalPlanned*100)):0;
  const byCategory={};
  items.forEach(i=>{(byCategory[i.category]=byCategory[i.category]||[]).push(i);});
  return`<div>
    <div class="section-head"><h2>💰 Budget</h2>${write?`<button class="btn primary" onclick="modalBudgetItem('${t.id}')">＋ Add</button>`:''}</div>
    ${items.length?`
    <div class="budget-summary">
      <div class="budget-stat"><div class="bv" style="color:var(--blue)">${formatCost(totalPlanned,t.currency)}</div><div class="bl">Total Budget</div></div>
      <div class="budget-stat"><div class="bv" style="color:${over?'var(--coral)':'var(--green)'}">${formatCost(totalActual,t.currency)}</div><div class="bl">Spent</div></div>
      <div class="budget-stat"><div class="bv" style="color:${over?'var(--coral)':'var(--muted)'}">${over?'−':''}${formatCost(Math.abs(totalPlanned-totalActual),t.currency)}</div><div class="bl">${over?'Over Budget':'Remaining'}</div></div>
    </div>
    <div style="height:8px;background:var(--border);border-radius:4px;margin-bottom:24px;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:${over?'var(--coral)':'linear-gradient(90deg,var(--blue),var(--cyan))'};border-radius:4px;transition:width .4s"></div>
    </div>
    ${Object.entries(byCategory).map(([cat,citems])=>`
    <div style="margin-bottom:20px">
      <h3 style="font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">${cat}</h3>
      ${citems.map(item=>`
      <div class="budget-item" onclick="${write?`modalBudgetItem('${t.id}','${item.id}')`:''}" style="${write?'':'cursor:default'}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span style="font-weight:600;font-size:14px">${esc(item.name)}</span>
          ${item.notes?`<span class="muted" style="font-size:12px">${esc(item.notes)}</span>`:''}
        </div>
        <div style="display:flex;gap:16px;font-size:13px">
          <span style="color:var(--muted)">Budget: ${formatCost(item.planned,t.currency)}</span>
          ${item.actual?`<span style="font-weight:600;color:${+item.actual>+item.planned?'var(--coral)':'var(--green)'}">Actual: ${formatCost(item.actual,t.currency)}</span>`:'<span class="muted">Not spent yet</span>'}
        </div>
        ${item.planned?`<div class="budget-bar"><div class="budget-bar-fill" style="width:${item.actual?Math.min(100,Math.round(item.actual/item.planned*100)):0}%;background:${+item.actual>+item.planned?'var(--coral)':'var(--green)'}"></div></div>`:''}
      </div>`).join('')}
    </div>`).join('')}`
    :`<div class="empty"><div class="icon">💰</div><p>No budget items yet.</p></div>`}
  </div>`;
}

async function inviteToTrip(tripId){
  const email=$('#inv_email').value.trim().toLowerCase();
  const role=$('#inv_role').value;
  if(!email){toast('Enter an email');return;}

  const {data:profile} = await DB.from('wtn_profiles').select('id,name,approved').eq('email',email).single();
  if(!profile){toast('No account found with that email. They need to sign up first.');return;}
  if(!profile.approved){toast('That person hasn\'t been approved yet.');return;}

  const {error} = await DB.from('wtn_trip_members').upsert({
    trip_id:tripId, user_id:profile.id, role, invited_by:ME.id
  },{onConflict:'trip_id,user_id'});

  if(error){toast('Error adding member');return;}
  toast(`${profile.name||email} added as ${role} ✓`);
  closeModal();
  await loadTripDetail(tripId);
  renderTab();
}

}

}

/* ── Collaboration Sidebar ── */
function renderSidebar(tripId){
  const dropdown=document.getElementById('peopleDropdown');
  const countEl=document.getElementById('peopleBtnCount');
  if(!dropdown)return;
  const t=TRIPS.find(x=>x.id===tripId);
  if(!t)return;
  const d=TD[tripId]||{members:[],ownerProfile:null};
  const isOwner=t.owner_id===ME?.id;
  const ownerProf=d.ownerProfile||(t.owner_id===ME?.id?{id:ME.id,name:ME.name,email:ME.email,picture:ME.picture}:{id:t.owner_id,name:'Owner',email:'',picture:null});
  const all=[{user_id:t.owner_id,role:'owner',profile:ownerProf},...(d.members||[])];
  if(countEl)countEl.textContent=all.length;

  function mrow(m){
    const p=m.profile||{};
    const initials=(p.name||p.email||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const rc=m.role==='owner'?'var(--gold)':m.role==='editor'?'var(--green)':'var(--muted)';
    const bg=m.role==='owner'?'rgba(245,197,66,.15)':m.role==='editor'?'rgba(52,211,153,.12)':'rgba(122,144,184,.12)';
    return`<div class="sbar-member">
      ${p.picture?`<img class="sbar-avatar" src="${esc(p.picture)}" loading="lazy" decoding="async" alt="">`:

        <div class="sbar-name" title="${esc(p.name||p.email||'')}">${esc(p.name||p.email||'Unknown')}</div>
        <div class="sbar-role" style="color:${rc}">${m.role}</div>
      </div>
      ${isOwner&&m.user_id!==ME?.id?`<button class="sbar-remove" onclick="removeMember('${tripId}','${m.user_id}')" title="Remove">✕</button>`:''}
    </div>`;
  }

  const inviteUrl=`${location.origin}${location.pathname}?invite=${t.invite_token||''}`;
  dropdown.innerHTML=`
  <div class="sbar-head">
    <span class="sbar-label">People</span>
    ${isOwner?`<button class="btn sm primary" style="font-size:11px;padding:5px 10px" onclick="modalInvite('${tripId}')">＋ Invite</button>`:''}
  </div>

  <div class="invite-link-section">
    <div class="sbar-label" style="margin-bottom:8px">Invite via Link</div>
    <div class="invite-link-row">
      <input class="invite-url-inp" id="invLinkInp" value="${esc(inviteUrl)}" readonly onclick="this.select()">
      <button class="btn sm" onclick="copyInvLink()">Copy</button>
    </div>
    <div class="invite-role-row">
      <select onchange="setInvRole('${tripId}',this.value)">
        <option value="viewer"${(t.invite_role||'viewer')==='viewer'?' selected':''}>Can view</option>
        <option value="editor"${t.invite_role==='editor'?' selected':''}>Can edit</option>
      </select>
      <button class="btn sm ghost" onclick="regenInvLink('${tripId}')" title="Generate a new link (old one stops working)">↺ New</button>
    </div>
  </div>`:''}`;

function selectGradient(i){
  window._editGradient=i;
  $$('#gpicker .gp-swatch').forEach(s=>s.classList.toggle('sel',+s.dataset.idx===i));
}
function previewBanner(url){
  const box=document.getElementById('bannerPreviewBox');if(!box)return;
  if(url){box.style.backgroundImage=`url('${url}')`;box.style.display='block';}
  else{box.style.display='none';box.style.backgroundImage='';}
}
function clearBanner(){
  const inp=document.getElementById('t_banner_url');if(inp)inp.value='';
  previewBanner('');
}
function handleBannerUpload(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const maxW=1400,maxH=520;
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const url=canvas.toDataURL('image/jpeg',0.82);
      const inp=document.getElementById('t_banner_url');if(inp)inp.value=url;
      previewBanner(url);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

  window._editTravelers.push({name:'',role:''});
  const row=document.createElement('div');row.className='row';row.style.marginBottom='6px';

async function saveTrip(id){
  const name=$('#t_name').value.trim();if(!name){toast('Trip name is required');return;}
  const travelers=(window._editTravelers||[]).filter(t=>t.name.trim());
  const data={
    name,emoji:$('#t_emoji').value.trim(),destination:$('#t_dest').value.trim(),
    country:$('#t_country').value.trim(),start_date:$('#t_start').value||null,
    end_date:$('#t_end').value||null,currency:$('#t_currency').value,
    gradient_idx:window._editGradient||0,travelers,
    banner_url:$('#t_banner_url')?.value.trim()||null,
  };
  if(id){
    await DB.from('wtn_trips').update(data).eq('id',id);
    const idx=TRIPS.findIndex(t=>t.id===id);
    if(idx>=0)Object.assign(TRIPS[idx],data);
    toast('Trip updated ✓');

    const {data:newTrip,error} = await DB.from('wtn_trips').insert({...data,owner_id:ME.id}).select().single();
    if(error){toast('Error creating trip');return;}
    TRIPS.unshift(newTrip);

  closeModal();
  if(id&&CUR.tripId===id){renderTripShell();await loadTripDetail(id);renderTab();}

}

/* ═══════════════════════════════════════════════
   PHOTO PANEL (Unsplash + Instagram)
═══════════════════════════════════════════════ */
async function openPhotoPanel(btn){
  const evId=btn.dataset.ev;
  const query=btn.dataset.q;
  const panel=document.getElementById('evp_'+evId);
  if(!panel)return;

  // toggle off
  if(!panel.classList.contains('hidden')){
    panel.classList.add('hidden');
    btn.classList.remove('active');
    return;
  }

  btn.classList.add('active');
  panel.classList.remove('hidden');

  // already fetched
  if(panel.dataset.loaded)return;

  const igUrl=`https://www.instagram.com/explore/search/keyword/?q=${encodeURIComponent(query)}`;
  const igBtn=`<a class="photo-strip-ig" href="${igUrl}" target="_blank" rel="noopener noreferrer">📷<br>Instagram</a>`;

  if(!UNSPLASH_KEY){
    panel.innerHTML=`<div class="photo-strip">${igBtn}</div><div class="photo-credit">Add a free <a href="https://unsplash.com/developers" target="_blank" rel="noopener">Unsplash API key</a> to see inline photos</div>`;
    panel.dataset.loaded='1';
    return;
  }

  panel.innerHTML=`<div class="photo-strip"><div style="color:var(--dim);font-size:12px;padding:8px 0">Loading…</div></div>`;

  try{
    const r=await fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=10&orientation=landscape&client_id=${UNSPLASH_KEY}`);
    if(!r.ok)throw new Error(r.status);
    const j=await r.json();
    const photos=j.results||[];
    const imgs=photos.map(p=>
      `<a href="${p.links.html}?utm_source=wheretonext&utm_medium=referral" target="_blank" rel="noopener noreferrer" title="Photo by ${esc(p.user.name)} on Unsplash">
        <img class="photo-strip-img" src="${p.urls.small}" alt="" loading="lazy" decoding="async" onload="this.classList.add('loaded')">
      </a>`
    ).join('');
    panel.innerHTML=`<div class="photo-strip">${imgs}${igBtn}</div><div class="photo-credit">Photos via <a href="https://unsplash.com?utm_source=wheretonext&utm_medium=referral" target="_blank" rel="noopener">Unsplash</a></div>`;
    panel.dataset.loaded='1';
  }catch(e){
    panel.innerHTML=`<div class="photo-strip">${igBtn}</div>`;
    panel.dataset.loaded='1';
  }
}

document.addEventListener('keydown',e=>{

  if(e.key==='Escape'){closeModal();document.getElementById('peopleDropdown')?.classList.add('hidden');}

});

  if(wrap&&!wrap.contains(e.target))document.getElementById('peopleDropdown')?.classList.add('hidden');
});

/* ═══════════════════════════════════════════════
   PWA — INSTALL + SERVICE WORKER
═══════════════════════════════════════════════ */
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  PWA_PROMPT = e;
  renderAuthHeader();
});

window.addEventListener('appinstalled', () => {
  PWA_PROMPT = null;
  renderAuthHeader();
  toast('App installed! Find it on your home screen ✓');
});

async function installPWA(){
  if(!PWA_PROMPT)return;
  PWA_PROMPT.prompt();
  const {outcome} = await PWA_PROMPT.userChoice;
  PWA_PROMPT = null;
  renderAuthHeader();
  if(outcome==='accepted')toast('Installing… check your home screen ✓');
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

   BOOT
═══════════════════════════════════════════════ */
window.addEventListener('load',initApp);
