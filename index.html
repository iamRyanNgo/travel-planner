function icsEsc(s){return String(s||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\r?\n/g,'\\n')}
function exportICS(tripId){
  const t=TRIPS.find(x=>x.id===tripId);const d=TD[tripId];
  if(!t||!d){toast('Trip data still loading…');return;}
  const out=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//WhereToNext//Trip//EN',`X-WR-CALNAME:${icsEsc(t.name)}`];
  const stamp=new Date().toISOString().replace(/[-:]/g,'').replace(/\.\d+/,'');
  const dt=(d8)=>d8.replace(/-/g,'');
  const push=(uid,props)=>out.push('BEGIN:VEVENT',`UID:${uid}@wheretonext`,`DTSTAMP:${stamp}`,...props,'END:VEVENT');
  (d.flights||[]).forEach(f=>{
    if(!f.depart_date)return;
    const props=[];
    if(f.depart_time){
      props.push(`DTSTART:${dt(f.depart_date)}T${f.depart_time.replace(':','')}00`);
      if(f.arrive_date&&f.arrive_time)props.push(`DTEND:${dt(f.arrive_date)}T${f.arrive_time.replace(':','')}00`);
    }else props.push(`DTSTART;VALUE=DATE:${dt(f.depart_date)}`);
    props.push(`SUMMARY:${icsEsc(`${TRANSPORT_MODES[transportMode(f)].icon} ${f.from_airport||''}${f.to_airport?' → '+f.to_airport:''} ${f.airline||''} ${f.flight_num||''}`.replace(/\s+/g,' ').trim())}`);
    if(f.confirm_num)props.push(`DESCRIPTION:${icsEsc('Confirmation: '+f.confirm_num)}`);
    push('fl-'+f.id,props);
  });
  (d.stays||[]).forEach(s=>{
    if(!s.check_in)return;
    const props=[`DTSTART;VALUE=DATE:${dt(s.check_in)}`];
    if(s.check_out)props.push(`DTEND;VALUE=DATE:${dt(s.check_out)}`);
    props.push(`SUMMARY:${icsEsc('🏨 '+s.name)}`);
    if(s.address)props.push(`LOCATION:${icsEsc(s.address)}`);
    if(s.confirm_num)props.push(`DESCRIPTION:${icsEsc('Confirmation: '+s.confirm_num)}`);
    push('st-'+s.id,props);
  });
  (d.events||[]).forEach(e=>{
    if(!e.date)return;
    const props=[];
    if(e.time){
      props.push(`DTSTART:${dt(e.date)}T${e.time.replace(':','')}00`);
      if(e.duration){
        const end=new Date(`${e.date}T${e.time}`);end.setMinutes(end.getMinutes()+ +e.duration);
        props.push(`DTEND:${end.toLocaleDateString('en-CA').replace(/-/g,'')}T${String(end.getHours()).padStart(2,'0')}${String(end.getMinutes()).padStart(2,'0')}00`);
      }
    }else props.push(`DTSTART;VALUE=DATE:${dt(e.date)}`);
    props.push(`SUMMARY:${icsEsc((CATS[e.category]||CATS.other).icon+' '+e.title)}`);
    if(e.location||e.address)props.push(`LOCATION:${icsEsc(e.address||e.location)}`);
    push('ev-'+e.id,props);
  });
  out.push('END:VCALENDAR');
  const blob=new Blob([out.join('\r\n')],{type:'text/calendar'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${(t.name||'trip').replace(/[^\w\- ]+/g,'').trim()||'trip'}.ics`;
  a.click();URL.revokeObjectURL(a.href);
  toast('Calendar file downloaded ✓');
}

/* ── Weather (Open-Meteo, keyless) ── */
function wmoIcon(c){
  if(c===0)return'☀️';if(c<=2)return'🌤';if(c===3)return'☁️';
  if(c<=48)return'🌫';if(c<=57)return'🌦';if(c<=67)return'🌧';
  if(c<=77)return'🌨';if(c<=82)return'🌧';if(c<=86)return'🌨';return'⛈';
}
function modalWxLocation(tripId){
  const curLoc=localStorage.getItem('wtn-wx-'+tripId)||'';
  const t=TRIPS.find(x=>x.id===tripId);
  const nDests=t?tripDests(t).length:0;
  modal('📍 Weather Location',`
  ${curLoc&&nDests>1?`<p style="font-size:13px;color:var(--gold);margin-bottom:12px">⚠️ A custom location is set, so only it is shown. Clear it to see the forecast for all ${nDests} trip destinations.</p>`:''}
  <div class="field"><label>City / place for the forecast</label><input id="wx_loc" value="${esc(curLoc)}" placeholder="e.g. Deià, Majorca"></div>
  <p style="font-size:12px;color:var(--muted)">Leave empty to show ${nDests>1?'all '+nDests+' trip destinations':'the trip destination'}.</p>
  <div class="modal-footer" style="margin:16px -22px -22px;border-radius:0 0 20px 20px">
    ${curLoc?`<button class="btn ghost" onclick="document.getElementById('wx_loc').value='';saveWxLocation('${tripId}')">↺ Use trip destination${nDests>1?'s':''}</button>`:''}
    <button class="btn ghost" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="saveWxLocation('${tripId}')">Save</button>
  </div>`);
}
function toggleWxUnit(){
  const cur=localStorage.getItem('wtn-wx-unit')||((navigator.language||'').startsWith('en-US')?'F':'C');
  localStorage.setItem('wtn-wx-unit',cur==='F'?'C':'F');
  const t=TRIPS.find(x=>x.id===CUR.tripId);
  if(t)loadWeather(t);
}
function saveWxLocation(tripId){
  const v=$('#wx_loc').value.trim();
  if(v)localStorage.setItem('wtn-wx-'+tripId,v);
  else localStorage.removeItem('wtn-wx-'+tripId);
  closeModal();
  const t=TRIPS.find(x=>x.id===tripId);
  if(t)loadWeather(t);
}
async function loadWeather(t){
  const el=document.getElementById('wxWidget');if(!el)return;
  // Trip is over — a forecast is no longer useful, hide the card
  if(t.end_date&&new Date().toLocaleDateString('en-CA')>t.end_date){el.innerHTML='';return;}
  const custom=localStorage.getItem('wtn-wx-'+t.id);
  // Custom override shows just that place; otherwise every trip destination (max 5)
  const dests=custom?[custom]:tripDests(t).map(x=>x.includes(',')||!t.country?x:`${x}, ${t.country}`).slice(0,5);
  const editBtn=`<button class="btn sm ghost" onclick="modalWxLocation('${t.id}')" title="Change forecast location" style="font-size:11px;padding:3px 8px">📍 ${custom?'Change':'Set'} location</button>`;
  if(!dests.length){
    el.innerHTML=`<div class="card" style="margin-bottom:16px"><div class="section-head"><h2 style="font-size:16px">🌤 Weather</h2>${editBtn}</div><p class="muted" style="font-size:13px">Set a location to see the 7-day forecast.</p></div>`;
    return;
  }
  const unitPref=localStorage.getItem('wtn-wx-unit');
  const useF=unitPref?unitPref==='F':(navigator.language||'').startsWith('en-US');
  el.innerHTML=`<div class="card" style="margin-bottom:16px">
    <div class="section-head"><h2 style="font-size:16px">🌤 Weather</h2><span style="display:flex;align-items:center;gap:8px">
      <span style="font-size:11px;color:var(--dim)">Open-Meteo · next 7 days · °${useF?'F':'C'}</span>
      <button class="btn sm ghost" onclick="toggleWxUnit()" title="Switch temperature unit" style="font-size:11px;padding:3px 8px">⇄ °${useF?'C':'F'}</button>
      ${editBtn}</span></div>
    <div id="wxBody"><p class="muted" style="font-size:12px">Loading forecast…</p></div>
  </div>`;
  let any=false;
  for(const [di,dq] of dests.entries()){
    const g=await geocodePlace(dq);
    let body=document.getElementById('wxBody');if(!body)return; // navigated away
    if(di===0)body.innerHTML='';
    if(!g){
      body.insertAdjacentHTML('beforeend',`<p class="muted" style="font-size:12px;margin:6px 0">Couldn't find “${esc(dq)}” — try a nearby city name.</p>`);
      continue;
    }
    try{
      const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${g.lat}&longitude=${g.lon}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=7${useF?'&temperature_unit=fahrenheit':''}`);
      if(!r.ok)continue;
      const D=(await r.json()).daily;if(!D?.time)continue;
      body=document.getElementById('wxBody');if(!body)return;
      any=true;
      // Show the place the geocoder actually resolved (with country) so a
      // wrong match is immediately visible
      body.insertAdjacentHTML('beforeend',`
        <div style="font-size:12px;font-weight:700;color:var(--gold);margin:${di?'14px':'2px'} 0 4px">📍 ${esc(g.label||dq)}</div>
        <div class="wx-row">${D.time.map((dtStr,i)=>`
        <div class="wx-day${t.start_date&&t.end_date&&dtStr>=t.start_date&&dtStr<=t.end_date?' on-trip':''}">
          <div class="wx-date">${new Date(dtStr+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'})}</div>
          <div class="wx-icon">${wmoIcon(D.weather_code[i])}</div>
          <div class="wx-temp">${Math.round(D.temperature_2m_max[i])}°</div>
          <div class="wx-temp lo">${Math.round(D.temperature_2m_min[i])}°</div>
          <div class="wx-rain">${(D.precipitation_probability_max?.[i]||0)>=30?`💧${D.precipitation_probability_max[i]}%`:''}</div>
        </div>`).join('')}</div>`);
    }catch{}
  }
  const body=document.getElementById('wxBody');
  if(body&&!any&&!body.innerHTML.trim())body.innerHTML=`<p class="muted" style="font-size:13px">Forecast unavailable right now.</p>`;
}

// Compact one-line forecast for the Today card: weather wherever "today" is —
// tonight's hotel (exact pin when available), else the primary destination
async function loadTodayWeather(t,d){
  const el=document.getElementById('todayWx');if(!el)return;
  const todayStr=new Date().toLocaleDateString('en-CA');
  const stay=(d?.stays||[]).find(s=>s.check_in&&s.check_out&&todayStr>=s.check_in&&todayStr<s.check_out);
  let g=null;
  if(stay&&stay.lat!=null&&stay.lng!=null)g={lat:+stay.lat,lon:+stay.lng};
  else{
    let q=(stay&&(stay.city||itemRegion(t,stay)))||tripDests(t)[0]||'';
    if(!q)return;
    if(!q.includes(',')&&t.country)q=`${q}, ${t.country}`;
    g=await geocodePlace(q);
  }
  if(!g)return;
  const unitPref=localStorage.getItem('wtn-wx-unit');
  const useF=unitPref?unitPref==='F':(navigator.language||'').startsWith('en-US');
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${g.lat}&longitude=${g.lon}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=1${useF?'&temperature_unit=fahrenheit':''}`);
    if(!r.ok)return;
    const D=(await r.json()).daily;if(!D?.time)return;
    const el2=document.getElementById('todayWx');if(!el2)return; // navigated away
    const rain=D.precipitation_probability_max?.[0]||0;
    el2.innerHTML=`${wmoIcon(D.weather_code[0])} <b style="color:var(--text)">${Math.round(D.temperature_2m_max[0])}°</b> / ${Math.round(D.temperature_2m_min[0])}°${rain>=30?` · 💧${rain}%`:''}`;
  }catch{}
}
/* ── Reminders: the deadlines a trip actually cares about ── */
function tripReminders(t,d){
  const out=[],now=new Date();
  // Flight check-in opens 24h before departure — that's when seats vanish
  (d?.flights||[]).forEach(f=>{
    if(!f.depart_date)return;
    const dep=new Date(`${f.depart_date}T${f.depart_time||'12:00'}`);
    if(isNaN(dep))return;
    const opens=dep.getTime()-24*3600e3;
    if(now.getTime()>=opens&&now<dep)out.push({id:'ckin|'+f.id,icon:'🛂',urgent:true,
      msg:`Check-in is open: ${f.from_airport||''} → ${f.to_airport||''}${f.airline?` (${f.airline})`:''} departs ${f.depart_time?f.depart_time+' ':''}${fmtShort(f.depart_date)}${f.confirm_num?` · Conf ${f.confirm_num}`:''}`});
  });
  // Free-cancellation windows closing within a week
  const today=now.toLocaleDateString('en-CA');
  (d?.stays||[]).forEach(s=>{
    if(!s.cancel_by)return;
    const days=diffDays(today,s.cancel_by);
    if(days>=0&&days<=7)out.push({id:`cxl|${s.id}|${s.cancel_by}`,icon:'🏨',urgent:days<=2,
      msg:`Free cancellation for ${s.name} ends ${days===0?'TODAY':days===1?'tomorrow':fmt(s.cancel_by)}`});
  });
  return out;
}
async function enableNotifs(){
  if(!('Notification' in window)){toast('Notifications not supported on this device');return;}
  const p=await Notification.requestPermission();
  if(p==='granted'){toast('🔔 Alerts enabled');renderTab();}
  else toast('Notifications blocked — enable them in your browser settings');
}
// Fire browser/PWA notifications for reminders, once per item per day
async function fireReminderNotifications(t,rems){
  if(!('Notification' in window)||Notification.permission!=='granted'||!rems.length)return;
  const today=new Date().toLocaleDateString('en-CA');
  let seen={};try{seen=JSON.parse(localStorage.getItem('wtn-notified')||'{}')}catch{}
  const fresh=rems.filter(r=>!seen[r.id+'|'+today]);
  if(!fresh.length)return;
  let reg=null;try{reg=await navigator.serviceWorker?.getRegistration()}catch{}
  fresh.forEach(r=>{
    seen[r.id+'|'+today]=1;
    const title=`WhereToNext — ${t.name||'Trip'}`;
    try{
      if(reg?.showNotification)reg.showNotification(title,{body:`${r.icon} ${r.msg}`,tag:r.id});
      else new Notification(title,{body:`${r.icon} ${r.msg}`,tag:r.id});
    }catch{}
  });
  const keep={};Object.keys(seen).forEach(k=>{if(k.endsWith('|'+today))keep[k]=seen[k];});
  try{localStorage.setItem('wtn-notified',JSON.stringify(keep))}catch{}
}

/* ── Time zones: true flight durations across zones ── */
// UTC offset (seconds) for an airport/city string. Tries an OSM aerodrome
// match first (so "HND" / "Logan Airport" pin the airport itself), then the
// city geocoder; the offset comes from Open-Meteo's timezone resolution.
async function tzOffsetFor(place){
  if(!place)return null;
  const c=geoCache();const key='tzoff|'+place;
  if(key in c)return c[key];
  let g=null;
  try{
    const res=await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(place)}&limit=1&lang=en&osm_tag=aeroway:aerodrome`);
    if(res.ok){const f=(await res.json())?.features?.[0];if(f)g={lat:f.geometry.coordinates[1],lon:f.geometry.coordinates[0]};}
  }catch{}
  if(!g)g=await geocodePlace(place);
  if(!g)return null;
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${g.lat}&longitude=${g.lon}&timezone=auto&forecast_days=1`);
    if(!r.ok)return null;
    const off=(await r.json())?.utc_offset_seconds;
    if(typeof off!=='number')return null;
    geoCacheSet(key,off);
    return off;
  }catch{return null}
}
// True gate-to-gate minutes given each end's UTC offset (local − offset = UTC)
function flightMinutes(f,offFrom,offTo){
  if(!f.depart_date||!f.depart_time||!f.arrive_date||!f.arrive_time)return null;
  const dep=Date.parse(`${f.depart_date}T${f.depart_time}:00Z`)-offFrom*1000;
  const arr=Date.parse(`${f.arrive_date}T${f.arrive_time}:00Z`)-offTo*1000;
  if(isNaN(dep)||isNaN(arr))return null;
  const mins=(arr-dep)/60000;
  return mins>0&&mins<1440*3?mins:null;
}
// Async-fill the duration slot on each flight card once offsets are known
async function fillFlightDurations(t,d){
  for(const f of (d?.flights||[])){
    if(!document.querySelector(`[data-fldur="${f.id}"]`))continue;
    if(!(f.depart_date&&f.depart_time&&f.arrive_date&&f.arrive_time))continue;
    const [o1,o2]=await Promise.all([tzOffsetFor(f.from_airport),tzOffsetFor(f.to_airport)]);
    if(o1==null||o2==null)continue;
    const mins=flightMinutes(f,o1,o2);
    const el=document.querySelector(`[data-fldur="${f.id}"]`);
    if(!el)return; // navigated away
    if(mins!=null)el.textContent=`${Math.floor(mins/60)}h ${String(Math.round(mins%60)).padStart(2,'0')}m`;
  }
}

// Rough distance in km between two points (haversine)
function kmBetween(lat1,lon1,lat2,lon2){
  const r=Math.PI/180,dLat=(lat2-lat1)*r,dLon=(lon2-lon1)*r;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLon/2)**2;
  return 12742*Math.asin(Math.sqrt(a));
}
// Nearest hospital / police station to a point, via Photon. lat/lon alone is
// only a ranking BIAS in Photon — with no nearby match it returns the best
// text match anywhere on Earth — so restrict with a hard bbox (~±40 km) and
// double-check the result's real distance before trusting it.
async function nearestAmenity(lat,lon,kind){
  const c=geoCache();const key=`amen3|${kind}|${(+lat).toFixed(2)},${(+lon).toFixed(2)}`;
  if(key in c)return c[key];
  try{
    const dLat=.4,dLon=Math.min(2,.4/Math.max(.1,Math.cos(lat*Math.PI/180)));
    const bbox=`${lon-dLon},${lat-dLat},${lon+dLon},${lat+dLat}`;
    const res=await fetch(`https://photon.komoot.io/api/?q=${kind}&lat=${lat}&lon=${lon}&bbox=${bbox}&limit=1&lang=en&osm_tag=amenity:${kind}`);
    if(!res.ok)return null;
    const f=(await res.json())?.features?.[0];
    if(!f)return null;
    const [rLon,rLat]=f.geometry.coordinates;
    if(kmBetween(lat,lon,rLat,rLon)>60){geoCacheSet(key,null);return null;} // too far to be "nearest"
    const p=f.properties||{};
    const street=p.housenumber&&p.street?`${p.housenumber} ${p.street}`:p.street;
    const address=[street,p.city||p.district,p.state,p.country].filter(Boolean).join(', ');
    const out={name:p.name||'',address:address||p.city||p.country||'',lat:rLat,lon:rLon,osm_type:p.osm_type,osm_id:p.osm_id};
    geoCacheSet(key,out);
    return out;
  }catch{return null}
}
// Phone numbers for amenities: one Nominatim lookup call covers several OSM
// ids (extratags carries phone / contact:phone). Shares the 1 req/s throttle.
async function amenityPhones(items){
  const ids=items.filter(p=>p&&p.osm_type&&p.osm_id).map(p=>String(p.osm_type)[0].toUpperCase()+p.osm_id);
  if(!ids.length)return{};
  const c=geoCache();const key='amphone|'+ids.join(',');
  if(key in c)return c[key]||{};
  const wait=GEO_LAST+1100-Date.now();
  if(wait>0)await new Promise(r=>setTimeout(r,wait));
  GEO_LAST=Date.now();
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/lookup?format=jsonv2&extratags=1&accept-language=en&osm_ids=${ids.join(',')}`);
    if(!res.ok)return{};
    const out={};
    ((await res.json())||[]).forEach(r=>{
      const ph=r.extratags?.phone||r.extratags?.['contact:phone'];
      if(ph)out[String(r.osm_type)[0].toUpperCase()+r.osm_id]=ph.split(';')[0].trim();
    });
    geoCacheSet(key,out);
    return out;
  }catch{return{}}
}

// Fill the Emergency card with the nearest hospital + police station for each
// destination and each confirmed hotel (async; renders progressively).
async function loadEmergencyPlaces(t,d){
  let box=document.getElementById('emergPlaces');if(!box)return;
  // Locations: every destination (max 5, matching the weather widget) +
  // confirmed stays (max 5)
  const locs=tripDests(t).slice(0,5).map(dq=>({
    label:dq,q:dq.includes(',')||!t.country?dq:`${dq}, ${t.country}`,
  }));
  const mainSuffix=[t.destination,t.country].filter(Boolean).join(', ');
  (d?.stays||[]).filter(s=>s.confirmed&&(s.name||s.address)).slice(0,5).forEach(s=>{
    const region=itemRegion(t,s)||mainSuffix;
    // Address-aware geocoding (same approach as the map) — and deliberately no
    // bare-name city fallback, which could match a namesake town anywhere
    locs.push({label:s.name||s.address,hotel:true,lat:s.lat,lon:s.lng,region,
      tries:[s.address&&region?`${s.address}, ${region}`:null,s.address||null,s.name&&region?`${s.name}, ${region}`:null],
      qKey:`emstay|${s.address||s.name}|${region}`});
  });
  if(!locs.length)return;
  box.innerHTML=`<p style="font-size:12px;color:var(--muted);margin-top:10px">Finding nearest hospitals & police…</p>`;
  let html='';
  for(const loc of locs){
    let lat=loc.lat,lon=loc.lon,label=loc.label;
    if(lat==null||lon==null){
      const g=loc.hotel?await geocodeTries(loc.tries,null,loc.qKey):await geocodePlace(loc.q);
      if(!g)continue;
      lat=g.lat;lon=g.lon;
      if(!loc.hotel&&g.label)label=g.label; // show what actually resolved
    }
    const [hosp,pol]=await Promise.all([nearestAmenity(lat,lon,'hospital'),nearestAmenity(lat,lon,'police')]);
    if(!hosp&&!pol)continue;
    const phones=await amenityPhones([hosp,pol]);
    const phoneOf=p=>p&&p.osm_type&&phones[String(p.osm_type)[0].toUpperCase()+p.osm_id]||'';
    const rows=[emergPlaceRow('🏥','Nearest Hospital',hosp,phoneOf(hosp)),emergPlaceRow('🚓','Nearest Police',pol,phoneOf(pol))].filter(Boolean);
    if(!rows.length)continue;
    // Destination in a different country than the trip's primary? Its
    // emergency numbers differ from the ones at the top of the card — show them.
    const locCountry=(loc.hotel?(loc.region||''):label).split(',').pop().trim().toLowerCase();
    const kLoc=EMERGENCY_ALIAS[locCountry],kTrip=EMERGENCY_ALIAS[(t.country||'').trim().toLowerCase()];
    let localNums='';
    if(kLoc&&kLoc!==kTrip){
      const le=EMERGENCY_INFO[kLoc];
      const bits=[le.emerg&&`🆘 ${le.emerg}`,le.police&&`👮 Police ${le.police}`,le.amb&&`🚑 Ambulance ${le.amb}`,le.fire&&`🚒 Fire ${le.fire}`].filter(Boolean);
      if(bits.length)localNums=`<div style="font-size:12px;color:var(--muted);margin:-2px 0 6px">Local emergency: <b style="color:var(--text)">${bits.join(' · ')}</b></div>`;
    }
    html+=`<div style="font-size:12px;font-weight:700;color:var(--gold);margin:10px 0 6px">${loc.hotel?'🏨':'📍'} ${esc(label)}</div>
      ${localNums}
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px">${rows.join('')}</div>`;
    box=document.getElementById('emergPlaces');if(!box)return; // navigated away
    box.innerHTML=html;
  }
  box=document.getElementById('emergPlaces');if(!box)return;
  box.innerHTML=html; // clears the loading note when nothing was found
}

  'indonesia':'id','bali':'id','malaysia':'my','philippines':'ph','india':'in',

function emergencyInfo(country){
  const q=(country||'').trim().toLowerCase();
  if(!q)return null;
  const key=EMERGENCY_ALIAS[q];
  return key?EMERGENCY_INFO[key]
    :{emerg:'112 / 911',note:'Most common international emergency numbers — confirm the local number on arrival'};
}
function renderOverview(t,d){
  const days=t.start_date&&t.end_date?diffDays(t.start_date,t.end_date)+1:0;
  const totalBudget=d.budgetItems.reduce((a,b)=>a+(+b.planned||0),0);
  const totalActual=d.budgetItems.reduce((a,b)=>a+(+b.actual||0),0);
  const travelers=t.travelers||[];
  const write=canWrite(t);
  const isOwner=t.owner_id===ME?.id;

  const ownerProfile=d.ownerProfile||(t.owner_id===ME?.id?{id:ME.id,name:ME.name,email:ME.email,picture:ME.picture}:{id:t.owner_id,name:'Owner',email:'',picture:null});
  const allMembers=[{user_id:t.owner_id,role:'owner',profile:ownerProfile},...(d.members||[])];

  // ── Fun stats ──
  // Total air time from flights that have both depart + arrive datetime.
  // When both ends' UTC offsets are cached (from the Flights tab), correct
  // across time zones; otherwise fall back to the naive same-zone estimate.
  const _tzc=geoCache();
  const _off=p=>{const v=_tzc['tzoff|'+p];return typeof v==='number'?v:null;};
  let airMins=0;
  d.flights.forEach(f=>{
    if(f.depart_date&&f.depart_time&&f.arrive_date&&f.arrive_time){
      const dep=new Date(`${f.depart_date}T${f.depart_time}`);
      const arr=new Date(`${f.arrive_date}T${f.arrive_time}`);
      let diff=(arr-dep)/60000;
      const o1=_off(f.from_airport),o2=_off(f.to_airport);
      if(o1!=null&&o2!=null)diff-=(o2-o1)/60;
      if(diff>0&&diff<1440*3)airMins+=diff; // sanity: ignore negatives / >3 day gaps
    }
  });
  const airTimeStr=airMins>=60?`${Math.floor(airMins/60)}h ${Math.round(airMins%60)}m`:airMins>0?`${Math.round(airMins)}m`:'';

  // Total nights (sum of each stay's duration)
  let totalNights=0;
  d.stays.forEach(s=>{if(s.check_in&&s.check_out){const n=diffDays(s.check_in,s.check_out);if(n>0)totalNights+=n;}});

  // Unique destinations from stays
  const destinations=[...new Set(d.stays.map(s=>s.city||s.name).filter(Boolean))];

  // Confirmed % across all bookable items
  const bookable=[...d.flights,...d.stays,...d.events];
  const confirmedCount=bookable.filter(x=>x.confirmed).length;
  const confirmedPct=bookable.length?Math.round(confirmedCount/bookable.length*100):null;

  // Cost per day (all confirmed cost sources)
  const allCosts=[
    ...d.flights.filter(f=>f.confirmed&&f.cost).map(f=>+f.cost),
    ...d.stays.filter(s=>s.confirmed&&s.cost).map(s=>+s.cost),
    ...d.events.filter(e=>e.confirmed&&e.cost).map(e=>+e.cost),
  ];
  const totalConfirmedCost=allCosts.reduce((a,b)=>a+b,0);
  const costPerDay=days&&totalConfirmedCost?Math.round(totalConfirmedCost/days):null;

  // Busiest day (most events)
  const evByDay={};
  d.events.forEach(e=>{if(e.date)evByDay[e.date]=(evByDay[e.date]||0)+1;});
  const busiestEntry=Object.entries(evByDay).sort((a,b)=>b[1]-a[1])[0];
  const busiestDayNum=busiestEntry&&t.start_date?diffDays(t.start_date,busiestEntry[0])+1:null;
  const busiestDay=busiestEntry?`Day ${busiestDayNum||'?'}`:null;
  const busiestDaySub=busiestEntry?`${busiestEntry[1]} event${busiestEntry[1]!==1?'s':''} · ${fmtShort(busiestEntry[0])}`:null;

  // Packing progress
  const packed=d.packItems.filter(p=>p.packed).length;
  const packTotal=d.packItems.length;

  // Build fun stat tiles (only show if there's data)
  const funStats=[
    airTimeStr&&{icon:'✈️',val:airTimeStr,label:'Air Time'},
    totalNights&&{icon:'🌙',val:totalNights,label:`Night${totalNights!==1?'s':''} Away`},
    destinations.length&&{icon:'📍',val:destinations.length,label:`Destination${destinations.length!==1?'s':''}`,sub:destinations.slice(0,2).join(', ')+(destinations.length>2?'…':'')},
    confirmedPct!==null&&{icon:'✅',val:`${confirmedPct}%`,label:'Confirmed'},
    costPerDay&&{icon:'💵',val:formatCost(costPerDay,t.currency),label:'Per Day (est.)'},
    busiestDay&&{icon:'🔥',val:busiestDay,label:'Busiest Day',sub:busiestDaySub},
    packTotal&&{icon:'🧳',val:`${packed}/${packTotal}`,label:'Items Packed'},
  ].filter(Boolean);

  function funStatCard(s){
    return`<div class="fun-stat">
      <div class="fun-stat-icon">${s.icon}</div>
      <div class="fun-stat-body">
        <div class="fun-stat-val">${s.val}</div>
        <div class="fun-stat-label">${s.label}</div>
        ${s.sub?`<div style="font-size:11px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px">${esc(s.sub)}</div>`:''}
      </div>
    </div>`;
  }

  // ── "Today" day-of dashboard (only while the trip is happening) ──
  const todayStr=new Date().toLocaleDateString('en-CA');
  let todayHtml='';
  if(t.start_date&&t.end_date&&todayStr>=t.start_date&&todayStr<=t.end_date){
    const dayNum=diffDays(t.start_date,todayStr)+1;
    const evToday=d.events.filter(e=>e.date===todayStr).sort((a,b)=>(a.time||'23:59').localeCompare(b.time||'23:59'));
    const flToday=d.flights.filter(f=>f.depart_date===todayStr);
    const stayTonight=d.stays.find(s=>s.check_in&&s.check_out&&todayStr>=s.check_in&&todayStr<s.check_out)||d.stays.find(s=>s.check_in===todayStr);
    const trow=(time,icon,body)=>`<div class="today-row"><span class="today-time">${esc(time||'')}</span><span class="today-ico">${icon}</span><span class="today-body">${body}</span></div>`;
    const rows=[
      ...flToday.map(f=>trow(f.depart_time,TRANSPORT_MODES[transportMode(f)].icon,`${esc(`${f.from_airport||''} → ${f.to_airport||''}`)} ${esc(f.airline||'')}${f.confirm_num?` · <b>${esc(f.confirm_num)}</b>`:''}`)),
      ...evToday.map(e=>trow(e.time,(CATS[e.category]||CATS.other).icon,`${esc(e.title)}${e.location?` · <span style="color:var(--muted)">${esc(e.location)}</span>`:''}`)),
    ];
    // Local weather + emergency numbers for wherever "today" is: tonight's
    // hotel region when known (multi-country trips), else the trip country
    const todayRegion=stayTonight?itemRegion(t,stayTonight):null;
    const todayCountry=(todayRegion||'').split(',').pop().trim()||t.country;
    const tem=emergencyInfo(todayCountry);
    const emBits=tem?[tem.emerg&&`🆘 <b>${esc(tem.emerg)}</b>`,tem.police&&`👮 <b>${esc(tem.police)}</b>`,tem.amb&&`🚑 <b>${esc(tem.amb)}</b>`,tem.fire&&`🚒 <b>${esc(tem.fire)}</b>`].filter(Boolean):[];
    todayHtml=`<div class="card today-card">
      <div class="section-head"><h2 style="font-size:17px">📍 Today — Day ${dayNum} of ${days}</h2>
        <span style="display:flex;align-items:center;gap:12px">
          <span style="font-size:12px;color:var(--muted)">${fmt(todayStr)}</span>
          <button class="btn sm ghost" style="font-size:11px;padding:3px 9px" onclick="ITIN_SCROLLED=false;setTab('itinerary')">Full day →</button>
        </span></div>
      <div style="display:flex;flex-wrap:wrap;gap:6px 18px;align-items:center;padding:0 0 9px;margin-bottom:5px;border-bottom:1px solid var(--border);font-size:12.5px;color:var(--muted)">
        <span id="todayWx"></span>
        ${emBits.length?`<span>${emBits.join(' · ')}</span>`:''}
      </div>
      ${rows.length?rows.join(''):'<p style="font-size:13px;color:var(--muted)">Nothing scheduled today — enjoy the freedom! 🏖</p>'}
      ${stayTonight?`<div class="today-row" style="border-top:1px solid var(--border);margin-top:8px;padding-top:10px"><span class="today-time">🌙</span><span class="today-body">Tonight: <b>${esc(stayTonight.name)}</b>${stayTonight.address?` · <a href="${mapsUrl(stayTonight.address)}" target="_blank" rel="noopener" style="color:var(--muted);text-decoration:underline dotted">${esc(stayTonight.address)}</a>`:''}</span></div>`:''}
    </div>`;
  }

  // ── Passport expiry check (travelers are owner-visible; warn before it bites) ──
  let warnHtml='';
  if(t.end_date&&(d.travelers||[]).length){
    const limit=new Date(t.end_date+'T12:00:00');limit.setMonth(limit.getMonth()+6);
    const risky=(d.travelers||[]).filter(tv=>tv.passport_expiry&&new Date(tv.passport_expiry+'T12:00:00')<limit);
    if(risky.length)warnHtml=`<div class="card" style="margin-bottom:16px;border-color:var(--coral)">
      <div style="font-weight:700;color:var(--coral);margin-bottom:6px">🛂 Passport check</div>
      ${risky.map(tv=>{
        const expired=new Date(tv.passport_expiry+'T12:00:00')<new Date();
        return`<div style="font-size:13px;padding:2px 0">${esc(tv.name)} — passport ${expired?'<b style="color:var(--coral)">EXPIRED</b>':'expires <b>'+fmt(tv.passport_expiry)+'</b>'}</div>`;
      }).join('')}
      <p style="font-size:12px;color:var(--muted);margin-top:6px">Many countries require 6 months of validity beyond your travel dates.</p>
    </div>`;
  }

  // ── Trip recap once it's over: stats + the journal ──
  let recapHtml='';
  if(t.end_date&&todayStr>t.end_date){
    const j=(d.journal||[]).filter(x=>x.content);
    recapHtml=`<div class="card" style="margin-bottom:16px;border-color:var(--gold)">
      <div class="section-head"><h2 style="font-size:17px">🎉 Trip Complete</h2><span style="font-size:12px;color:var(--muted)">${fmt(t.start_date)} → ${fmt(t.end_date)}</span></div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:${j.length?'12px':'0'}">${days} days · ${d.events.length} activities · ${d.flights.length} travel legs · ${d.stays.length} stays</p>
      ${j.map(en=>`<div style="padding:10px 0;border-top:1px solid var(--border)">
        <div style="font-size:12px;font-weight:700;color:var(--gold);margin-bottom:4px">📔 ${fmt(en.date)}</div>
        <div style="font-size:14px;line-height:1.6;white-space:pre-wrap">${esc(en.content)}</div>
      </div>`).join('')}
      ${!j.length&&SCHEMA_V7?`<p style="font-size:12px;color:var(--dim)">No journal entries this time — on your next trip, tap 📔 on any itinerary day to capture memories.</p>`:''}
    </div>`;
  }

  // ── Local emergency numbers for the destination country ──
  const emerg=emergencyInfo(t.country);
  const customContacts=(Array.isArray(t.emergency_contacts)?t.emergency_contacts:[]).filter(c=>c&&(c.name||c.phone));
  const hasDest=tripDests(t).length>0;
  const ins=t.insurance&&(t.insurance.provider||t.insurance.policy||t.insurance.phone)?t.insurance:null;
  let emergHtml='';
  if(emerg||customContacts.length||hasDest||ins){
    const chip=(icon,label,num,tel)=>{
      const inner=`<div style="font-size:19px;line-height:1">${icon}</div>
        <div style="min-width:0"><div style="font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(label)}</div>
        <div style="font-size:16px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(num)}</div></div>`;
      const st='display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--panel2);border:1px solid var(--border);border-radius:12px;text-decoration:none;color:var(--text)';
      return tel?`<a href="tel:${tel}" style="${st}">${inner}</a>`:`<div style="${st}">${inner}</div>`;
    };
    // Country numbers only tel-link when a single clean number (never "112 / 999")
    const telOf=n=>/^\d{2,}$/.test(n)?n.replace(/[^\d]/g,''):'';
    const items=[];
    if(emerg){
      if(emerg.emerg)items.push(chip('🆘','Emergency',emerg.emerg,telOf(emerg.emerg)));
      if(emerg.police)items.push(chip('👮','Police',emerg.police,telOf(emerg.police)));
      if(emerg.amb)items.push(chip('🚑','Ambulance',emerg.amb,telOf(emerg.amb)));
      if(emerg.fire)items.push(chip('🚒','Fire',emerg.fire,telOf(emerg.fire)));
    }
    const custItems=customContacts.map(c=>{
      const dial=(c.phone||'').replace(/[^\d+]/g,'');
      const tel=dial.replace(/\+/g,'').length>=3?dial:'';
      return chip('📇',c.name||'Contact',c.phone||'',tel);
    });
    // Travel insurance: policy + claims line belong next to the numbers
    const insDial=(ins?.phone||'').replace(/[^\d+]/g,'');
    const insHtml=ins?`<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:8px;padding:11px 13px;background:var(--panel2);border:1px solid var(--border);border-radius:12px;font-size:13px">
      <span style="font-size:17px">🛡</span>
      <b>${esc(ins.provider||'Travel insurance')}</b>
      ${ins.policy?`<span style="color:var(--muted)">Policy <b style="color:var(--text)">${esc(ins.policy)}</b></span>`:''}
      ${ins.phone?`<a href="tel:${insDial}" style="font-weight:700;color:var(--text);text-decoration:none">📞 ${esc(ins.phone)}</a>`:''}
    </div>`:'';
    // Pre-trip prep links per destination country (health, entry rules, embassy)
    const prepCountries=[...new Set([t.country,...tripDests(t).map(x=>x.includes(',')?x.split(',').pop().trim():null)].filter(Boolean))].slice(0,3);
    const prepHtml=prepCountries.length?`<div style="display:flex;flex-wrap:wrap;gap:6px 16px;margin-top:10px;font-size:12px">
      ${prepCountries.map(c=>{
        const slug=c.toLowerCase().replace(/[^a-z\s-]/g,'').trim().replace(/\s+/g,'-');
        return`<span style="color:var(--muted)">${esc(c)}:
          <a href="https://wwwnc.cdc.gov/travel/destinations/traveler/none/${slug}" target="_blank" rel="noopener" style="color:var(--gold)">Health & vaccines ↗</a> ·
          <a href="https://www.iatatravelcentre.com/" target="_blank" rel="noopener" style="color:var(--gold)">Entry & visa rules ↗</a> ·
          <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent('embassies in '+c)}" target="_blank" rel="noopener" style="color:var(--gold)">Embassies ↗</a>
        </span>`;
      }).join('')}
    </div>`:'';
    emergHtml=`<div class="card" style="margin-bottom:16px">
      <div class="section-head"><h2 style="font-size:17px">🚨 Emergency${t.country?` · ${esc(t.country)}`:''}</h2></div>
      ${items.length?`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px">${items.join('')}</div>`:''}
      ${custItems.length?`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-top:${items.length?'8px':'0'}">${custItems.join('')}</div>`:''}
      ${insHtml}
      ${hasDest?`<div id="emergPlaces"></div>`:''}
      ${prepHtml}
      ${emerg&&emerg.note?`<p style="font-size:12px;color:var(--muted);margin-top:10px">${esc(emerg.note)}</p>`:''}
      ${SCHEMA_V14&&!customContacts.length?`<p style="font-size:11px;color:var(--dim);margin-top:6px">Tip: add your embassy, hotel or a local contact from ✎ Edit trip${SCHEMA_V15?', and your insurance policy so the claims line is always at hand':''}.</p>`:''}
    </div>`;
  }

  // ── Reminders card: check-in windows + cancellation deadlines ──
  const rems=tripReminders(t,d);
  let remindersHtml='';
  if(rems.length){
    const canAsk=('Notification' in window)&&Notification.permission==='default';
    remindersHtml=`<div class="card" style="margin-bottom:16px;border-color:var(--orange)">
      <div class="section-head"><h2 style="font-size:17px">⏰ Reminders</h2>

      ${rems.map(r=>`<div style="display:flex;gap:10px;padding:5px 0;font-size:13.5px;${r.urgent?'font-weight:600':''}"><span>${r.icon}</span><span style="min-width:0">${esc(r.msg)}</span></div>`).join('')}
    </div>`;
  }

  return`
  ${remindersHtml}
  ${todayHtml}
  ${warnHtml}
  ${recapHtml}
  <div class="card summary-panel">
    <div class="summary-title">Trip Summary</div>
    <div class="summary-row">
      <div class="summary-cell"><div class="summary-val">${days||'—'}</div><div class="summary-lbl">Days</div></div>
      <div class="summary-cell"><div class="summary-val">${d.events.length}</div><div class="summary-lbl">Events</div></div>
      <div class="summary-cell"><div class="summary-val">${d.flights.length}</div><div class="summary-lbl">Travel</div></div>
      <div class="summary-cell"><div class="summary-val">${d.stays.length}</div><div class="summary-lbl">Stays</div></div>
      ${totalBudget?`<div class="summary-cell"><div class="summary-val" style="font-size:22px">${formatCost(totalBudget,t.currency)}</div><div class="summary-lbl">Budget</div></div>`:''}
      ${totalActual?`<div class="summary-cell"><div class="summary-val" style="font-size:22px;color:${totalActual>totalBudget?'var(--coral)':'var(--green)'}">${formatCost(totalActual,t.currency)}</div><div class="summary-lbl">Spent</div></div>`:''}
    </div>

let _notesTimer=null,_notesPending=null;
function debouncedSaveNotes(id,notes){
  _notesPending={id,notes};
  clearTimeout(_notesTimer);
  _notesTimer=setTimeout(flushNotes,800);
}
function flushNotes(){
  clearTimeout(_notesTimer);
  if(!_notesPending)return;
  const{id,notes}=_notesPending;_notesPending=null;
  DB.from('wtn_trips').update({notes}).eq('id',id);
}
// Don't lose a note typed within the debounce window when leaving
window.addEventListener('beforeunload',flushNotes);

/* ── Itinerary ── */
function itinAutoItems(d){
  // Returns a map of date -> [{sortTime, html}] from flights and stays
  const map={};
  function push(date,sortTime,html){
    if(!date)return;
    (map[date]=map[date]||[]).push({sortTime:sortTime||'00:00',html});
  }
  (d.flights||[]).forEach(f=>{
    const md=TRANSPORT_MODES[transportMode(f)];
    const isFlight=transportMode(f)==='flight';
    const tag=`${md.label.toUpperCase()} ›`;
    const depLabel=f.airline?`${f.airline}${f.flight_num?' '+f.flight_num:''}`:'';
    const route=`${f.from_airport||'?'} → ${f.to_airport||'?'}`;
    if(f.depart_date){
      push(f.depart_date,f.depart_time,
        `<div class="tl-event"><div class="tl-dot" style="background:var(--blue)"></div>
        <div class="itin-auto itin-flight" onclick="setTab('flights')" style="cursor:pointer">
          <div class="itin-auto-icon">${md.icon}</div>
          <div class="itin-auto-body">
            <div class="itin-auto-title">Depart · ${esc(route)}</div>
            <div class="itin-auto-meta">${f.depart_time?esc(f.depart_time)+' · ':''}${esc(depLabel)}</div>
          </div>
          <span class="itin-auto-tag tag-flight">${tag}</span>
        </div></div>`);
    }
    if(f.arrive_date){
      push(f.arrive_date,f.arrive_time,
        `<div class="tl-event"><div class="tl-dot" style="background:var(--cyan)"></div>
        <div class="itin-auto itin-flight" onclick="setTab('flights')" style="cursor:pointer">
          <div class="itin-auto-icon">${isFlight?'🛬':md.icon}</div>
          <div class="itin-auto-body">
            <div class="itin-auto-title">Arrive · ${esc(route)}</div>
            <div class="itin-auto-meta">${f.arrive_time?esc(f.arrive_time)+' · ':''}${esc(depLabel)}</div>
          </div>
          <span class="itin-auto-tag tag-flight">${tag}</span>
        </div></div>`);
    }
  });
  (d.stays||[]).forEach(s=>{
    if(s.check_in){
      push(s.check_in,s.check_in_time||'00:00',
        `<div class="tl-event"><div class="tl-dot" style="background:var(--green)"></div>
        <div class="itin-auto itin-stay" onclick="setTab('stays')" style="cursor:pointer">
          <div class="itin-auto-icon">🏨</div>
          <div class="itin-auto-body">
            <div class="itin-auto-title">Check-in · ${esc(s.name||'Accommodation')}</div>
            <div class="itin-auto-meta">${s.check_in_time?esc(s.check_in_time)+' · ':''}${esc(s.city||s.address||'')}</div>
          </div>
          <span class="itin-auto-tag tag-stay">STAY ›</span>
        </div></div>`);
    }
    if(s.check_out){
      push(s.check_out,s.check_out_time||'23:59',
        `<div class="tl-event"><div class="tl-dot" style="background:var(--orange)"></div>
        <div class="itin-auto itin-stay" onclick="setTab('stays')" style="cursor:pointer">
          <div class="itin-auto-icon">🧳</div>
          <div class="itin-auto-body">
            <div class="itin-auto-title">Check-out · ${esc(s.name||'Accommodation')}</div>
            <div class="itin-auto-meta">${s.check_out_time?esc(s.check_out_time)+' · ':''}${esc(s.city||s.address||'')}</div>
          </div>
          <span class="itin-auto-tag tag-stay">STAY ›</span>
        </div></div>`);
    }
  });
  return map;
}

function toggleItinDay(date){
  if(ITIN_COLLAPSED.has(date))ITIN_COLLAPSED.delete(date);
  else ITIN_COLLAPSED.add(date);
  renderTab();
}
function toggleItinHideEmpty(){
  ITIN_HIDE_EMPTY=!ITIN_HIDE_EMPTY;
  renderTab();
}

// Itinerary tab = two views of the same events (Activities merged in):
// "By Day" timeline and "All" grouped-by-type list (incl. unscheduled ideas)
function renderItinerary(t,d){
  const write=canWrite(t);
  const regionBar=regionFilterBar(t,d);
  d=filterByRegion(d,t);
  const hasDates=tripDays(t).length>0;
  if(!hasDates&&ITIN_VIEW==='days')ITIN_VIEW='all'; // no dates → collect activities first
  const seg=`<div class="itin-seg">
    <button class="itin-seg-btn${ITIN_VIEW==='days'?' active':''}" onclick="setItinView('days')" ${hasDates?'':'disabled title="Set trip dates to plan by day"'}>🗓 By Day</button>
    <button class="itin-seg-btn${ITIN_VIEW==='all'?' active':''}" onclick="setItinView('all')">🎭 All Activities</button>
  </div>`;
  const body=ITIN_VIEW==='all'?renderItinAll(t,d,write):renderItinDays(t,d,write);
  return`<div>${regionBar}${seg}${body}</div>`;
}
function renderItinDays(t,d,write){
  const days=tripDays(t);
  if(!days.length)return`<div class="empty"><div class="icon">🗓</div><p>Set trip dates to see your day-by-day itinerary.</p></div>`;
  const dayColors=['#f5c542','#4a90e2','#34d399','#f472b6','#fb923c','#a78bfa','#22d3ee','#f87171','#67e8f9','#fde68a'];
  const autoMap=itinAutoItems(d);

  // Count totals for filter bar label
  let emptyCount=0;
  days.forEach(date=>{
    const evs=d.events.filter(e=>e.date===date);
    const auto=autoMap[date]||[];
    if(!evs.length&&!auto.length)emptyCount++;
  });

  return`<div>
    <div class="itin-filter-bar">
      <button class="btn sm ghost" onclick="toggleItinHideEmpty()" style="${ITIN_HIDE_EMPTY?'background:var(--border2);color:var(--text)':''}">
        ${ITIN_HIDE_EMPTY?'👁 Show all days':`🙈 Hide empty days${emptyCount?' ('+emptyCount+')':''}`}
      </button>
      <button class="btn sm ghost" onclick="exportICS('${t.id}')" title="Download .ics for Google/Apple Calendar">📅 Export to calendar</button>
    </div>
    ${days.map((date,idx)=>{
      const dayEvents=d.events.filter(e=>e.date===date).sort((a,b)=>(a.time||'23:59').localeCompare(b.time||'23:59'));
      const autoItems=(autoMap[date]||[]).sort((a,b)=>a.sortTime.localeCompare(b.sortTime));
      const totalItems=dayEvents.length+autoItems.length;
      if(ITIN_HIDE_EMPTY&&!totalItems)return'';
      const color=dayColors[idx%dayColors.length];
      const collapsed=ITIN_COLLAPSED.has(date);

      // Conflict detection: overlapping timed events + clashes with flights
      const toMin=s=>{const[p,q]=(s||'0:0').split(':');return +p*60+(+q||0);};
      const conflicts=[];
      const timed=dayEvents.filter(e=>e.time);
      for(let a=0;a<timed.length;a++)for(let b=a+1;b<timed.length;b++){
        const A=timed[a],B=timed[b];
        const as=toMin(A.time),ae=as+(+A.duration||60);
        const bs=toMin(B.time),be=bs+(+B.duration||60);
        if(as<be&&bs<ae)conflicts.push(`“${A.title}” overlaps “${B.title}”`);
      }
      (d.flights||[]).forEach(f=>{
        const md=TRANSPORT_MODES[transportMode(f)].label.toLowerCase();
        if(f.arrive_date===date&&f.arrive_time)timed.forEach(ev=>{if(toMin(ev.time)<toMin(f.arrive_time))conflicts.push(`“${ev.title}” starts before your ${md} arrives (${f.arrive_time})`);});
        if(f.depart_date===date&&f.depart_time)timed.forEach(ev=>{if(toMin(ev.time)>toMin(f.depart_time))conflicts.push(`“${ev.title}” is after your ${md} departs (${f.depart_time})`);});
      });
      const confHtml=conflicts.length?`<div class="day-ctx" style="background:rgba(240,90,90,.08);color:var(--coral);border-color:rgba(240,90,90,.25);cursor:default">⚠️ ${conflicts.map(esc).join(' · ')}</div>`:'';

      // Journal preview (tap to edit)
      const jEntry=SCHEMA_V7?(d.journal||[]).find(j=>j.date===date&&j.content):null;
      const jHtml=jEntry?`<div class="day-ctx" style="background:rgba(245,197,66,.06);color:var(--text);border-color:rgba(245,197,66,.2)" onclick="modalJournal('${t.id}','${date}')">📔 <span style="font-weight:500;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(jEntry.content.slice(0,90))}${jEntry.content.length>90?'…':''}</span></div>`:'';

      // Context strips: where you're sleeping tonight + travel in progress
      const nightStays=(d.stays||[]).filter(s=>s.check_in&&s.check_out&&date>=s.check_in&&date<s.check_out);
      const enRoute=(d.flights||[]).filter(f=>f.depart_date&&f.arrive_date&&date>f.depart_date&&date<f.arrive_date);
      const ctxHtml=[confHtml,jHtml,
        ...nightStays.map(s=>{
          const night=diffDays(s.check_in,date)+1,total=diffDays(s.check_in,s.check_out);
          return`<div class="day-ctx ctx-stay" onclick="setTab('stays')">🏨 ${esc(s.name)} <span class="day-ctx-sub">· night ${night} of ${total}</span></div>`;
        }),
        ...enRoute.map(f=>{
          const md=TRANSPORT_MODES[transportMode(f)];
          return`<div class="day-ctx ctx-travel" onclick="setTab('flights')">${md.icon} ${esc(f.airline||md.label)}${f.from_airport?` · ${esc(f.from_airport)} → ${esc(f.to_airport||'')}`:''} <span class="day-ctx-sub">· ongoing</span></div>`;
        }),
      ].join('');

      // Merge events and auto-items sorted by time
      const allItems=[];
      dayEvents.forEach(ev=>allItems.push({sortTime:ev.time||'23:59',html:eventCard(ev,write)}));
      autoItems.forEach(a=>allItems.push(a));
      allItems.sort((a,b)=>a.sortTime.localeCompare(b.sortTime));

      return`<div class="day-block" id="day-${date}" ${write?`ondragover="dragOverDay(event)" ondragleave="dragLeaveDay(event)" ondrop="dropOnDay(event,'${t.id}','${date}')"`:''}>
        <div class="day-header" onclick="toggleItinDay('${date}')">
          <div class="day-label">
            <div class="day-num" style="background:${color}20;color:${color}">D${idx+1}</div>
            <div class="day-info">
              <h3>${fmtDay(date)}</h3>
              <div class="day-date">${totalItems} item${totalItems!==1?'s':''}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            ${SCHEMA_V7&&write?`<button class="btn sm ghost" onclick="event.stopPropagation();modalJournal('${t.id}','${date}')" title="Day journal" style="${(d.journal||[]).some(j=>j.date===date&&j.content)?'color:var(--gold);border-color:var(--gold)':''}">📔</button>`:''}
            ${write?`<button class="btn sm primary" onclick="event.stopPropagation();modalAddToDay('${t.id}','${date}')">＋ Add</button>`:''}
            <button class="day-collapse-btn ${collapsed?'collapsed':''}" onclick="event.stopPropagation();toggleItinDay('${date}')">▼</button>
          </div>
        </div>
        ${collapsed?'':`${ctxHtml?`<div class="day-ctx-wrap">${ctxHtml}</div>`:''}<div class="timeline">
          ${allItems.length?allItems.map(i=>i.html).join(''):`<div style="color:var(--dim);font-size:13px;padding:8px 0 6px">No items yet.</div>`}
          ${write?`<input class="idea-input" placeholder="💭 Brainstorm this day… (Enter to add)" data-trip="${t.id}" data-date="${date}" onkeydown="ideaQuickKey(event,this)">`:''}
        </div>`}
      </div>`;
    }).join('')}
    ${write?`<button class="btn primary ha-desktop" style="margin-top:8px" onclick="modalAddToDay('${t.id}','')">＋ Add</button>`:''}
  </div>`;
}

/* ── Jump to today: auto-scroll on first open + floating pill during the trip ── */
let ITIN_SCROLLED=false;
function itinScrollToday(t){
  const today=new Date().toLocaleDateString('en-CA');
  const onTrip=t?.start_date&&t?.end_date&&today>=t.start_date&&today<=t.end_date;
  document.getElementById('todayPill')?.remove();
  if(!onTrip)return;
  const target=document.getElementById('day-'+today);
  if(!target)return;
  if(!ITIN_SCROLLED){
    ITIN_SCROLLED=true;
    setTimeout(()=>target.scrollIntoView({behavior:'smooth',block:'start'}),150);
  }
  const pill=document.createElement('button');
  pill.id='todayPill';pill.className='today-pill';pill.textContent='📍 Today';
  pill.onclick=()=>document.getElementById('day-'+today)?.scrollIntoView({behavior:'smooth',block:'start'});
  document.body.appendChild(pill);
}

/* ── Idea placeholders: one-line brainstorms per day, upgradeable to real activities ── */
async function ideaQuickKey(e,el){
  if(e.key==='Escape'){el.value='';el.blur();return;}
  if(e.key!=='Enter')return;
  const title=el.value.trim();if(!title)return;
  el.value='';
  const tripId=el.dataset.trip,date=el.dataset.date;
  const row={id:crypto.randomUUID(),trip_id:tripId,title,category:'idea',date,confirmed:false,created_at:new Date().toISOString()};
  TD[tripId]?.events.push(row);
  renderTab();
  // keep brainstorming on the same day without re-tapping
  setTimeout(()=>document.querySelector(`.idea-input[data-date="${date}"]`)?.focus(),50);
  DB.from('wtn_events').insert(row).then(({error})=>{
    if(error){
      const arr=TD[tripId]?.events||[];
      const idx=arr.findIndex(x=>x.id===row.id);
      if(idx>=0){arr.splice(idx,1);renderTab();}
      toast('Could not add idea');
    }
  });
}

function renderFlights(t,d){
  const write=canWrite(t);
  const regionBar=regionFilterBar(t,d);
  d=filterByRegion(d,t);
  const addBtn=write?`<button class="btn primary" onclick="modalFlight('${t.id}')">＋ Add</button>`:'';
  const hint=(!SCHEMA_V4&&isAdmin())?`<div class="card" style="font-size:13px;color:var(--muted);margin-bottom:16px">🚆 To organize trains, buses, ferries and car rentals into their own sections, run <b>supabase/migration_v4.sql</b> in the Supabase SQL editor.</div>`:'';
  if(!d.flights.length)return`<div>
    <div class="section-head"><h2>✈️ Travel</h2>${addBtn}</div>
    ${regionBar}
    ${hint}
    <div class="empty"><div class="icon">✈️</div><p>No travel added yet — flights, trains, buses, ferries, car rentals…</p></div>
  </div>`;

  const flightsOnly=d.flights.filter(f=>transportMode(f)==='flight');
  const otherModes=Object.keys(TRANSPORT_MODES).filter(m=>m!=='flight')
    .map(m=>({m,items:d.flights.filter(f=>transportMode(f)===m)}))
    .filter(x=>x.items.length);

  // Auto-pair round trips (A→B + B→A) — flights only
  const used=new Set();
  const cards=[];

// Free-cancellation status strip: green while comfortably refundable, amber
// in the final 3 days, muted once the window has closed
function cancelBadge(s){
  if(!s.cancel_by)return'';
  const today=new Date().toLocaleDateString('en-CA');
  const days=diffDays(today,s.cancel_by);
  let color,msg;
  if(days<0){color='var(--dim)';msg=`Free cancellation ended ${fmt(s.cancel_by)}`;}
  else if(days<=3){color='var(--orange)';msg=`⏰ Free cancellation ends ${days===0?'TODAY':days===1?'tomorrow':`in ${days} days`} — ${fmt(s.cancel_by)}`;}
  else{color='var(--green)';msg=`✓ Free cancellation until ${fmt(s.cancel_by)}`;}
  return`<div style="margin-top:10px;padding:7px 11px;border:1px solid ${color};border-radius:9px;font-size:12px;font-weight:600;color:${color}">${msg}</div>`;
}

/* Every expense on the trip, normalized: flights/stays/events (auto) +
   manual budget items, each with its split info when the schema has it. */
function collectExpenses(t,d,disp){
  const cur=t.currency||'$';
  disp=disp||cur;
  const miniCats={food:'🍽️',activity:'🎯',transport:'🚗',shopping:'🛍️',other:'📌'};
  // Auto items (flights/stays/events) are assumed to be in the trip currency;
  // manual items carry their own. Everything is converted to `disp`.
  // When a rate is unavailable convToTrip returns null — we keep the raw
  // number for display but flag the item so totals/settle-up can warn
  // rather than silently sum mismatched currencies.
  const mkAmt=(raw,from)=>{const c=convToTrip(+raw,from,disp);return {amt:c===null?+raw:c,mixed:c===null&&(from||disp)!==disp,srcCur:from||disp};};
  const conv=(raw,from)=>mkAmt(raw,from).amt;
  const ex=[];
  (d.flights||[]).forEach(f=>{
    if(!f.cost)return;
    const a=mkAmt(f.cost,cur);
    ex.push({kind:'flight',id:f.id,icon:TRANSPORT_MODES[transportMode(f)].icon,name:f.from_airport&&f.to_airport?`${f.from_airport} → ${f.to_airport}`:(f.airline||TRANSPORT_MODES[transportMode(f)].label),sub:f.airline||'',amt:a.amt,mixed:a.mixed,confirmed:!!f.confirmed,manual:false,paid_by:f.paid_by,split_with:f.split_with});
  });
  (d.stays||[]).forEach(s=>{
    if(!s.cost)return;
    const a=mkAmt(s.cost,cur);
    ex.push({kind:'stay',id:s.id,icon:'🏨',name:s.name||'Accommodation',sub:s.city||'',amt:a.amt,mixed:a.mixed,confirmed:!!s.confirmed,manual:false,paid_by:s.paid_by,split_with:s.split_with});
  });
  (d.events||[]).forEach(ev=>{
    if(!ev.cost)return;
    const a=mkAmt(ev.cost,cur);
    ex.push({kind:'event',id:ev.id,icon:miniCats[ev.category]||'📌',name:ev.title||'Activity',sub:ev.location||'',amt:a.amt,mixed:a.mixed,confirmed:!!ev.confirmed,manual:false,paid_by:ev.paid_by,split_with:ev.split_with});
  });
  (d.budgetItems||[]).forEach(b=>{
    const a=mkAmt(+b.actual||+b.planned||0,b.currency||cur);
    ex.push({kind:'budget',id:b.id,icon:'📋',name:b.name,sub:b.category||'',amt:a.amt,mixed:a.mixed,confirmed:true,manual:true,paid_by:b.paid_by,split_with:b.split_with});
  });
  return ex;
}
function canSplitKind(kind){return kind==='budget'?!!SCHEMA_V2:!!SCHEMA_V3;}

let BUDGET_VIEW='items';
function setBudgetView(v){BUDGET_VIEW=v;renderTab();}
// Display currency for the Budget tab (view-level conversion; stored data is untouched).
// Rates come from frankfurter.dev (ECB reference rates, updated every business day)
// and are fetched fresh each session.
let BUDGET_DISP_CUR=null;
function setBudgetCur(v){
  const t=TRIPS.find(x=>x.id===CUR.tripId);
  BUDGET_DISP_CUR=v===(t?.currency||'$')?null:v;
  ensureRates(v).then(()=>{if(CUR.tab==='budget')renderTab();});
  renderTab();
}

function settleUpHtml(shared,nameOf,cur){
  // If any shared expense couldn't be converted to the display currency,
  // the balances would mix currencies and produce wrong "owes" amounts —
  // refuse to compute rather than silently misinform who pays whom.
  if(shared.some(b=>b.mixed)){
    return {lines:[`<div class="today-row" style="color:var(--coral)">⚠️ Exchange rates unavailable — can't total mixed currencies. Reconnect, or set the display currency to match your items.</div>`],bal:{},mixed:true};
  }
  const bal={};
  shared.forEach(b=>{
    bal[b.paid_by]=(bal[b.paid_by]||0)+b.amt;
    const share=b.amt/b.split_with.length;
    b.split_with.forEach(u=>{bal[u]=(bal[u]||0)-share;});
  });
  const D=Object.entries(bal).filter(([,v])=>v<-0.01).sort((a,b)=>a[1]-b[1]).map(([u,v])=>[u,-v]);
  const C=Object.entries(bal).filter(([,v])=>v>0.01).sort((a,b)=>b[1]-a[1]).map(([u,v])=>[u,v]);
  const lines=[];
  let i=0,j=0;
  while(i<D.length&&j<C.length){
    const pay=Math.min(D[i][1],C[j][1]);
    lines.push(`<div class="today-row"><span>💸</span><span><b>${esc(nameOf[D[i][0]]||'?')}</b> owes <b>${esc(nameOf[C[j][0]]||'?')}</b></span><span style="margin-left:auto;color:var(--gold);font-weight:700">${formatCost(Math.round(pay*100)/100,cur)}</span></div>`);
    D[i][1]-=pay;C[j][1]-=pay;
    if(D[i][1]<0.01)i++;
    if(C[j][1]<0.01)j++;
  }
  return {lines,bal};
}
function memberNames(t,d){
  const nameOf={};
  [{user_id:t.owner_id,profile:d.ownerProfile},...(d.members||[])].forEach(m=>{
    const p=m.profile||{};nameOf[m.user_id]=p.name?.split(' ')[0]||p.email||'Someone';
  });
  return nameOf;
}

function renderBudget(t,d){
  const write=canWrite(t);
  const cur=t.currency||'$';
  const disp=BUDGET_DISP_CUR||cur;
  const expenses=collectExpenses(t,d,disp);
  const nameOf=memberNames(t,d);

  const subTabs=`
  <div style="display:flex;gap:6px;margin-bottom:16px;align-items:center;flex-wrap:wrap">
    <button class="btn sm ${BUDGET_VIEW!=='splits'?'primary':'ghost'}" onclick="setBudgetView('items')">💰 Budget</button>
    <button class="btn sm ${BUDGET_VIEW==='splits'?'primary':'ghost'}" onclick="setBudgetView('splits')">🤝 Splits</button>
    <span style="margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)">💱 Show in
      <select onchange="setBudgetCur(this.value)" style="width:auto;padding:5px 8px;font-size:12px">
        ${curOptions(disp)}
      </select>
    </span>
  </div>
  ${disp!==cur?`<p style="font-size:12px;color:var(--dim);margin:-8px 0 14px">Amounts converted from ${esc(cur)} at today's ECB reference rate — the stored values are unchanged.</p>`:''}`;

  if(BUDGET_VIEW==='splits')return`<div>
    <div class="section-head"><h2>💰 Budget</h2></div>
    ${subTabs}
    ${renderSplits(t,d,expenses,nameOf,write)}
  </div>`;

  const autoConf=expenses.filter(e=>!e.manual&&e.confirmed);
  const autoPot=expenses.filter(e=>!e.manual&&!e.confirmed);
  const confTotal=autoConf.reduce((a,x)=>a+x.amt,0);
  const potTotal=autoPot.reduce((a,x)=>a+x.amt,0);
  const manualItems=d.budgetItems||[];
  const itemAmt=b=>{
    const raw=+b.actual||+b.planned||0;
    const c=convToTrip(raw,b.currency||cur,disp);
    return c===null?raw:c;
  };
  const manualTotal=manualItems.reduce((a,b)=>a+itemAmt(b),0);
  const grandTotal=confTotal+potTotal+manualTotal;
  // Any expense we couldn't convert means the totals mix currencies
  const mixedAny=expenses.some(e=>e.mixed);
  const mixedBanner=mixedAny?`<div class="card" style="margin-bottom:14px;border-color:var(--orange);font-size:12px;color:var(--muted)">⚠️ Some amounts are in a different currency and exchange rates are unavailable — totals below mix currencies and are approximate. Reconnect to convert.</div>`:'';

  // Budget alert: planned vs actual, converted to the display currency
  // (skip items that can't be converted so the % isn't corrupted)
  let plannedSum=0,actualSum=0,alertMixed=false;
  manualItems.forEach(b=>{
    const cp=convToTrip(+b.planned||0,b.currency||cur,disp);
    const ca=convToTrip(+b.actual||0,b.currency||cur,disp);
    if(cp===null||ca===null){alertMixed=true;return;}
    plannedSum+=cp;actualSum+=ca;
  });
  let alertHtml='';
  if(plannedSum>0&&actualSum/plannedSum>=0.85){
    const over=actualSum>plannedSum;
    alertHtml=`<div class="card" style="margin-bottom:14px;border-color:${over?'var(--coral)':'var(--orange)'};font-size:13px">
      ${over?'🚨':'⚠️'} <b>${over?'Over budget':'Approaching budget'}</b> — spent ${formatCost(Math.round(actualSum),disp)} of ${formatCost(Math.round(plannedSum),disp)} planned (${Math.round(actualSum/plannedSum*100)}%)${alertMixed?' · some items excluded (no rate)':''}
    </div>`;
  }

  // Compact settle-up summary at the bottom of the main budget view
  const shared=expenses.filter(e=>e.paid_by&&Array.isArray(e.split_with)&&e.split_with.length&&e.amt);
  let settleHtml='';
  if(shared.length){
    const {lines}=settleUpHtml(shared,nameOf,disp);
    settleHtml=`<div class="budget-group">
      <div class="budget-group-head"><span>🤝 Settle Up</span><button class="btn sm ghost" onclick="setBudgetView('splits')" style="font-size:11px">View splits →</button></div>
      ${lines.length?lines.join(''):'<p class="muted" style="font-size:13px">All square! 🎉</p>'}
    </div>`;
  }

  function budgetLine(item){
    const splittable=write&&canSplitKind(item.kind);
    return`<div class="budget-line">
      <div class="budget-line-icon">${item.icon}</div>
      <div class="budget-line-body">
        <div class="budget-line-name">${esc(item.name)}</div>
        <div class="budget-line-sub">${esc(item.sub||'')}${item.paid_by&&item.split_with?.length?`${item.sub?' · ':''}🤝 ${esc(nameOf[item.paid_by]||'?')} paid, split ${item.split_with.length} way${item.split_with.length!==1?'s':''}`:''}</div>
      </div>
      <div class="budget-line-amt">${formatCost(Math.round(item.amt*100)/100,disp)}</div>
      ${splittable?`<button class="btn sm ghost split-btn" onclick="modalSplit('${t.id}','${item.kind}','${item.id}')" title="Split this expense">💸</button>`:''}
    </div>`;
  }

  // Two-tone progress bar: green=confirmed, orange=potential
  const barTotal=confTotal+potTotal+manualTotal;
  const confPct=barTotal?Math.round(confTotal/barTotal*100):0;
  const potPct=barTotal?Math.round((potTotal+manualTotal)/barTotal*100):0;

  const hasAny=autoConf.length||autoPot.length||manualItems.length;

  return`<div>
    <div class="section-head"><h2>💰 Budget</h2>${write?`<button class="btn primary" onclick="modalBudgetItem('${t.id}')">＋ Add Manual</button>`:''}</div>
    ${subTabs}
    ${mixedBanner}
    ${alertHtml}
    ${hasAny?`
    <div class="budget-summary">
      <div class="budget-stat"><div class="bv" style="color:var(--green)">${formatCost(Math.round(confTotal),disp)}</div><div class="bl">Confirmed</div></div>
      <div class="budget-stat"><div class="bv" style="color:var(--orange)">${formatCost(Math.round(potTotal),disp)}</div><div class="bl">Potential</div></div>
      <div class="budget-stat"><div class="bv" style="color:var(--gold)">${formatCost(Math.round(grandTotal),disp)}</div><div class="bl">Grand Total</div></div>
    </div>
    <div style="height:8px;background:var(--border);border-radius:4px;margin-bottom:24px;overflow:hidden;display:flex">
      <div style="height:100%;width:${confPct}%;background:var(--green);border-radius:4px 0 0 4px;transition:width .4s"></div>
      <div style="height:100%;width:${potPct}%;background:var(--orange);transition:width .4s"></div>
    </div>
    ${autoConf.length?`
    <div class="budget-group">
      <div class="budget-group-head bg-conf"><span>✓ Confirmed</span><span>${formatCost(Math.round(confTotal),disp)}</span></div>
      ${autoConf.map(budgetLine).join('')}
    </div>`:''}
    ${autoPot.length?`
    <div class="budget-group">
      <div class="budget-group-head bg-pot"><span>◷ Potential</span><span>${formatCost(Math.round(potTotal),disp)}</span></div>
      ${autoPot.map(budgetLine).join('')}
    </div>`:''}
    ${manualItems.length?`
    <div class="budget-group">
      <div class="budget-group-head"><span>📋 Manual Items</span><span>${formatCost(Math.round(manualTotal),disp)}</span></div>
      ${manualItems.map(item=>`
      <div class="budget-item" onclick="${write?`modalBudgetItem('${t.id}','${item.id}')`:''}" style="${write?'':'cursor:default'}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px">
          <span style="font-weight:600;font-size:14px">${esc(item.name)}</span>
          <span style="display:flex;align-items:center;gap:8px">
            ${item.notes?`<span class="muted" style="font-size:12px">${esc(item.notes)}</span>`:''}
            ${write&&SCHEMA_V2?`<button class="btn sm ghost split-btn" onclick="event.stopPropagation();modalSplit('${t.id}','budget','${item.id}')" title="Split this expense">💸</button>`:''}
          </span>
        </div>
        <div style="display:flex;gap:16px;font-size:13px;flex-wrap:wrap">
          <span style="color:var(--muted)">Budget: ${formatCost(item.planned,item.currency||cur)}</span>
          ${item.actual?`<span style="font-weight:600;color:${+item.actual>+item.planned?'var(--coral)':'var(--green)'}">Actual: ${formatCost(item.actual,item.currency||cur)}</span>`:'<span class="muted">Not spent yet</span>'}
          ${(item.currency||cur)!==disp&&convToTrip(+item.actual||+item.planned||0,item.currency||cur,disp)!==null?`<span style="color:var(--dim)">≈ ${formatCost(Math.round(convToTrip(+item.actual||+item.planned||0,item.currency||cur,disp)),disp)}</span>`:''}
          ${item.paid_by&&item.split_with?.length?`<span style="color:var(--cyan)">🤝 ${esc(nameOf[item.paid_by]||'?')} paid · split ${item.split_with.length} way${item.split_with.length!==1?'s':''}</span>`:''}
        </div>
        ${item.planned?`<div class="budget-bar"><div class="budget-bar-fill" style="width:${item.actual?Math.min(100,Math.round(item.actual/item.planned*100)):0}%;background:${+item.actual>+item.planned?'var(--coral)':'var(--green)'}"></div></div>`:''}
      </div>`).join('')}
    </div>`:''}
    ${settleHtml}`
    :`<div class="empty"><div class="icon">💰</div><p>Costs added to flights, stays &amp; activities will appear here automatically.</p></div>`}
  </div>`;
}

/* ── Splits view: itemized receipt + per-person totals + settle up ── */
function renderSplits(t,d,expenses,nameOf,write){
  const cur=BUDGET_DISP_CUR||t.currency||'$'; // expenses are already converted to this
  const migrateHint=(!SCHEMA_V3&&isAdmin())?`<div class="card" style="font-size:13px;color:var(--muted);margin-bottom:16px">🤝 To split flights, stays and activities (not just manual items), run <b>supabase/migration_v3.sql</b> in the Supabase SQL editor.</div>`:'';
  const shared=expenses.filter(e=>e.paid_by&&Array.isArray(e.split_with)&&e.split_with.length&&e.amt);
  const unassigned=expenses.filter(e=>e.amt&&!(e.paid_by&&e.split_with?.length));
  if(!shared.length&&!unassigned.length)return migrateHint+`<div class="empty"><div class="icon">🤝</div><p>No expenses yet — add costs to flights, stays, activities or manual items, then split them here.</p></div>`;

  const {lines,mixed:sharedMixed}=settleUpHtml(shared,nameOf,cur);
  const perPersonMixed=sharedMixed; // same cause — hide the misleading per-person math

  // Per-person totals
  const paid={},share={};
  shared.forEach(e=>{
    paid[e.paid_by]=(paid[e.paid_by]||0)+e.amt;
    e.split_with.forEach(u=>{share[u]=(share[u]||0)+e.amt/e.split_with.length;});
  });
  const people=[...new Set([...Object.keys(paid),...Object.keys(share)])];
  const sharedTotal=shared.reduce((a,e)=>a+e.amt,0);

  return`
  ${migrateHint}
  ${shared.length?`
  <div class="budget-group">
    <div class="budget-group-head"><span>🤝 Settle Up</span><span>${shared.length} shared</span></div>
    ${lines.length?lines.join(''):'<p class="muted" style="font-size:13px">All square! 🎉</p>'}
  </div>
  ${perPersonMixed?'':`<div class="budget-group">
    <div class="budget-group-head"><span>👥 Per Person</span><span>${formatCost(Math.round(sharedTotal),cur)} shared</span></div>
    ${people.map(u=>{
      const p=paid[u]||0,s=share[u]||0,net=p-s;
      return`<div class="budget-line">
        <div class="budget-line-icon">${(nameOf[u]||'?')[0].toUpperCase()}</div>
        <div class="budget-line-body">
          <div class="budget-line-name">${esc(nameOf[u]||'Someone')}</div>
          <div class="budget-line-sub">paid ${formatCost(Math.round(p*100)/100,cur)} · share ${formatCost(Math.round(s*100)/100,cur)}</div>
        </div>
        <div class="budget-line-amt" style="color:${net>0.01?'var(--green)':net<-0.01?'var(--coral)':'var(--muted)'}">${net>0.01?'+':''}${formatCost(Math.round(net*100)/100,cur)}</div>
      </div>`;
    }).join('')}
  </div>`}
  <div class="budget-group">
    <div class="budget-group-head"><span>🧾 Itemized Receipt</span><span>${formatCost(Math.round(sharedTotal),cur)}</span></div>
    ${shared.map(e=>`
    <div class="budget-line">
      <div class="budget-line-icon">${e.icon}</div>
      <div class="budget-line-body">
        <div class="budget-line-name">${esc(e.name)}</div>
        <div class="budget-line-sub">${esc(nameOf[e.paid_by]||'?')} paid · ${e.split_with.map(u=>esc(nameOf[u]||'?')).join(', ')} — ${formatCost(Math.round(e.amt/e.split_with.length*100)/100,cur)} each</div>
      </div>
      <div class="budget-line-amt">${formatCost(e.amt,cur)}</div>
      ${write&&canSplitKind(e.kind)?`<button class="btn sm ghost split-btn" onclick="modalSplit('${t.id}','${e.kind}','${e.id}')" title="Edit split">✎</button>`:''}
    </div>`).join('')}
  </div>`:''}
  ${unassigned.length?`
  <div class="budget-group">
    <div class="budget-group-head"><span>❔ Not Split Yet</span><span>${unassigned.length} item${unassigned.length!==1?'s':''}</span></div>
    ${unassigned.map(e=>`
    <div class="budget-line">
      <div class="budget-line-icon">${e.icon}</div>
      <div class="budget-line-body">
        <div class="budget-line-name">${esc(e.name)}</div>
        ${e.sub?`<div class="budget-line-sub">${esc(e.sub)}</div>`:''}
      </div>
      <div class="budget-line-amt">${formatCost(e.amt,cur)}</div>
      ${write&&canSplitKind(e.kind)?`<button class="btn sm ghost split-btn" onclick="modalSplit('${t.id}','${e.kind}','${e.id}')" title="Split this expense">💸</button>`:''}
    </div>`).join('')}
  </div>`:''}`;
}

/* ── Split editor: works on flights, stays, events and manual items ── */
const SPLIT_TABLES={flight:['wtn_flights','flights'],stay:['wtn_stays','stays'],event:['wtn_events','events'],budget:['wtn_budget_items','budgetItems']};
function modalSplit(tripId,kind,id){
  const t=TRIPS.find(x=>x.id===tripId);
  const [table,key]=SPLIT_TABLES[kind]||[];
  const row=(TD[tripId]?.[key]||[]).find(x=>x.id===id);
  if(!row){toast('Item not found');return;}
  const d0=TD[tripId]||{};
  const people=[{user_id:t?.owner_id,profile:d0.ownerProfile||{}},...(d0.members||[])]
    .map(m=>({id:m.user_id,name:m.profile?.name?.split(' ')[0]||m.profile?.email||'Member'}));
  const label=row.name||row.title||(row.from_airport?`${row.from_airport} → ${row.to_airport}`:'Expense');
  const amt=+row.cost||+row.actual||+row.planned||0;
  modal('💸 Split Expense',`
  <div style="display:flex;justify-content:space-between;align-items:center;background:var(--panel2);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;margin-bottom:16px">
    <span style="font-weight:600">${esc(label)}</span>
    <span style="color:var(--gold);font-weight:700">${formatCost(amt,row.currency||t?.currency||'$')}</span>
  </div>
  <div class="field"><label>Paid by</label>
    <select id="sp_paidby"><option value="">—</option>${people.map(p=>`<option value="${p.id}"${row.paid_by===p.id?' selected':''}>${esc(p.name)}</option>`).join('')}</select>
  </div>
  <div class="field"><label>Split between</label>
    <div style="display:flex;flex-wrap:wrap;gap:8px">
      ${people.map(p=>`<label style="display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--border2);border-radius:20px;padding:6px 12px;font-size:13px;cursor:pointer"><input type="checkbox" class="sp-split" value="${p.id}"${(row.split_with||[]).includes(p.id)?' checked':''} style="width:auto"> ${esc(p.name)}</label>`).join('')}
    </div>
    <button class="btn sm ghost" style="margin-top:8px" onclick="document.querySelectorAll('.sp-split').forEach(c=>c.checked=true)">Everyone</button>
  </div>
  <div class="modal-footer" style="margin:16px -22px -22px;border-radius:0 0 20px 20px">
    ${row.paid_by||row.split_with?.length?`<button class="btn danger" onclick="saveSplit('${tripId}','${kind}','${id}',true)">Remove split</button>`:''}
    <button class="btn ghost" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="saveSplit('${tripId}','${kind}','${id}')">Save Split</button>
  </div>`);
}
async function saveSplit(tripId,kind,id,clear){
  const [table]=SPLIT_TABLES[kind]||[];
  if(!table)return;
  let paid_by=null,split_with=null;
  if(!clear){
    paid_by=$('#sp_paidby').value||null;
    const sel=[...document.querySelectorAll('.sp-split:checked')].map(x=>x.value);
    split_with=sel.length?sel:null;
    if(paid_by&&!split_with){toast('Pick who shares this expense');return;}
    if(!paid_by&&split_with){toast('Pick who paid');return;}
  }
  const {error}=await DB.from(table).update({paid_by,split_with}).eq('id',id);
  if(error){toast('Could not save split');return;}
  closeModal();
  toast(clear?'Split removed':'🤝 Split saved ✓');
  await loadTripDetail(tripId);renderTab();
}

function modal(title,body){
  // Close on backdrop click — but only when the press also STARTED on the
  // backdrop, so dragging a text selection out of an input can't dismiss it
  document.getElementById('modalRoot').innerHTML=`
  <div class="modal-bg" onmousedown="this.dataset.downOnBg=String(event.target===this)" onclick="if(event.target===this&&this.dataset.downOnBg==='true')closeModal()">
    <div class="modal">
      <div class="modal-header"><h2>${title}</h2><button class="btn sm ghost" onclick="closeModal()">✕</button></div>
      <div class="modal-body">${body}</div>
    </div>
  </div>`;
}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}

// When a start-type date changes, pull the paired end date along if it's
// empty or now before the start (plusDays offsets, e.g. +1 night for stays)
function syncDate(srcEl,dstId,plusDays=0){
  const dst=document.getElementById(dstId);
  if(!dst||!srcEl.value)return;
  const d=new Date(srcEl.value+'T12:00:00');
  d.setDate(d.getDate()+plusDays);
  const target=d.toLocaleDateString('en-CA');
  if(!dst.value||dst.value<srcEl.value)dst.value=target;
}
// Same idea for times: fill the paired time when it's still empty
function syncTime(srcEl,dstId){
  const dst=document.getElementById(dstId);
  if(dst&&srcEl.value&&!dst.value)dst.value=srcEl.value;
}

async function inviteToTrip(tripId){
  const email=$('#inv_email').value.trim().toLowerCase();
  const role=$('#inv_role').value;
  if(!email){toast('Enter an email');return;}

  const {data:profile} = await DB.from('wtn_profiles').select('id,name,approved').eq('email',email).single();
  if(!profile){toast('No account found with that email. They need to sign up first.');return;}
  if(!profile.approved){toast('That person hasn\'t been approved yet.');return;}

  const {error} = await DB.from('wtn_trip_members').upsert({
    trip_id:tripId, user_id:profile.id, role, invited_by:ME.id
  },{onConflict:'trip_id,user_id'});

  if(error){toast('Error adding member');return;}
  toast(`${profile.name||email} added as ${role} ✓`);
  closeModal();
  await loadTripDetail(tripId);
  renderTab();
}

async function removeMember(tripId, userId){
  if(!confirm('Remove this person from the trip?'))return;
  await DB.from('wtn_trip_members').delete().eq('trip_id',tripId).eq('user_id',userId);
  toast('Removed');
  await loadTripDetail(tripId);
  renderTab();
}

async function updateMemberRole(tripId, userId, role){
  await DB.from('wtn_trip_members').update({role}).eq('trip_id',tripId).eq('user_id',userId);
  toast('Role updated');
  await loadTripDetail(tripId);
  renderTab();
}

  function mrow(m){
    const p=m.profile||{};

function selectGradient(i){
  window._editGradient=i;

function previewBanner(url){
  const box=document.getElementById('bannerPreviewBox');if(!box)return;
  if(url){box.style.backgroundImage=`url('${url}')`;box.style.display='block';}
  else{box.style.display='none';box.style.backgroundImage='';}
}
function clearBanner(){
  const inp=document.getElementById('t_banner_url');if(inp)inp.value='';
  previewBanner('');
}
function handleBannerUpload(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const maxW=1400,maxH=520;
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const url=canvas.toDataURL('image/jpeg',0.82);
      const inp=document.getElementById('t_banner_url');if(inp)inp.value=url;
      previewBanner(url);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

async function saveTrip(id){
  const name=$('#t_name').value.trim();if(!name){toast('Trip name is required');return;}
  const travelers=(window._editTravelers||[]).filter(t=>t.name.trim());
  const data={
    name,emoji:$('#t_emoji').value.trim(),destination:$('#t_dest').value.trim(),
    country:$('#t_country').value.trim(),start_date:$('#t_start').value||null,
    end_date:$('#t_end').value||null,currency:$('#t_currency').value,
    gradient_idx:window._editGradient||0,travelers,
    banner_url:$('#t_banner_url')?.value.trim()||null,
  };
  if(SCHEMA_V6){
    const pending=$('#t_dest_extra')?.value.trim();
    if(pending)addDestChip(); // don't lose a destination typed but not yet added
    data.destinations=window._editDests||[];
  }
  if(SCHEMA_V14){
    data.emergency_contacts=(window._editEmerg||[]).filter(c=>(c.name||'').trim()||(c.phone||'').trim());
  }
  if(SCHEMA_V15){
    const ins={provider:$('#t_ins_provider')?.value.trim()||'',policy:$('#t_ins_policy')?.value.trim()||'',phone:$('#t_ins_phone')?.value.trim()||''};
    data.insurance=(ins.provider||ins.policy||ins.phone)?ins:null;
  }
  if(id){
    await DB.from('wtn_trips').update(data).eq('id',id);
    const idx=TRIPS.findIndex(t=>t.id===id);
    if(idx>=0)Object.assign(TRIPS[idx],data);
    toast('Trip updated ✓');
  } else {
    const {data:newTrip,error} = await DB.from('wtn_trips').insert({...data,owner_id:ME.id}).select().single();
    if(error){toast('Error creating trip');return;}
    TRIPS.unshift(newTrip);
    toast('Trip created! 🎉');
  }
  closeModal();
  if(id&&CUR.tripId===id){renderTripShell();await loadTripDetail(id);renderTab();}
  else renderDashboard();
}

async function deleteTripConfirm(id){
  if(!confirm('Delete this trip and all its data?'))return;
  await DB.from('wtn_trips').delete().eq('id',id);
  TRIPS=TRIPS.filter(t=>t.id!==id);
  delete TD[id];
  closeModal();goHome();toast('Trip deleted');
}

function modalAddToDay(tripId,date){
