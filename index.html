let _notesTimer=null;
function debouncedSaveNotes(id,notes){
  clearTimeout(_notesTimer);
  _notesTimer=setTimeout(()=>DB.from('wtn_trips').update({notes}).eq('id',id),800);
}

/* ── Itinerary ── */
function itinAutoItems(d){
  // Returns a map of date -> [{sortTime, html}] from flights and stays
  const map={};
  function push(date,sortTime,html){
    if(!date)return;
    (map[date]=map[date]||[]).push({sortTime:sortTime||'00:00',html});
  }
  (d.flights||[]).forEach(f=>{
    const depLabel=f.airline?`${f.airline}${f.flight_num?' '+f.flight_num:''}`:'';
    const route=`${f.from_airport||'?'} → ${f.to_airport||'?'}`;
    if(f.depart_date){
      push(f.depart_date,f.depart_time,
        `<div class="tl-event"><div class="tl-dot" style="background:var(--blue)"></div>
        <div class="itin-auto itin-flight" onclick="setTab('flights')" style="cursor:pointer">
          <div class="itin-auto-icon">✈️</div>
          <div class="itin-auto-body">
            <div class="itin-auto-title">Depart · ${esc(route)}</div>
            <div class="itin-auto-meta">${f.depart_time?f.depart_time+' · ':''}${esc(depLabel)}</div>
          </div>
          <span class="itin-auto-tag tag-flight">FLIGHT ›</span>
        </div></div>`);
    }
    if(f.arrive_date){
      push(f.arrive_date,f.arrive_time,
        `<div class="tl-event"><div class="tl-dot" style="background:var(--cyan)"></div>
        <div class="itin-auto itin-flight" onclick="setTab('flights')" style="cursor:pointer">
          <div class="itin-auto-icon">🛬</div>
          <div class="itin-auto-body">
            <div class="itin-auto-title">Arrive · ${esc(route)}</div>
            <div class="itin-auto-meta">${f.arrive_time?f.arrive_time+' · ':''}${esc(depLabel)}</div>
          </div>
          <span class="itin-auto-tag tag-flight">FLIGHT ›</span>
        </div></div>`);
    }
  });
  (d.stays||[]).forEach(s=>{
    if(s.check_in){
      push(s.check_in,s.check_in_time||'00:00',
        `<div class="tl-event"><div class="tl-dot" style="background:var(--green)"></div>
        <div class="itin-auto itin-stay" onclick="setTab('stays')" style="cursor:pointer">
          <div class="itin-auto-icon">🏨</div>
          <div class="itin-auto-body">
            <div class="itin-auto-title">Check-in · ${esc(s.name||'Accommodation')}</div>
            <div class="itin-auto-meta">${s.check_in_time?s.check_in_time+' · ':''}${esc(s.city||s.address||'')}</div>
          </div>
          <span class="itin-auto-tag tag-stay">STAY ›</span>
        </div></div>`);
    }
    if(s.check_out){
      push(s.check_out,s.check_out_time||'23:59',
        `<div class="tl-event"><div class="tl-dot" style="background:var(--orange)"></div>
        <div class="itin-auto itin-stay" onclick="setTab('stays')" style="cursor:pointer">
          <div class="itin-auto-icon">🧳</div>
          <div class="itin-auto-body">
            <div class="itin-auto-title">Check-out · ${esc(s.name||'Accommodation')}</div>
            <div class="itin-auto-meta">${s.check_out_time?s.check_out_time+' · ':''}${esc(s.city||s.address||'')}</div>
          </div>
          <span class="itin-auto-tag tag-stay">STAY ›</span>
        </div></div>`);
    }
  });
  return map;
}

function toggleItinDay(date){
  if(ITIN_COLLAPSED.has(date))ITIN_COLLAPSED.delete(date);
  else ITIN_COLLAPSED.add(date);
  renderTab();
}
function toggleItinHideEmpty(){
  ITIN_HIDE_EMPTY=!ITIN_HIDE_EMPTY;
  renderTab();
}

function renderItinerary(t,d){
  const days=tripDays(t);
  if(!days.length)return`<div class="empty"><div class="icon">🗓</div><p>Set trip dates to see your day-by-day itinerary.</p></div>`;
  const write=canWrite(t);
  const dayColors=['#f5c542','#4a90e2','#34d399','#f472b6','#fb923c','#a78bfa','#22d3ee','#f87171','#67e8f9','#fde68a'];
  const autoMap=itinAutoItems(d);

  // Count totals for filter bar label
  let emptyCount=0;
  days.forEach(date=>{
    const evs=d.events.filter(e=>e.date===date);
    const auto=autoMap[date]||[];
    if(!evs.length&&!auto.length)emptyCount++;
  });

  return`<div>
    <div class="itin-filter-bar">
      <button class="btn sm ghost" onclick="toggleItinHideEmpty()" style="${ITIN_HIDE_EMPTY?'background:var(--border2);color:var(--text)':''}">
        ${ITIN_HIDE_EMPTY?'👁 Show all days':`🙈 Hide empty days${emptyCount?' ('+emptyCount+')':''}`}
      </button>
      <button class="btn sm ghost" onclick="exportICS('${t.id}')" title="Download .ics for Google/Apple Calendar">📅 Export to calendar</button>
    </div>
    ${days.map((date,idx)=>{
      const dayEvents=d.events.filter(e=>e.date===date).sort((a,b)=>(a.time||'23:59').localeCompare(b.time||'23:59'));
      const autoItems=(autoMap[date]||[]).sort((a,b)=>a.sortTime.localeCompare(b.sortTime));
      const totalItems=dayEvents.length+autoItems.length;
      if(ITIN_HIDE_EMPTY&&!totalItems)return'';
      const color=dayColors[idx%dayColors.length];
      const collapsed=ITIN_COLLAPSED.has(date);

      // Merge events and auto-items sorted by time
      const allItems=[];
      dayEvents.forEach(ev=>allItems.push({sortTime:ev.time||'23:59',html:eventCard(ev,write)}));
      autoItems.forEach(a=>allItems.push(a));
      allItems.sort((a,b)=>a.sortTime.localeCompare(b.sortTime));

      return`<div class="day-block">
        <div class="day-header" onclick="toggleItinDay('${date}')">
          <div class="day-label">
            <div class="day-num" style="background:${color}20;color:${color}">D${idx+1}</div>
            <div class="day-info">
              <h3>${fmtDay(date)}</h3>
              <div class="day-date">${totalItems} item${totalItems!==1?'s':''}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            ${write?`<button class="btn sm primary" onclick="event.stopPropagation();modalEvent('${t.id}','${date}')">＋ Add</button>`:''}
            <button class="day-collapse-btn ${collapsed?'collapsed':''}" onclick="event.stopPropagation();toggleItinDay('${date}')">▼</button>
          </div>
        </div>
        ${collapsed?'':`<div class="timeline">
          ${allItems.length?allItems.map(i=>i.html).join(''):`<div style="color:var(--dim);font-size:13px;padding:8px 0 16px">No items yet.</div>`}
        </div>`}
      </div>`;
    }).join('')}
    ${write?`<button class="btn primary" style="margin-top:8px" onclick="modalEvent('${t.id}')">＋ Add Event</button>`:''}
  </div>`;
}

function eventCard(ev,write){
  const cat=CATS[ev.category]||CATS.other;
  const q=esc([ev.title,ev.location].filter(Boolean).join(' '));
  return`<div class="tl-event">
    <div class="tl-dot ${cat.dot}"></div>
    <div class="event-card ${ev.confirmed?'confirmed':''}" onclick="${write?`modalEvent('${ev.trip_id}',null,null,'${ev.id}')`:''}" style="${write?'':'cursor:default'}">
      <div class="event-icon ${cat.cls}">${cat.icon}</div>
      <div class="event-body">
        <div class="event-title">${esc(ev.title)}</div>
        <div class="event-meta">
          ${ev.time?`<span>🕐 ${ev.time}${ev.duration?' · '+ev.duration+'m':''}</span>`:''}
          ${ev.location?`<span>📍 ${esc(ev.location)}</span>`:''}
          ${ev.confirmed?`<span style="color:var(--green)">✓ Confirmed</span>`:''}
        </div>
      </div>
      <div class="event-card-right">
        ${ev.cost?`<div class="event-cost">${formatCost(ev.cost,ev.currency)}</div>`:''}
        <button class="photo-btn" data-ev="${ev.id}" data-q="${q}" onclick="event.stopPropagation();openPhotoPanel(this)" title="Search photos &amp; Instagram">📸</button>
      </div>

}

/* ── Flights ── */
function flightLeg(f,label,cls){
  return`<div class="fl-leg ${cls}">
    <div class="fl-leg-label">${label}</div>
    <div class="fl-leg-route">
      <div class="fl-leg-point">
        <div class="fl-leg-code">${esc(f.from_airport||'—')}</div>
        ${f.depart_date?`<div class="fl-leg-time">${fmtShort(f.depart_date)}${f.depart_time?' · '+f.depart_time:''}</div>`:''}
      </div>
      <div class="fl-leg-arrow">→</div>
      <div class="fl-leg-point">
        <div class="fl-leg-code">${esc(f.to_airport||'—')}</div>
        ${f.arrive_date?`<div class="fl-leg-time">${fmtShort(f.arrive_date)}${f.arrive_time?' · '+f.arrive_time:''}</div>`:''}
      </div>
    </div>
  </div>`;
}

function renderFlights(t,d){
  const write=canWrite(t);
  if(!d.flights.length)return`<div>
    <div class="section-head"><h2>✈️ Flights</h2>${write?`<button class="btn primary" onclick="modalFlight('${t.id}')">＋ Add</button>`:''}</div>
    <div class="empty"><div class="icon">✈️</div><p>No flights added yet.</p></div>
  </div>`;

  // Auto-pair round trips (A→B + B→A)
  const used=new Set();
  const cards=[];
  d.flights.forEach((f,i)=>{
    if(used.has(i))return;
    const ri=d.flights.findIndex((r,j)=>j>i&&!used.has(j)&&
      f.from_airport&&f.to_airport&&r.from_airport&&r.to_airport&&
      r.from_airport===f.to_airport&&r.to_airport===f.from_airport);
    if(ri!==-1){cards.push({rt:true,out:f,ret:d.flights[ri]});used.add(i);used.add(ri);}
    else{cards.push({rt:false,f});used.add(i);}
  });

  return`<div>
    <div class="section-head"><h2>✈️ Flights</h2>${write?`<button class="btn primary" onclick="modalFlight('${t.id}')">＋ Add</button>`:''}</div>
    ${cards.map(c=>{
      if(c.rt){
        const {out,ret}=c;
        const bothConf=out.confirmed&&ret.confirmed;
        const eitherConf=out.confirmed||ret.confirmed;
        const totalCost=(out.cost||0)+(ret.cost||0);
        return`<div class="booking-card" style="cursor:default">
          <div class="booking-header">
            <div class="booking-icon cat-flight">✈️</div>
            <div class="flex1">
              <div class="booking-title">${esc(out.from_airport)} ⇄ ${esc(out.to_airport)}</div>
              <div class="booking-sub">${esc(out.airline||'')}${out.flight_num?' · '+esc(out.flight_num):''}${ret.flight_num?' / '+esc(ret.flight_num):''}</div>
            </div>
            <span class="conf-badge ${bothConf?'confirmed':eitherConf?'partial':'pending'}">${bothConf?'CONFIRMED':eitherConf?'PARTIAL':'PENDING'}</span>
          </div>
          <div class="fl-legs">
            ${flightLeg(out,'OUT','')}
            ${flightLeg(ret,'RET','fl-leg-ret')}
          </div>
          ${(out.seat||ret.seat||out.confirm_num||totalCost||out.terminal)?`
          <div class="booking-detail-grid">
            ${out.seat?`<div class="booking-detail"><div class="bd-label">Seat (out)</div><div class="bd-val">${esc(out.seat)}</div></div>`:''}
            ${ret.seat?`<div class="booking-detail"><div class="bd-label">Seat (ret)</div><div class="bd-val">${esc(ret.seat)}</div></div>`:''}
            ${out.terminal?`<div class="booking-detail"><div class="bd-label">Terminal</div><div class="bd-val">${esc(out.terminal)}</div></div>`:''}
            ${out.confirm_num?`<div class="booking-detail"><div class="bd-label">Confirmation</div><div class="bd-val">${esc(out.confirm_num)}</div></div>`:''}
            ${totalCost?`<div class="booking-detail"><div class="bd-label">Total Cost</div><div class="bd-val" style="color:var(--gold)">${formatCost(totalCost,t.currency)}</div></div>`:''}
          </div>`:''}
          ${write?`<div style="display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">
            <button class="btn sm ghost" onclick="modalFlight('${t.id}','${out.id}')">✎ Edit Outbound</button>
            <button class="btn sm ghost" onclick="modalFlight('${t.id}','${ret.id}')">✎ Edit Return</button>
          </div>`:''}
        </div>`;
      } else {
        const f=c.f;
        return`<div class="booking-card" onclick="${write?`modalFlight('${t.id}','${f.id}')`:''}" style="${write?'':'cursor:default'}">
          <div class="booking-header">
            <div class="booking-icon cat-flight">✈️</div>
            <div class="flex1">
              <div class="booking-title">${esc(f.from_airport||'')} → ${esc(f.to_airport||'')}</div>
              <div class="booking-sub">${esc(f.airline||'')}${f.flight_num?' · '+esc(f.flight_num):''}</div>
            </div>
            <span class="conf-badge ${f.confirmed?'confirmed':'pending'}">${f.confirmed?'CONFIRMED':'PENDING'}</span>
          </div>
          <div class="fl-legs">${flightLeg(f,'','')}</div>
          <div class="booking-detail-grid">
            ${f.seat?`<div class="booking-detail"><div class="bd-label">Seat</div><div class="bd-val">${esc(f.seat)}</div></div>`:''}
            ${f.terminal?`<div class="booking-detail"><div class="bd-label">Terminal/Gate</div><div class="bd-val">${esc(f.terminal)}</div></div>`:''}
            ${f.confirm_num?`<div class="booking-detail"><div class="bd-label">Confirmation</div><div class="bd-val">${esc(f.confirm_num)}</div></div>`:''}
            ${f.cost?`<div class="booking-detail"><div class="bd-label">Cost</div><div class="bd-val" style="color:var(--gold)">${formatCost(f.cost,t.currency)}</div></div>`:''}
          </div>
        </div>`;
      }
    }).join('')}
  </div>`;
}

          <div class="pack-progress"><div class="pack-progress-fill" style="width:${catItems.length?Math.round(catPacked/catItems.length*100):0}%"></div></div>
          ${write?`<button class="pack-cat-add" onclick="showPackQuickAdd('${qid}')" title="Add to ${esc(cat)}">＋</button>`:''}
        </div>
        ${write?`<div class="pack-quick-add hidden" id="${qid}"><input class="pack-quick-input" data-trip="${t.id}" data-cat="${esc(cat)}" placeholder="Item name — press Enter to add…" onkeydown="packQuickKey(event,this)"></div>`:''}
        ${catItems.map(item=>`
        <div class="pack-item ${item.packed?'packed':''}" onclick="${write?`togglePack('${t.id}','${item.id}',${!item.packed})`:''}" style="${write?'':'cursor:default'}">
          <div class="pack-check">${item.packed?'✓':''}</div>
          <div class="pack-name">${esc(item.name)}</div>

}

/* ── Budget ── */
/* Every expense on the trip, normalized: flights/stays/events (auto) +
   manual budget items, each with its split info when the schema has it. */
function collectExpenses(t,d,disp){
  const cur=t.currency||'$';
  disp=disp||cur;
  const miniCats={food:'🍽️',activity:'🎯',transport:'🚗',shopping:'🛍️',other:'📌'};
  // Auto items (flights/stays/events) are assumed to be in the trip currency;
  // manual items carry their own. Everything is converted to `disp`.
  const conv=(raw,from)=>{const c=convToTrip(+raw,from,disp);return c===null?+raw:c;};
  const ex=[];
  (d.flights||[]).forEach(f=>{
    if(!f.cost)return;
    ex.push({kind:'flight',id:f.id,icon:'✈️',name:f.from_airport&&f.to_airport?`${f.from_airport} → ${f.to_airport}`:(f.airline||'Flight'),sub:f.airline||'',amt:conv(f.cost,cur),confirmed:!!f.confirmed,manual:false,paid_by:f.paid_by,split_with:f.split_with});
  });
  (d.stays||[]).forEach(s=>{
    if(!s.cost)return;
    ex.push({kind:'stay',id:s.id,icon:'🏨',name:s.name||'Accommodation',sub:s.city||'',amt:conv(s.cost,cur),confirmed:!!s.confirmed,manual:false,paid_by:s.paid_by,split_with:s.split_with});
  });
  (d.events||[]).forEach(ev=>{
    if(!ev.cost)return;
    ex.push({kind:'event',id:ev.id,icon:miniCats[ev.category]||'📌',name:ev.title||'Activity',sub:ev.location||'',amt:conv(ev.cost,cur),confirmed:!!ev.confirmed,manual:false,paid_by:ev.paid_by,split_with:ev.split_with});
  });
  (d.budgetItems||[]).forEach(b=>{
    ex.push({kind:'budget',id:b.id,icon:'📋',name:b.name,sub:b.category||'',amt:conv(+b.actual||+b.planned||0,b.currency||cur),confirmed:true,manual:true,paid_by:b.paid_by,split_with:b.split_with});
  });
  return ex;
}
function canSplitKind(kind){return kind==='budget'?!!SCHEMA_V2:!!SCHEMA_V3;}

let BUDGET_VIEW='items';
function setBudgetView(v){BUDGET_VIEW=v;renderTab();}
// Display currency for the Budget tab (view-level conversion; stored data is untouched).
// Rates come from frankfurter.dev (ECB reference rates, updated every business day)
// and are fetched fresh each session.
let BUDGET_DISP_CUR=null;
function setBudgetCur(v){
  const t=TRIPS.find(x=>x.id===CUR.tripId);
  BUDGET_DISP_CUR=v===(t?.currency||'$')?null:v;
  ensureRates(v).then(()=>{if(CUR.tab==='budget')renderTab();});
  renderTab();
}

function settleUpHtml(shared,nameOf,cur){
  const bal={};
  shared.forEach(b=>{
    bal[b.paid_by]=(bal[b.paid_by]||0)+b.amt;
    const share=b.amt/b.split_with.length;
    b.split_with.forEach(u=>{bal[u]=(bal[u]||0)-share;});
  });
  const D=Object.entries(bal).filter(([,v])=>v<-0.01).sort((a,b)=>a[1]-b[1]).map(([u,v])=>[u,-v]);
  const C=Object.entries(bal).filter(([,v])=>v>0.01).sort((a,b)=>b[1]-a[1]).map(([u,v])=>[u,v]);
  const lines=[];
  let i=0,j=0;
  while(i<D.length&&j<C.length){
    const pay=Math.min(D[i][1],C[j][1]);
    lines.push(`<div class="today-row"><span>💸</span><span><b>${esc(nameOf[D[i][0]]||'?')}</b> owes <b>${esc(nameOf[C[j][0]]||'?')}</b></span><span style="margin-left:auto;color:var(--gold);font-weight:700">${formatCost(Math.round(pay*100)/100,cur)}</span></div>`);
    D[i][1]-=pay;C[j][1]-=pay;
    if(D[i][1]<0.01)i++;
    if(C[j][1]<0.01)j++;
  }
  return {lines,bal};
}
function memberNames(t,d){
  const nameOf={};
  [{user_id:t.owner_id,profile:d.ownerProfile},...(d.members||[])].forEach(m=>{
    const p=m.profile||{};nameOf[m.user_id]=p.name?.split(' ')[0]||p.email||'Someone';
  });
  return nameOf;
}

function renderBudget(t,d){
  const write=canWrite(t);
  const cur=t.currency||'$';
  const disp=BUDGET_DISP_CUR||cur;
  const expenses=collectExpenses(t,d,disp);
  const nameOf=memberNames(t,d);

  const subTabs=`
  <div style="display:flex;gap:6px;margin-bottom:16px;align-items:center;flex-wrap:wrap">
    <button class="btn sm ${BUDGET_VIEW!=='splits'?'primary':'ghost'}" onclick="setBudgetView('items')">💰 Budget</button>
    <button class="btn sm ${BUDGET_VIEW==='splits'?'primary':'ghost'}" onclick="setBudgetView('splits')">🤝 Splits</button>
    <span style="margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)">💱 Show in
      <select onchange="setBudgetCur(this.value)" style="width:auto;padding:5px 8px;font-size:12px">
        ${CURRENCIES.map(c=>`<option${c===disp?' selected':''}>${c}</option>`).join('')}
      </select>
    </span>
  </div>
  ${disp!==cur?`<p style="font-size:12px;color:var(--dim);margin:-8px 0 14px">Amounts converted from ${esc(cur)} at today's ECB reference rate — the stored values are unchanged.</p>`:''}`;

  if(BUDGET_VIEW==='splits')return`<div>
    <div class="section-head"><h2>💰 Budget</h2></div>
    ${subTabs}
    ${renderSplits(t,d,expenses,nameOf,write)}
  </div>`;

  const autoConf=expenses.filter(e=>!e.manual&&e.confirmed);
  const autoPot=expenses.filter(e=>!e.manual&&!e.confirmed);
  const confTotal=autoConf.reduce((a,x)=>a+x.amt,0);
  const potTotal=autoPot.reduce((a,x)=>a+x.amt,0);
  const manualItems=d.budgetItems||[];
  const itemAmt=b=>{
    const raw=+b.actual||+b.planned||0;
    const c=convToTrip(raw,b.currency||cur,disp);
    return c===null?raw:c;
  };
  const manualTotal=manualItems.reduce((a,b)=>a+itemAmt(b),0);
  const grandTotal=confTotal+potTotal+manualTotal;

  // Compact settle-up summary at the bottom of the main budget view
  const shared=expenses.filter(e=>e.paid_by&&Array.isArray(e.split_with)&&e.split_with.length&&e.amt);
  let settleHtml='';
  if(shared.length){
    const {lines}=settleUpHtml(shared,nameOf,disp);
    settleHtml=`<div class="budget-group">
      <div class="budget-group-head"><span>🤝 Settle Up</span><button class="btn sm ghost" onclick="setBudgetView('splits')" style="font-size:11px">View splits →</button></div>
      ${lines.length?lines.join(''):'<p class="muted" style="font-size:13px">All square! 🎉</p>'}
    </div>`;
  }

  function budgetLine(item){
    const splittable=write&&canSplitKind(item.kind);
    return`<div class="budget-line">
      <div class="budget-line-icon">${item.icon}</div>
      <div class="budget-line-body">
        <div class="budget-line-name">${esc(item.name)}</div>
        <div class="budget-line-sub">${esc(item.sub||'')}${item.paid_by&&item.split_with?.length?`${item.sub?' · ':''}🤝 ${esc(nameOf[item.paid_by]||'?')} paid, split ${item.split_with.length} way${item.split_with.length!==1?'s':''}`:''}</div>
      </div>
      <div class="budget-line-amt">${formatCost(Math.round(item.amt*100)/100,disp)}</div>
      ${splittable?`<button class="btn sm ghost split-btn" onclick="modalSplit('${t.id}','${item.kind}','${item.id}')" title="Split this expense">💸</button>`:''}
    </div>`;
  }

  // Two-tone progress bar: green=confirmed, orange=potential
  const barTotal=confTotal+potTotal+manualTotal;
  const confPct=barTotal?Math.round(confTotal/barTotal*100):0;
  const potPct=barTotal?Math.round((potTotal+manualTotal)/barTotal*100):0;

  const hasAny=autoConf.length||autoPot.length||manualItems.length;

  return`<div>
    <div class="section-head"><h2>💰 Budget</h2>${write?`<button class="btn primary" onclick="modalBudgetItem('${t.id}')">＋ Add Manual</button>`:''}</div>
    ${subTabs}
    ${hasAny?`
    <div class="budget-summary">
      <div class="budget-stat"><div class="bv" style="color:var(--green)">${formatCost(Math.round(confTotal),disp)}</div><div class="bl">Confirmed</div></div>
      <div class="budget-stat"><div class="bv" style="color:var(--orange)">${formatCost(Math.round(potTotal),disp)}</div><div class="bl">Potential</div></div>
      <div class="budget-stat"><div class="bv" style="color:var(--gold)">${formatCost(Math.round(grandTotal),disp)}</div><div class="bl">Grand Total</div></div>
    </div>
    <div style="height:8px;background:var(--border);border-radius:4px;margin-bottom:24px;overflow:hidden;display:flex">
      <div style="height:100%;width:${confPct}%;background:var(--green);border-radius:4px 0 0 4px;transition:width .4s"></div>
      <div style="height:100%;width:${potPct}%;background:var(--orange);transition:width .4s"></div>
    </div>
    ${autoConf.length?`
    <div class="budget-group">
      <div class="budget-group-head bg-conf"><span>✓ Confirmed</span><span>${formatCost(Math.round(confTotal),disp)}</span></div>
      ${autoConf.map(budgetLine).join('')}
    </div>`:''}
    ${autoPot.length?`
    <div class="budget-group">
      <div class="budget-group-head bg-pot"><span>◷ Potential</span><span>${formatCost(Math.round(potTotal),disp)}</span></div>
      ${autoPot.map(budgetLine).join('')}
    </div>`:''}
    ${manualItems.length?`
    <div class="budget-group">
      <div class="budget-group-head"><span>📋 Manual Items</span><span>${formatCost(Math.round(manualTotal),disp)}</span></div>
      ${manualItems.map(item=>`
      <div class="budget-item" onclick="${write?`modalBudgetItem('${t.id}','${item.id}')`:''}" style="${write?'':'cursor:default'}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px">
          <span style="font-weight:600;font-size:14px">${esc(item.name)}</span>
          <span style="display:flex;align-items:center;gap:8px">
            ${item.notes?`<span class="muted" style="font-size:12px">${esc(item.notes)}</span>`:''}
            ${write&&SCHEMA_V2?`<button class="btn sm ghost split-btn" onclick="event.stopPropagation();modalSplit('${t.id}','budget','${item.id}')" title="Split this expense">💸</button>`:''}
          </span>
        </div>
        <div style="display:flex;gap:16px;font-size:13px;flex-wrap:wrap">
          <span style="color:var(--muted)">Budget: ${formatCost(item.planned,item.currency||cur)}</span>
          ${item.actual?`<span style="font-weight:600;color:${+item.actual>+item.planned?'var(--coral)':'var(--green)'}">Actual: ${formatCost(item.actual,item.currency||cur)}</span>`:'<span class="muted">Not spent yet</span>'}
          ${(item.currency||cur)!==disp&&convToTrip(+item.actual||+item.planned||0,item.currency||cur,disp)!==null?`<span style="color:var(--dim)">≈ ${formatCost(Math.round(convToTrip(+item.actual||+item.planned||0,item.currency||cur,disp)),disp)}</span>`:''}
          ${item.paid_by&&item.split_with?.length?`<span style="color:var(--cyan)">🤝 ${esc(nameOf[item.paid_by]||'?')} paid · split ${item.split_with.length} way${item.split_with.length!==1?'s':''}</span>`:''}
        </div>
        ${item.planned?`<div class="budget-bar"><div class="budget-bar-fill" style="width:${item.actual?Math.min(100,Math.round(item.actual/item.planned*100)):0}%;background:${+item.actual>+item.planned?'var(--coral)':'var(--green)'}"></div></div>`:''}
      </div>`).join('')}
    </div>`:''}
    ${settleHtml}`
    :`<div class="empty"><div class="icon">💰</div><p>Costs added to flights, stays &amp; activities will appear here automatically.</p></div>`}
  </div>`;
}

/* ── Splits view: itemized receipt + per-person totals + settle up ── */
function renderSplits(t,d,expenses,nameOf,write){
  const cur=BUDGET_DISP_CUR||t.currency||'$'; // expenses are already converted to this
  const migrateHint=(!SCHEMA_V3&&isAdmin())?`<div class="card" style="font-size:13px;color:var(--muted);margin-bottom:16px">🤝 To split flights, stays and activities (not just manual items), run <b>supabase/migration_v3.sql</b> in the Supabase SQL editor.</div>`:'';
  const shared=expenses.filter(e=>e.paid_by&&Array.isArray(e.split_with)&&e.split_with.length&&e.amt);
  const unassigned=expenses.filter(e=>e.amt&&!(e.paid_by&&e.split_with?.length));
  if(!shared.length&&!unassigned.length)return migrateHint+`<div class="empty"><div class="icon">🤝</div><p>No expenses yet — add costs to flights, stays, activities or manual items, then split them here.</p></div>`;

  const {lines}=settleUpHtml(shared,nameOf,cur);

  // Per-person totals
  const paid={},share={};
  shared.forEach(e=>{
    paid[e.paid_by]=(paid[e.paid_by]||0)+e.amt;
    e.split_with.forEach(u=>{share[u]=(share[u]||0)+e.amt/e.split_with.length;});
  });
  const people=[...new Set([...Object.keys(paid),...Object.keys(share)])];
  const sharedTotal=shared.reduce((a,e)=>a+e.amt,0);

  return`
  ${migrateHint}
  ${shared.length?`
  <div class="budget-group">
    <div class="budget-group-head"><span>🤝 Settle Up</span><span>${shared.length} shared</span></div>
    ${lines.length?lines.join(''):'<p class="muted" style="font-size:13px">All square! 🎉</p>'}
  </div>
  <div class="budget-group">
    <div class="budget-group-head"><span>👥 Per Person</span><span>${formatCost(Math.round(sharedTotal),cur)} shared</span></div>
    ${people.map(u=>{
      const p=paid[u]||0,s=share[u]||0,net=p-s;
      return`<div class="budget-line">
        <div class="budget-line-icon">${(nameOf[u]||'?')[0].toUpperCase()}</div>
        <div class="budget-line-body">
          <div class="budget-line-name">${esc(nameOf[u]||'Someone')}</div>
          <div class="budget-line-sub">paid ${formatCost(Math.round(p*100)/100,cur)} · share ${formatCost(Math.round(s*100)/100,cur)}</div>
        </div>
        <div class="budget-line-amt" style="color:${net>0.01?'var(--green)':net<-0.01?'var(--coral)':'var(--muted)'}">${net>0.01?'+':''}${formatCost(Math.round(net*100)/100,cur)}</div>
      </div>`;
    }).join('')}
  </div>
  <div class="budget-group">
    <div class="budget-group-head"><span>🧾 Itemized Receipt</span><span>${formatCost(Math.round(sharedTotal),cur)}</span></div>
    ${shared.map(e=>`
    <div class="budget-line">
      <div class="budget-line-icon">${e.icon}</div>
      <div class="budget-line-body">
        <div class="budget-line-name">${esc(e.name)}</div>
        <div class="budget-line-sub">${esc(nameOf[e.paid_by]||'?')} paid · ${e.split_with.map(u=>esc(nameOf[u]||'?')).join(', ')} — ${formatCost(Math.round(e.amt/e.split_with.length*100)/100,cur)} each</div>
      </div>
      <div class="budget-line-amt">${formatCost(e.amt,cur)}</div>
      ${write&&canSplitKind(e.kind)?`<button class="btn sm ghost split-btn" onclick="modalSplit('${t.id}','${e.kind}','${e.id}')" title="Edit split">✎</button>`:''}
    </div>`).join('')}
  </div>`:''}
  ${unassigned.length?`
  <div class="budget-group">
    <div class="budget-group-head"><span>❔ Not Split Yet</span><span>${unassigned.length} item${unassigned.length!==1?'s':''}</span></div>
    ${unassigned.map(e=>`
    <div class="budget-line">
      <div class="budget-line-icon">${e.icon}</div>
      <div class="budget-line-body">
        <div class="budget-line-name">${esc(e.name)}</div>
        ${e.sub?`<div class="budget-line-sub">${esc(e.sub)}</div>`:''}
      </div>
      <div class="budget-line-amt">${formatCost(e.amt,cur)}</div>
      ${write&&canSplitKind(e.kind)?`<button class="btn sm ghost split-btn" onclick="modalSplit('${t.id}','${e.kind}','${e.id}')" title="Split this expense">💸</button>`:''}
    </div>`).join('')}
  </div>`:''}`;
}

/* ── Split editor: works on flights, stays, events and manual items ── */
const SPLIT_TABLES={flight:['wtn_flights','flights'],stay:['wtn_stays','stays'],event:['wtn_events','events'],budget:['wtn_budget_items','budgetItems']};
function modalSplit(tripId,kind,id){
  const t=TRIPS.find(x=>x.id===tripId);
  const [table,key]=SPLIT_TABLES[kind]||[];
  const row=(TD[tripId]?.[key]||[]).find(x=>x.id===id);
  if(!row){toast('Item not found');return;}
  const d0=TD[tripId]||{};
  const people=[{user_id:t?.owner_id,profile:d0.ownerProfile||{}},...(d0.members||[])]
    .map(m=>({id:m.user_id,name:m.profile?.name?.split(' ')[0]||m.profile?.email||'Member'}));
  const label=row.name||row.title||(row.from_airport?`${row.from_airport} → ${row.to_airport}`:'Expense');
  const amt=+row.cost||+row.actual||+row.planned||0;
  modal('💸 Split Expense',`
  <div style="display:flex;justify-content:space-between;align-items:center;background:var(--panel2);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;margin-bottom:16px">
    <span style="font-weight:600">${esc(label)}</span>
    <span style="color:var(--gold);font-weight:700">${formatCost(amt,row.currency||t?.currency||'$')}</span>
  </div>
  <div class="field"><label>Paid by</label>
    <select id="sp_paidby"><option value="">—</option>${people.map(p=>`<option value="${p.id}"${row.paid_by===p.id?' selected':''}>${esc(p.name)}</option>`).join('')}</select>
  </div>
  <div class="field"><label>Split between</label>
    <div style="display:flex;flex-wrap:wrap;gap:8px">
      ${people.map(p=>`<label style="display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--border2);border-radius:20px;padding:6px 12px;font-size:13px;cursor:pointer"><input type="checkbox" class="sp-split" value="${p.id}"${(row.split_with||[]).includes(p.id)?' checked':''} style="width:auto"> ${esc(p.name)}</label>`).join('')}
    </div>
    <button class="btn sm ghost" style="margin-top:8px" onclick="document.querySelectorAll('.sp-split').forEach(c=>c.checked=true)">Everyone</button>
  </div>
  <div class="modal-footer" style="margin:16px -22px -22px;border-radius:0 0 20px 20px">
    ${row.paid_by||row.split_with?.length?`<button class="btn danger" onclick="saveSplit('${tripId}','${kind}','${id}',true)">Remove split</button>`:''}
    <button class="btn ghost" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="saveSplit('${tripId}','${kind}','${id}')">Save Split</button>
  </div>`);
}
async function saveSplit(tripId,kind,id,clear){
  const [table]=SPLIT_TABLES[kind]||[];
  if(!table)return;
  let paid_by=null,split_with=null;
  if(!clear){
    paid_by=$('#sp_paidby').value||null;
    const sel=[...document.querySelectorAll('.sp-split:checked')].map(x=>x.value);
    split_with=sel.length?sel:null;
    if(paid_by&&!split_with){toast('Pick who shares this expense');return;}
    if(!paid_by&&split_with){toast('Pick who paid');return;}
  }
  const {error}=await DB.from(table).update({paid_by,split_with}).eq('id',id);
  if(error){toast('Could not save split');return;}
  closeModal();

function setPrintAll(val){

async function executePrint(){
  const t=TRIPS.find(x=>x.id===CUR.tripId);
  if(!t)return;
  const d=TD[t.id]||{events:[],flights:[],stays:[],packItems:[],budgetItems:[],members:[],travelers:[]};
  const selected=[...document.querySelectorAll('.print-cb:checked')].map(cb=>cb.value);
  if(!selected.length){toast('Select at least one section');return;}
  closeModal();

  const renderFn={
    overview:  ()=>renderOverview(t,d),
    itinerary: ()=>renderItinerary(t,d),
    flights:   ()=>renderFlights(t,d),
    stays:     ()=>renderStays(t,d),
    activities:()=>renderActivities(t,d),
    packing:   ()=>renderPacking(t,d),
    budget:    ()=>renderBudget(t,d),
  };

  const sections=selected.map((id,i)=>{
    const tab=PRINT_TABS.find(tb=>tb.id===id);
    return`<div class="pv-section${i>0?' pv-page-break':''}">
      <div class="pv-section-title">${tab?.icon||''} ${tab?.label||id}</div>
      ${renderFn[id]?.()??''}
    </div>`;
  }).join('');

  const pv=document.getElementById('printView');
  pv.innerHTML=`
    <div class="pv-header">
      <h1>${esc(t.name)}</h1>
      <p>📍 ${esc(t.destination||'')}${t.country?' · '+esc(t.country):''}${t.start_date?' &nbsp;·&nbsp; 📅 '+fmt(t.start_date)+(t.end_date?' → '+fmt(t.end_date):''):''}</p>
    </div>
    ${sections}`;

  await new Promise(r=>requestAnimationFrame(r));
  window.print();
}

function selectGradient(i){
  window._editGradient=i;
  $$('#gpicker .gp-swatch').forEach(s=>s.classList.toggle('sel',+s.dataset.idx===i));
}
function previewBanner(url){
  const box=document.getElementById('bannerPreviewBox');if(!box)return;
  if(url){box.style.backgroundImage=`url('${url}')`;box.style.display='block';}
  else{box.style.display='none';box.style.backgroundImage='';}
}
function clearBanner(){
  const inp=document.getElementById('t_banner_url');if(inp)inp.value='';
  previewBanner('');
}
function handleBannerUpload(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const maxW=1400,maxH=520;
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const url=canvas.toDataURL('image/jpeg',0.82);
      const inp=document.getElementById('t_banner_url');if(inp)inp.value=url;
      previewBanner(url);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function addTraveler(){
  window._editTravelers=window._editTravelers||[];
  const i=window._editTravelers.length;
  window._editTravelers.push({name:'',role:''});

  const rows=[];
  tpl.lists.forEach(({cat,items})=>items.forEach(name=>{
    if(!existing.has(name.toLowerCase()))rows.push({trip_id:tripId,name,category:cat,qty:1,packed:false});
  }));
  if(!rows.length){toast('All of those items are already on your list');return;}
  const {error}=await DB.from('wtn_pack_items').insert(rows);
  if(error){toast('Could not add items');return;}
  closeModal();
  toast(`${tpl.icon} ${rows.length} items added ✓`);
  await loadTripDetail(tripId);renderTab();
}
async function seedPackItems(tripId){modalPackTemplates(tripId);}

/* ── Documents vault (requires migration_v2) ── */
async function uploadTripDoc(tripId,input){
  const file=input.files&&input.files[0];
  input.value='';
  if(!file)return;
  if(file.size>10*1048576){toast('Max file size is 10 MB');return;}
  toast('Uploading…');
  const safe=(file.name||'file').replace(/[^\w.\- ()]+/g,'').slice(-80)||'file';
  const path=`${tripId}/${crypto.randomUUID()}-${safe}`;
  const {error:upErr}=await DB.storage.from('wtn-docs').upload(path,file,{contentType:file.type||'application/octet-stream'});
  if(upErr){toast('Upload failed: '+(upErr.message||'storage error'));return;}
  const {error:dbErr}=await DB.from('wtn_trip_docs').insert({trip_id:tripId,name:file.name,path,mime:file.type||null,size:file.size,uploaded_by:ME?.id});
  if(dbErr){await DB.storage.from('wtn-docs').remove([path]);toast('Upload failed');return;}
  toast('📎 Uploaded ✓');
  await loadTripDetail(tripId);renderTab();
}
async function openTripDoc(path){
  const {data}=await DB.storage.from('wtn-docs').createSignedUrl(path,3600);
  if(data?.signedUrl)window.open(data.signedUrl,'_blank');
  else toast('Could not open file');
}
async function deleteTripDoc(tripId,id,path){
  await DB.from('wtn_trip_docs').delete().eq('id',id);
  await DB.storage.from('wtn-docs').remove([path]);
  toast('Document deleted');
  await loadTripDetail(tripId);renderTab();
}

function renderTravelers(t,d){
  const travelers=d.travelers||[];

    const fields=[tv.passport_number,tv.passport_expiry,tv.passport_country,tv.nationality,tv.date_of_birth,tv.emergency_contact_name,tv.emergency_contact_phone];
    const filled=fields.filter(Boolean).length;
    if(filled===fields.length)return{label:'Complete',cls:'complete'};
    if(filled>0)return{label:'Partial',cls:'partial'};
    return{label:'No docs',cls:'empty'};
  }
  function expiryWarn(dateStr){
    if(!dateStr)return null;
    const d=new Date(dateStr),now=new Date();

    if(months<0)return'warn';
    if(months<6)return'warn';
    return'ok';

        ${tv.visa_type||tv.visa_expiry?`
        <div class="traveler-section-head">Visa</div>
        <div class="traveler-field"><span class="traveler-field-icon">📋</span><div class="traveler-field-body"><div class="traveler-field-label">Visa Type</div><div class="traveler-field-val">${esc(tv.visa_type||'—')}</div></div></div>
        <div class="traveler-field"><span class="traveler-field-icon">📅</span><div class="traveler-field-body"><div class="traveler-field-label">Visa Expiry</div><div class="traveler-field-val${vExp?' '+vExp:''}">${fmtDate(tv.visa_expiry)}${vExp==='warn'?' ⚠️':vExp==='ok'?' ✓':''}</div></div></div>

    </div>
    ${travelers.length
      ?`<div class="traveler-grid">${travelers.map(travCard).join('')}</div>`

/* ═══════════════════════════════════════════════
   PHOTO PANEL (Unsplash + Instagram)
═══════════════════════════════════════════════ */
async function openPhotoPanel(btn){
  const evId=btn.dataset.ev;
  const query=btn.dataset.q;
  const panel=document.getElementById('evp_'+evId);
  if(!panel)return;

  // toggle off
  if(!panel.classList.contains('hidden')){
    panel.classList.add('hidden');
    btn.classList.remove('active');
    return;
  }

  btn.classList.add('active');
  panel.classList.remove('hidden');

  // already fetched
  if(panel.dataset.loaded)return;

  const igUrl=`https://www.instagram.com/explore/search/keyword/?q=${encodeURIComponent(query)}`;
  const igBtn=`<a class="photo-strip-ig" href="${igUrl}" target="_blank" rel="noopener noreferrer">📷<br>Instagram</a>`;

  if(!UNSPLASH_KEY){
    panel.innerHTML=`<div class="photo-strip">${igBtn}</div><div class="photo-credit">Add a free <a href="https://unsplash.com/developers" target="_blank" rel="noopener">Unsplash API key</a> to see inline photos</div>`;
    panel.dataset.loaded='1';
    return;
  }

  panel.innerHTML=`<div class="photo-strip"><div style="color:var(--dim);font-size:12px;padding:8px 0">Loading…</div></div>`;

  try{
    const r=await fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=10&orientation=landscape&client_id=${UNSPLASH_KEY}`);
    if(!r.ok)throw new Error(r.status);
    const j=await r.json();
    const photos=j.results||[];
    const imgs=photos.map(p=>
      `<a href="${p.links.html}?utm_source=wheretonext&utm_medium=referral" target="_blank" rel="noopener noreferrer" title="Photo by ${esc(p.user.name)} on Unsplash">
        <img class="photo-strip-img" src="${p.urls.small}" alt="" loading="lazy" decoding="async" onload="this.classList.add('loaded')">
      </a>`
    ).join('');
    panel.innerHTML=`<div class="photo-strip">${imgs}${igBtn}</div><div class="photo-credit">Photos via <a href="https://unsplash.com?utm_source=wheretonext&utm_medium=referral" target="_blank" rel="noopener">Unsplash</a></div>`;
    panel.dataset.loaded='1';
  }catch(e){
    panel.innerHTML=`<div class="photo-strip">${igBtn}</div>`;
    panel.dataset.loaded='1';
  }
}

window.addEventListener('beforeinstallprompt', e => {

async function installPWA(){

  const {outcome} = await PWA_PROMPT.userChoice;
  PWA_PROMPT = null;
  renderAuthHeader();
  if(outcome==='accepted')toast('Installing… check your home screen ✓');
}

if('serviceWorker' in navigator){
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(refreshing)return;
    refreshing=true;
    window.location.reload();
  });

  navigator.serviceWorker.register('/sw.js').then(reg=>{
    // Force an immediate update check on every page load.
    // Without this, browsers can delay the check by up to 24 hours,
    // keeping an old (potentially broken) SW in control.
    reg.update().catch(()=>{});
  }).catch(()=>{});

  // Safety net: if the page looks blank 4 seconds after load and a SW
  // is still controlling, the old SW likely served stale broken content.
  // Unregister it so the next load goes straight to the network.
  setTimeout(async()=>{
    if(!navigator.serviceWorker.controller)return;
    const root=document.getElementById('root');
    if(root&&root.innerHTML.trim().length<30){
      const reg=await navigator.serviceWorker.getRegistration().catch(()=>null);
      if(reg)await reg.unregister().catch(()=>{});
      window.location.reload();
    }
  },4000);
}

/* ═══════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════ */
// DOMContentLoaded fires after blocking scripts (Supabase CDN) are parsed,
// but before images and fonts — starts auth check much sooner than window.load.
document.addEventListener('DOMContentLoaded',initApp);
</script>
